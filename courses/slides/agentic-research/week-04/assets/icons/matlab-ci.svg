<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <!-- Title -->
  <text x="200" y="20" font-family="sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="middle">MATLAB in CI -- what works and what does not</text>

  <!-- LEFT: Hosted runner -->
  <text x="100" y="44" font-family="sans-serif" font-size="11" fill="#1E293B" font-weight="bold" text-anchor="middle">GitHub-hosted runner</text>
  <text x="100" y="58" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">ubuntu-24.04 / macOS 15 / Win 2025</text>
  <rect x="20" y="68" width="160" height="156" rx="6" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>

  <!-- MATLAB block (works) -->
  <rect x="34" y="82" width="132" height="40" rx="4" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <circle cx="48" cy="102" r="8" fill="#059669"/>
  <path d="M43 102 L46 105 L53 98" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="64" y="98" font-family="monospace" font-size="10" fill="#064E3B" font-weight="bold">MATLAB</text>
  <text x="64" y="112" font-family="sans-serif" font-size="8" fill="#065F46">setup-matlab v3, R2021a+</text>

  <!-- run-tests / run-command (works) -->
  <rect x="34" y="128" width="132" height="36" rx="4" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <circle cx="48" cy="146" r="8" fill="#059669"/>
  <path d="M43 146 L46 149 L53 142" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="64" y="143" font-family="monospace" font-size="10" fill="#064E3B" font-weight="bold">run-tests</text>
  <text x="64" y="157" font-family="sans-serif" font-size="8" fill="#065F46">run-command, run-build</text>

  <!-- Python engine (FAILS) -->
  <rect x="34" y="170" width="132" height="40" rx="4" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <circle cx="48" cy="190" r="8" fill="#DC2626"/>
  <line x1="44" y1="186" x2="52" y2="194" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="186" x2="44" y2="194" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <text x="64" y="186" font-family="monospace" font-size="10" fill="#7F1D1D" font-weight="bold">MATLAB Engine</text>
  <text x="64" y="198" font-family="sans-serif" font-size="8" fill="#991B1B">for Python -- blocked by</text>
  <text x="64" y="208" font-family="sans-serif" font-size="8" fill="#991B1B">batch licensing</text>

  <!-- Arrow between -->
  <path d="M186 146 L218 146" fill="none" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,2"/>
  <polygon points="218,146 212,142 212,150" fill="#F59E0B"/>
  <text x="202" y="138" font-family="sans-serif" font-size="9" fill="#B45309" font-style="italic" text-anchor="middle">escape</text>

  <!-- RIGHT: Self-hosted runner -->
  <text x="300" y="44" font-family="sans-serif" font-size="11" fill="#1E293B" font-weight="bold" text-anchor="middle">Self-hosted runner</text>
  <text x="300" y="58" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">your Mac / lab workstation</text>
  <rect x="220" y="68" width="160" height="156" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- All works on self-hosted -->
  <rect x="234" y="82" width="132" height="36" rx="4" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <circle cx="248" cy="100" r="8" fill="#059669"/>
  <path d="M243 100 L246 103 L253 96" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="264" y="97" font-family="monospace" font-size="10" fill="#064E3B" font-weight="bold">MATLAB</text>
  <text x="264" y="110" font-family="sans-serif" font-size="8" fill="#065F46">your full license</text>

  <rect x="234" y="124" width="132" height="36" rx="4" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <circle cx="248" cy="142" r="8" fill="#059669"/>
  <path d="M243 142 L246 145 L253 138" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="264" y="139" font-family="monospace" font-size="10" fill="#064E3B" font-weight="bold">all toolboxes</text>
  <text x="264" y="152" font-family="sans-serif" font-size="8" fill="#065F46">no CI restrictions</text>

  <rect x="234" y="166" width="132" height="44" rx="4" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <circle cx="248" cy="186" r="8" fill="#059669"/>
  <path d="M243 186 L246 189 L253 182" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="264" y="183" font-family="monospace" font-size="10" fill="#064E3B" font-weight="bold">Engine for Python</text>
  <text x="264" y="195" font-family="sans-serif" font-size="8" fill="#065F46">matlab-mcp works here</text>
  <text x="264" y="205" font-family="sans-serif" font-size="8" fill="#065F46">EEGLAB, signal toolbox</text>
</svg>
