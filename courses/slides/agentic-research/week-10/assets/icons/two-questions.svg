<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" width="1000" height="440">
  <text x="500" y="26" font-family="sans-serif" font-size="16" fill="#1E293B" font-weight="bold" text-anchor="middle">Two questions place every tool</text>
  <text x="500" y="46" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">who triggers it (down the side)  x  where it runs (across the top)</text>

  <!-- column headers (where it runs) -->
  <text x="360" y="92" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#475569" text-anchor="middle">Main chat</text>
  <text x="600" y="92" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#475569" text-anchor="middle">Its own context</text>
  <text x="830" y="92" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#475569" text-anchor="middle">Outside the model</text>

  <!-- faint grid -->
  <line x1="250" y1="104" x2="940" y2="104" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="480" y1="104" x2="480" y2="408" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="715" y1="104" x2="715" y2="408" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="250" y1="178" x2="940" y2="178" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="250" y1="252" x2="940" y2="252" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="250" y1="326" x2="940" y2="326" stroke="#E2E8F0" stroke-width="1"/>

  <!-- row labels (who triggers) -->
  <text x="70" y="145" font-family="sans-serif" font-size="12" font-weight="bold" fill="#475569">Claude triggers</text>
  <text x="70" y="161" font-family="sans-serif" font-size="9.5" fill="#94A3B8">(from intent)</text>
  <text x="70" y="219" font-family="sans-serif" font-size="12" font-weight="bold" fill="#475569">You trigger</text>
  <text x="70" y="235" font-family="sans-serif" font-size="9.5" fill="#94A3B8">(explicitly)</text>
  <text x="70" y="293" font-family="sans-serif" font-size="12" font-weight="bold" fill="#475569">An event</text>
  <text x="70" y="309" font-family="sans-serif" font-size="9.5" fill="#94A3B8">(automatic)</text>
  <text x="70" y="367" font-family="sans-serif" font-size="12" font-weight="bold" fill="#475569">Always-on</text>
  <text x="70" y="383" font-family="sans-serif" font-size="9.5" fill="#94A3B8">(a connection)</text>

  <!-- Skill: Claude x Main chat -->
  <rect x="280" y="118" width="160" height="46" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.8"/>
  <text x="360" y="138" font-family="sans-serif" font-size="13.5" font-weight="bold" fill="#166534" text-anchor="middle">Skill</text>
  <text x="360" y="155" font-family="sans-serif" font-size="9.5" fill="#166534" text-anchor="middle">knowledge, in context</text>

  <!-- Agent: Claude x Own context -->
  <rect x="520" y="118" width="160" height="46" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="600" y="138" font-family="sans-serif" font-size="13.5" font-weight="bold" fill="#5B21B6" text-anchor="middle">Agent</text>
  <text x="600" y="155" font-family="sans-serif" font-size="9.5" fill="#5B21B6" text-anchor="middle">a worker, isolated</text>

  <!-- Command: You x Main chat -->
  <rect x="280" y="192" width="160" height="46" rx="8" fill="#CFFAFE" stroke="#0891B2" stroke-width="1.8"/>
  <text x="360" y="212" font-family="sans-serif" font-size="13.5" font-weight="bold" fill="#155E75" text-anchor="middle">Command</text>
  <text x="360" y="229" font-family="sans-serif" font-size="9.5" fill="#155E75" text-anchor="middle">a deliberate button</text>

  <!-- Hook: An event x Outside -->
  <rect x="750" y="266" width="160" height="46" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.8"/>
  <text x="830" y="286" font-family="sans-serif" font-size="13.5" font-weight="bold" fill="#92400E" text-anchor="middle">Hook</text>
  <text x="830" y="303" font-family="sans-serif" font-size="9.5" fill="#92400E" text-anchor="middle">fires on an event</text>

  <!-- MCP: Always-on x Outside -->
  <rect x="750" y="340" width="160" height="46" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.8"/>
  <text x="830" y="360" font-family="sans-serif" font-size="13.5" font-weight="bold" fill="#991B1B" text-anchor="middle">MCP server</text>
  <text x="830" y="377" font-family="sans-serif" font-size="9.5" fill="#991B1B" text-anchor="middle">a wire to the outside</text>

  <!-- bottom strip -->
  <rect x="60" y="412" width="880" height="22" rx="4" fill="#F1F5F9" stroke="#94A3B8" stroke-width="0.6"/>
  <text x="500" y="427" font-family="sans-serif" font-size="10.5" fill="#1E293B" text-anchor="middle">A plugin is the box that ships any of these together.</text>
</svg>
