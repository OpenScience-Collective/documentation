<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360">
  <text x="500" y="24" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Where structure ends -- the sidecar and events.tsv</text>
  <text x="500" y="42" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">The sidecar describes the recording; events.tsv lists when things happened, but not what they meant</text>

  <defs>
    <marker id="arrow-sc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- LEFT panel: _eeg.json sidecar (light card) -->
  <text x="245" y="70" font-family="sans-serif" font-size="12" fill="#1E40AF" font-weight="bold" text-anchor="middle">sub-..._task-surroundSupp_eeg.json</text>
  <rect x="40" y="80" width="410" height="232" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.4"/>

  <!-- JSON lines: fixed left x=60, line height 18, start y=110 -->
  <text x="60" y="112" font-family="monospace" font-size="11.5" fill="#1E293B">{</text>
  <text x="76" y="134" font-family="monospace" font-size="11.5" fill="#1E40AF">"TaskName"</text>
  <text x="190" y="134" font-family="monospace" font-size="11.5" fill="#1E293B">: "surroundSupp",</text>
  <text x="76" y="156" font-family="monospace" font-size="11.5" fill="#1E40AF">"SamplingFrequency"</text>
  <text x="244" y="156" font-family="monospace" font-size="11.5" fill="#1E293B">: 500,</text>
  <text x="76" y="178" font-family="monospace" font-size="11.5" fill="#1E40AF">"EEGReference"</text>
  <text x="208" y="178" font-family="monospace" font-size="11.5" fill="#1E293B">: "Cz",</text>
  <text x="76" y="200" font-family="monospace" font-size="11.5" fill="#1E40AF">"PowerLineFrequency"</text>
  <text x="254" y="200" font-family="monospace" font-size="11.5" fill="#1E293B">: 60,</text>
  <text x="76" y="222" font-family="monospace" font-size="11.5" fill="#1E40AF">"EEGChannelCount"</text>
  <text x="228" y="222" font-family="monospace" font-size="11.5" fill="#1E293B">: 128</text>
  <text x="60" y="244" font-family="monospace" font-size="11.5" fill="#1E293B">}</text>

  <rect x="60" y="262" width="370" height="38" rx="4" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="245" y="278" font-family="sans-serif" font-size="10" fill="#1E40AF" font-weight="bold" text-anchor="middle">Machine-readable metadata about the recording.</text>
  <text x="245" y="292" font-family="sans-serif" font-size="9.5" fill="#1E40AF" text-anchor="middle">Tools read this instead of asking you.</text>

  <!-- RIGHT panel: events.tsv table -->
  <text x="700" y="70" font-family="sans-serif" font-size="12" fill="#92400E" font-weight="bold" text-anchor="middle">sub-..._task-surroundSupp_events.tsv</text>
  <rect x="510" y="80" width="380" height="170" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4"/>

  <!-- header row -->
  <rect x="510" y="80" width="380" height="28" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.4"/>
  <text x="565" y="99" font-family="monospace" font-size="11" fill="#92400E" font-weight="bold" text-anchor="middle">onset</text>
  <text x="700" y="99" font-family="monospace" font-size="11" fill="#92400E" font-weight="bold" text-anchor="middle">duration</text>
  <text x="835" y="99" font-family="monospace" font-size="11" fill="#92400E" font-weight="bold" text-anchor="middle">value</text>

  <!-- column separators -->
  <line x1="630" y1="80" x2="630" y2="250" stroke="#D97706" stroke-width="0.8"/>
  <line x1="770" y1="80" x2="770" y2="250" stroke="#D97706" stroke-width="0.8"/>

  <!-- data rows, line height 28 -->
  <line x1="510" y1="108" x2="890" y2="108" stroke="#D97706" stroke-width="0.6"/>
  <text x="565" y="127" font-family="monospace" font-size="11" fill="#1E293B" text-anchor="middle">0.000</text>
  <text x="700" y="127" font-family="monospace" font-size="11" fill="#94A3B8" text-anchor="middle">n/a</text>
  <text x="835" y="127" font-family="monospace" font-size="11" fill="#1E293B" text-anchor="middle">12</text>

  <line x1="510" y1="136" x2="890" y2="136" stroke="#D97706" stroke-width="0.6"/>
  <text x="565" y="155" font-family="monospace" font-size="11" fill="#1E293B" text-anchor="middle">1.500</text>
  <text x="700" y="155" font-family="monospace" font-size="11" fill="#94A3B8" text-anchor="middle">n/a</text>
  <text x="835" y="155" font-family="monospace" font-size="11" fill="#1E293B" text-anchor="middle">14</text>

  <line x1="510" y1="164" x2="890" y2="164" stroke="#D97706" stroke-width="0.6"/>
  <text x="565" y="183" font-family="monospace" font-size="11" fill="#1E293B" text-anchor="middle">3.000</text>
  <text x="700" y="183" font-family="monospace" font-size="11" fill="#94A3B8" text-anchor="middle">n/a</text>
  <text x="835" y="183" font-family="monospace" font-size="11" fill="#1E293B" text-anchor="middle">12</text>

  <line x1="510" y1="192" x2="890" y2="192" stroke="#D97706" stroke-width="0.6"/>
  <text x="700" y="218" font-family="sans-serif" font-size="10" fill="#92400E" text-anchor="middle">value 12, 14 ... what do these codes mean?</text>
  <text x="700" y="234" font-family="sans-serif" font-size="9.5" fill="#94A3B8" text-anchor="middle">the table alone cannot tell you</text>

  <!-- Red/amber warning tag below the events table -->
  <rect x="510" y="262" width="380" height="50" rx="5" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.4"/>
  <text x="700" y="282" font-family="sans-serif" font-size="10.5" fill="#991B1B" font-weight="bold" text-anchor="middle">structure says WHERE the event is</text>
  <text x="700" y="299" font-family="sans-serif" font-size="10.5" fill="#7F1D1D" font-weight="bold" text-anchor="middle">it cannot say WHAT it was.</text>

  <!-- Forward arrow off the right edge to HED -->
  <line x1="892" y1="287" x2="952" y2="287" stroke="#059669" stroke-width="1.8" marker-end="url(#arrow-sc)"/>
  <text x="930" y="278" font-family="monospace" font-size="11" fill="#065F46" font-weight="bold" text-anchor="end">&#8594; HED</text>

  <!-- Bottom moral strip -->
  <rect x="60" y="334" width="880" height="20" rx="4" fill="#F1F5F9" stroke="#94A3B8" stroke-width="0.6"/>
  <text x="500" y="348" font-family="sans-serif" font-size="10" fill="#1E293B" text-anchor="middle">BIDS gives you structure; HED adds the semantics that make events self-describing.</text>
</svg>
