  <path d="M 200 60 C 220 60, 240 140, 280 140" fill="none" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
  <line x1="280" y1="140" x2="450" y2="140" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
  <path d="M 450 140 C 490 140, 510 60, 530 60" fill="none" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
  <!-- Main branch commits -->
  <circle cx="50" cy="60" r="8" fill="#2563EB"/>
  <circle cx="130" cy="60" r="8" fill="#2563EB"/>
  <circle cx="200" cy="60" r="8" fill="#2563EB"/>
  <circle cx="530" cy="60" r="10" fill="#059669" stroke="#059669" stroke-width="2"/>
  <circle cx="650" cy="60" r="8" fill="#2563EB"/>
  <!-- Feature branch commits -->
  <circle cx="320" cy="140" r="7" fill="#F59E0B"/>
  <circle cx="390" cy="140" r="7" fill="#F59E0B"/>
  <circle cx="450" cy="140" r="7" fill="#F59E0B"/>
