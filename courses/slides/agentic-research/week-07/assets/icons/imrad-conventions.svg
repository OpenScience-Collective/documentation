<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" width="960" height="320">
  <text x="480" y="20" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">IMRAD section conventions</text>
  <text x="480" y="38" font-family="sans-serif" font-size="11.5" fill="#64748B" font-style="italic" text-anchor="middle">Tense, length, voice -- enforced per section by /manuscript:manuscript-writing</text>

  <!-- Table header (Blue) -->
  <g>
    <rect x="60" y="54" width="200" height="28" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
    <text x="160" y="72" font-family="sans-serif" font-size="11.5" fill="#1E40AF" font-weight="bold" text-anchor="middle">Section</text>

    <rect x="262" y="54" width="170" height="28" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
    <text x="347" y="72" font-family="sans-serif" font-size="11.5" fill="#1E40AF" font-weight="bold" text-anchor="middle">Tense</text>

    <rect x="434" y="54" width="170" height="28" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
    <text x="519" y="72" font-family="sans-serif" font-size="11.5" fill="#1E40AF" font-weight="bold" text-anchor="middle">Length</text>

    <rect x="606" y="54" width="294" height="28" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
    <text x="753" y="72" font-family="sans-serif" font-size="11.5" fill="#1E40AF" font-weight="bold" text-anchor="middle">Anti-pattern</text>
  </g>

  <!-- Row 1: Title / Abstract -->
  <g>
    <rect x="60" y="86" width="200" height="28" rx="3" fill="#F8FAFC" stroke="#94A3B8" stroke-width="0.8"/>
    <text x="74" y="100" font-family="sans-serif" font-size="11" fill="#1E293B" font-weight="bold">Title</text>
    <text x="74" y="111" font-family="sans-serif" font-size="9.5" fill="#475569">10-15 words</text>

    <rect x="262" y="86" width="170" height="28" rx="3" fill="#F8FAFC" stroke="#94A3B8" stroke-width="0.8"/>
    <text x="347" y="104" font-family="sans-serif" font-size="10.5" fill="#1E293B" text-anchor="middle">N/A</text>

    <rect x="434" y="86" width="170" height="28" rx="3" fill="#F8FAFC" stroke="#94A3B8" stroke-width="0.8"/>
    <text x="519" y="104" font-family="sans-serif" font-size="10.5" fill="#1E293B" text-anchor="middle">main finding in 1 line</text>

    <rect x="606" y="86" width="294" height="28" rx="3" fill="#F8FAFC" stroke="#94A3B8" stroke-width="0.8"/>
    <text x="620" y="104" font-family="sans-serif" font-size="10.5" fill="#1E293B">"A study of..." (descriptive, no finding)</text>
  </g>

  <!-- Row 2: Introduction -->
  <g>
    <rect x="60" y="118" width="200" height="42" rx="3" fill="#F1F5F9" stroke="#475569" stroke-width="0.8"/>
    <text x="74" y="136" font-family="sans-serif" font-size="11.5" fill="#1E293B" font-weight="bold">Introduction</text>
    <text x="74" y="149" font-family="sans-serif" font-size="9.5" fill="#475569">funnel: broad -&gt; narrow -&gt; gap</text>

    <rect x="262" y="118" width="170" height="42" rx="3" fill="#F1F5F9" stroke="#475569" stroke-width="0.8"/>
    <text x="347" y="136" font-family="sans-serif" font-size="10.5" fill="#1E293B" text-anchor="middle">Present (known)</text>
    <text x="347" y="150" font-family="sans-serif" font-size="10.5" fill="#1E293B" text-anchor="middle">Past (prior work)</text>

    <rect x="434" y="118" width="170" height="42" rx="3" fill="#F1F5F9" stroke="#475569" stroke-width="0.8"/>
    <text x="519" y="143" font-family="sans-serif" font-size="10.5" fill="#1E293B" text-anchor="middle">3-5 paragraphs</text>

    <rect x="606" y="118" width="294" height="42" rx="3" fill="#F1F5F9" stroke="#475569" stroke-width="0.8"/>
    <text x="620" y="136" font-family="sans-serif" font-size="10.5" fill="#1E293B">stating the gap in the first sentence,</text>
    <text x="620" y="150" font-family="sans-serif" font-size="10.5" fill="#1E293B">then re-justifying it again at the end</text>
  </g>

  <!-- Row 3: Methods (highlight) -->
  <g>
    <rect x="60" y="164" width="200" height="44" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
    <text x="74" y="182" font-family="sans-serif" font-size="11.5" fill="#1E40AF" font-weight="bold">Methods</text>
    <text x="74" y="195" font-family="sans-serif" font-size="9.5" fill="#1E40AF">stepwise, replicable</text>
    <text x="74" y="206" font-family="sans-serif" font-size="9.5" fill="#1E40AF">subsections mirror Results</text>

    <rect x="262" y="164" width="170" height="44" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
    <text x="347" y="190" font-family="sans-serif" font-size="11" fill="#1E40AF" text-anchor="middle" font-weight="bold">Past</text>

    <rect x="434" y="164" width="170" height="44" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
    <text x="519" y="190" font-family="sans-serif" font-size="10.5" fill="#1E40AF" text-anchor="middle">as needed</text>

    <rect x="606" y="164" width="294" height="44" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
    <text x="620" y="182" font-family="sans-serif" font-size="10.5" fill="#1E40AF">vague tool names ("a custom pipeline")</text>
    <text x="620" y="196" font-family="sans-serif" font-size="10.5" fill="#1E40AF">missing software versions / parameters</text>
  </g>

  <!-- Row 4: Results (highlight) -->
  <g>
    <rect x="60" y="212" width="200" height="44" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
    <text x="74" y="230" font-family="sans-serif" font-size="11.5" fill="#1E40AF" font-weight="bold">Results</text>
    <text x="74" y="243" font-family="sans-serif" font-size="9.5" fill="#1E40AF">findings + statistics</text>
    <text x="74" y="254" font-family="sans-serif" font-size="9.5" fill="#1E40AF">no interpretation</text>

    <rect x="262" y="212" width="170" height="44" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
    <text x="347" y="238" font-family="sans-serif" font-size="11" fill="#1E40AF" text-anchor="middle" font-weight="bold">Past</text>

    <rect x="434" y="212" width="170" height="44" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
    <text x="519" y="232" font-family="sans-serif" font-size="10.5" fill="#1E40AF" text-anchor="middle">parallel to Methods</text>
    <text x="519" y="246" font-family="sans-serif" font-size="10.5" fill="#1E40AF" text-anchor="middle">one fig per claim</text>

    <rect x="606" y="212" width="294" height="44" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
    <text x="620" y="232" font-family="sans-serif" font-size="10.5" fill="#1E40AF">"This suggests that..." (interpretation</text>
    <text x="620" y="246" font-family="sans-serif" font-size="10.5" fill="#1E40AF">in Results; belongs in Discussion)</text>
  </g>

  <!-- Row 5: Discussion -->
  <g>
    <rect x="60" y="260" width="200" height="42" rx="3" fill="#F1F5F9" stroke="#475569" stroke-width="0.8"/>
    <text x="74" y="278" font-family="sans-serif" font-size="11.5" fill="#1E293B" font-weight="bold">Discussion</text>
    <text x="74" y="291" font-family="sans-serif" font-size="9.5" fill="#475569">interpret + bound + limit</text>

    <rect x="262" y="260" width="170" height="42" rx="3" fill="#F1F5F9" stroke="#475569" stroke-width="0.8"/>
    <text x="347" y="278" font-family="sans-serif" font-size="10.5" fill="#1E293B" text-anchor="middle">Present (interpret)</text>
    <text x="347" y="292" font-family="sans-serif" font-size="10.5" fill="#1E293B" text-anchor="middle">Past (recap finding)</text>

    <rect x="434" y="260" width="170" height="42" rx="3" fill="#F1F5F9" stroke="#475569" stroke-width="0.8"/>
    <text x="519" y="285" font-family="sans-serif" font-size="10.5" fill="#1E293B" text-anchor="middle">4-6 paragraphs</text>

    <rect x="606" y="260" width="294" height="42" rx="3" fill="#F1F5F9" stroke="#475569" stroke-width="0.8"/>
    <text x="620" y="278" font-family="sans-serif" font-size="10.5" fill="#1E293B">restating Results without bounding;</text>
    <text x="620" y="292" font-family="sans-serif" font-size="10.5" fill="#1E293B">no limitations paragraph</text>
  </g>
</svg>
