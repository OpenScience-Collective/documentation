  <text x="500" y="92" font-family="monospace" font-size="9" fill="#166534" text-anchor="middle">opencite</text>
  <text x="500" y="110" font-family="sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">Wk5</text>
  <circle cx="500" cy="130" r="7" fill="#16A34A" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="500" y="152" font-family="sans-serif" font-size="9.5" font-weight="bold" fill="#16A34A" text-anchor="middle">Skill</text>

  <!-- Week 6: skill -->
  <text x="600" y="92" font-family="monospace" font-size="9" fill="#166534" text-anchor="middle">grant</text>
  <text x="600" y="110" font-family="sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">Wk6</text>
  <circle cx="600" cy="130" r="7" fill="#16A34A" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="600" y="152" font-family="sans-serif" font-size="9.5" font-weight="bold" fill="#16A34A" text-anchor="middle">Skill</text>

  <!-- Week 7: skill -->
  <text x="700" y="92" font-family="monospace" font-size="9" fill="#166534" text-anchor="middle">manuscript</text>
  <text x="700" y="110" font-family="sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">Wk7</text>
  <circle cx="700" cy="130" r="7" fill="#16A34A" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="700" y="152" font-family="sans-serif" font-size="9.5" font-weight="bold" fill="#16A34A" text-anchor="middle">Skill</text>

