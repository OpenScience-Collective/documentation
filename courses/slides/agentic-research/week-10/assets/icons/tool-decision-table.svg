<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500">
  <text x="500" y="28" font-family="sans-serif" font-size="16" fill="#1E293B" font-weight="bold" text-anchor="middle">Which tool? Two columns decide.</text>
  <text x="500" y="48" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">what you want on the left, the building block you reach for on the right</text>

  <!-- header row -->
  <rect x="60" y="66" width="560" height="32" fill="#E2E8F0"/>
  <rect x="620" y="66" width="320" height="32" fill="#E2E8F0"/>
  <text x="80" y="87" font-family="sans-serif" font-size="12" font-weight="bold" fill="#475569">YOU WANT...</text>
  <text x="780" y="87" font-family="sans-serif" font-size="12" font-weight="bold" fill="#475569" text-anchor="middle">REACH FOR A...</text>

  <!-- row backgrounds (alternating) -->
  <rect x="60" y="98" width="880" height="60" fill="#FFFFFF"/>
  <rect x="60" y="158" width="880" height="60" fill="#F8FAFC"/>
  <rect x="60" y="218" width="880" height="60" fill="#FFFFFF"/>
  <rect x="60" y="278" width="880" height="60" fill="#F8FAFC"/>
  <rect x="60" y="338" width="880" height="60" fill="#FFFFFF"/>
  <rect x="60" y="398" width="880" height="60" fill="#F8FAFC"/>
  <rect x="60" y="98" width="880" height="360" fill="none" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="620" y1="98" x2="620" y2="458" stroke="#CBD5E1" stroke-width="1"/>

  <!-- row 1: Skill -->
  <text x="80" y="133" font-family="sans-serif" font-size="13.5" fill="#1E293B">Claude to follow your procedure when the topic comes up</text>
  <rect x="670" y="110" width="220" height="36" rx="18" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.8"/>
  <text x="780" y="133" font-family="sans-serif" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle">Skill</text>

  <!-- row 2: Agent -->
  <text x="80" y="193" font-family="sans-serif" font-size="13.5" fill="#1E293B">A scoped job done on its own, returning a result</text>
  <rect x="670" y="170" width="220" height="36" rx="18" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="780" y="193" font-family="sans-serif" font-size="14" font-weight="bold" fill="#5B21B6" text-anchor="middle">Agent</text>

  <!-- row 3: Command -->
  <text x="80" y="253" font-family="sans-serif" font-size="13.5" fill="#1E293B">A deliberate /entry-point for a multi-step workflow</text>
  <rect x="670" y="230" width="220" height="36" rx="18" fill="#CFFAFE" stroke="#0891B2" stroke-width="1.8"/>
  <text x="780" y="253" font-family="sans-serif" font-size="14" font-weight="bold" fill="#155E75" text-anchor="middle">Command</text>

  <!-- row 4: Hook -->
  <text x="80" y="313" font-family="sans-serif" font-size="13.5" fill="#1E293B">Something to happen automatically on an event</text>
  <rect x="670" y="290" width="220" height="36" rx="18" fill="#FEF3C7" stroke="#D97706" stroke-width="1.8"/>
  <text x="780" y="313" font-family="sans-serif" font-size="14" font-weight="bold" fill="#92400E" text-anchor="middle">Hook</text>

  <!-- row 5: MCP -->
  <text x="80" y="373" font-family="sans-serif" font-size="13.5" fill="#1E293B">Claude to reach an external system (MATLAB, a database)</text>
  <rect x="670" y="350" width="220" height="36" rx="18" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.8"/>
  <text x="780" y="373" font-family="sans-serif" font-size="14" font-weight="bold" fill="#991B1B" text-anchor="middle">MCP server</text>

  <!-- row 6: Plugin -->
  <text x="80" y="433" font-family="sans-serif" font-size="13.5" fill="#1E293B">To bundle and share any of the above</text>
  <rect x="670" y="410" width="220" height="36" rx="18" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.8"/>
  <text x="780" y="433" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1E40AF" text-anchor="middle">Plugin</text>

  <!-- mental-model rail -->
  <rect x="60" y="468" width="880" height="26" rx="5" fill="#0F172A"/>
  <text x="500" y="485" font-family="sans-serif" font-size="11" fill="#E2E8F0" text-anchor="middle">Skill = knowledge   ·   Agent = a worker   ·   Command = a button   ·   Hook = a tripwire   ·   MCP = a wire outside   ·   Plugin = the box</text>
</svg>
