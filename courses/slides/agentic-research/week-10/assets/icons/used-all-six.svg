  <!-- Week 9: agent -->
  <text x="900" y="92" font-family="monospace" font-size="9" fill="#5B21B6" text-anchor="middle">bids-validator</text>
  <text x="900" y="110" font-family="sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">Wk9</text>
  <circle cx="900" cy="130" r="7" fill="#7C3AED" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="900" y="152" font-family="sans-serif" font-size="9.5" font-weight="bold" fill="#7C3AED" text-anchor="middle">Agent</text>

  <!-- matlab-mcp band (spans the practicum, Wk3-9) -->
  <rect x="280" y="180" width="650" height="28" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="605" y="199" font-family="sans-serif" font-size="10.5" fill="#991B1B" text-anchor="middle">matlab-mcp -- the MCP server that drove MATLAB + EEGLAB across the whole practicum</text>

  <!-- research-skills band (ships Wk5-9) -->
  <rect x="470" y="216" width="460" height="28" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="700" y="235" font-family="sans-serif" font-size="10.5" fill="#1E40AF" text-anchor="middle">research-skills -- the plugin that shipped weeks 5-9</text>

  <!-- legend -->
  <rect x="80" y="270" width="13" height="13" rx="2" fill="#16A34A"/>
  <text x="100" y="281" font-family="sans-serif" font-size="10" fill="#475569">Skill</text>
  <rect x="160" y="270" width="13" height="13" rx="2" fill="#7C3AED"/>
  <text x="180" y="281" font-family="sans-serif" font-size="10" fill="#475569">Agent</text>
  <rect x="245" y="270" width="13" height="13" rx="2" fill="#0891B2"/>
  <text x="265" y="281" font-family="sans-serif" font-size="10" fill="#475569">Command</text>
  <rect x="355" y="270" width="13" height="13" rx="2" fill="#D97706"/>
  <text x="375" y="281" font-family="sans-serif" font-size="10" fill="#475569">Hook</text>
  <rect x="430" y="270" width="13" height="13" rx="2" fill="#DC2626"/>
  <text x="450" y="281" font-family="sans-serif" font-size="10" fill="#475569">MCP</text>
  <rect x="505" y="270" width="13" height="13" rx="2" fill="#2563EB"/>
  <text x="525" y="281" font-family="sans-serif" font-size="10" fill="#475569">Plugin</text>
  <rect x="590" y="270" width="13" height="13" rx="2" fill="#64748B"/>
  <text x="610" y="281" font-family="sans-serif" font-size="10" fill="#475569">Foundation</text>

  <!-- bottom strip -->
  <rect x="60" y="332" width="880" height="26" rx="5" fill="#0F172A"/>
  <text x="500" y="349" font-family="sans-serif" font-size="11.5" fill="#E2E8F0" text-anchor="middle">None of it was magic. Six building blocks -- and today you author one.</text>
</svg>
