<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 330" width="960" height="330">
  <text x="480" y="26" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Where the loops meet</text>
  <text x="480" y="44" font-family="sans-serif" font-size="11.5" fill="#64748B" font-style="italic" text-anchor="middle">One repo, one history -- two loops handing off between Stages 4 and 5</text>

  <!-- Center cylinder: shared repo (single source of truth) -->
  <ellipse cx="480" cy="170" rx="110" ry="22" fill="#F1F5F9" stroke="#475569" stroke-width="1.4"/>
  <path d="M370 170 L370 220 C 370 232, 590 232, 590 220 L 590 170" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <ellipse cx="480" cy="170" rx="110" ry="22" fill="none" stroke="#475569" stroke-width="1.4"/>
  <text x="480" y="208" font-family="sans-serif" font-size="13" fill="#1E293B" font-weight="bold" text-anchor="middle">shared git repo</text>
  <text x="480" y="223" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">single source of truth</text>

  <!-- LEFT side: agent loop (blue) circle with arrow into repo -->
  <circle cx="160" cy="170" r="74" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="160" y="148" font-family="sans-serif" font-size="13" fill="#1E40AF" font-weight="bold" text-anchor="middle">Agent loop</text>
  <text x="160" y="164" font-family="sans-serif" font-size="10.5" fill="#1E40AF" text-anchor="middle">/manuscript:*</text>
  <text x="160" y="178" font-family="sans-serif" font-size="10.5" fill="#1E40AF" text-anchor="middle">/figures:*</text>
  <text x="160" y="194" font-family="sans-serif" font-size="10.5" fill="#1E40AF" text-anchor="middle">pull requests</text>

  <!-- bidirectional arrow agent loop <-> repo -->
  <path d="M234 170 L368 170" fill="none" stroke="#2563EB" stroke-width="2"/>
  <polygon points="368,170 360,166 360,174" fill="#2563EB"/>
  <polygon points="234,170 242,166 242,174" fill="#2563EB"/>
  <text x="301" y="162" font-family="monospace" font-size="9.5" fill="#1E40AF" text-anchor="middle">commits / PRs</text>

  <!-- RIGHT side: human loop (teal) circle with arrow into repo -->
  <circle cx="800" cy="170" r="74" fill="#CCFBF1" stroke="#0D9488" stroke-width="2"/>
  <text x="800" y="148" font-family="sans-serif" font-size="13" fill="#0F766E" font-weight="bold" text-anchor="middle">Human loop</text>
  <text x="800" y="164" font-family="sans-serif" font-size="10.5" fill="#0F766E" text-anchor="middle">Overleaf editor</text>
  <text x="800" y="178" font-family="sans-serif" font-size="10.5" fill="#0F766E" text-anchor="middle">tracked changes</text>
  <text x="800" y="194" font-family="sans-serif" font-size="10.5" fill="#0F766E" text-anchor="middle">inline comments</text>

  <!-- bidirectional arrow human loop <-> repo -->
  <path d="M726 170 L592 170" fill="none" stroke="#0D9488" stroke-width="2"/>
  <polygon points="592,170 600,166 600,174" fill="#0D9488"/>
  <polygon points="726,170 718,166 718,174" fill="#0D9488"/>
  <text x="659" y="162" font-family="monospace" font-size="9.5" fill="#0F766E" text-anchor="middle">zip out / git in</text>

  <!-- Caveat under the human loop side: comments do not travel -->
  <rect x="650" y="246" width="300" height="46" rx="6" fill="#FEF3C7" stroke="#B45309" stroke-width="1.2"/>
  <text x="800" y="263" font-family="sans-serif" font-size="11" fill="#78350F" font-weight="bold" text-anchor="middle">Caveat: Overleaf comments</text>
  <text x="800" y="278" font-family="sans-serif" font-size="11" fill="#78350F" text-anchor="middle">do not travel through git.</text>
  <text x="800" y="290" font-family="sans-serif" font-size="9.5" fill="#92400E" font-style="italic" text-anchor="middle">manual transcription required.</text>

  <!-- Footer note under the agent loop side -->
  <rect x="10" y="246" width="300" height="46" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
  <text x="160" y="263" font-family="sans-serif" font-size="11" fill="#1E40AF" font-weight="bold" text-anchor="middle">Repo history covers</text>
  <text x="160" y="278" font-family="sans-serif" font-size="11" fill="#1E40AF" text-anchor="middle">every commit, branch, PR.</text>
  <text x="160" y="290" font-family="sans-serif" font-size="9.5" fill="#1E3A8A" font-style="italic" text-anchor="middle">canonical version trail.</text>

  <text x="480" y="316" font-family="sans-serif" font-size="10.5" fill="#64748B" font-style="italic" text-anchor="middle">The boundary lives between Stages 4 and 5 of the pipeline.</text>
</svg>
