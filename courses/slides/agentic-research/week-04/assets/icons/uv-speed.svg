<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- Title -->
  <text x="160" y="20" font-family="sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="middle">Cold install of JupyterLab (cache empty)</text>

  <!-- Y axis line -->
  <line x1="80" y1="40" x2="80" y2="160" stroke="#94A3B8" stroke-width="1"/>
  <!-- X axis line -->
  <line x1="80" y1="160" x2="300" y2="160" stroke="#94A3B8" stroke-width="1"/>

  <!-- pip bar (long, red) -->
  <rect x="80" y="60" width="214" height="28" fill="#DC2626"/>
  <text x="74" y="78" font-family="monospace" font-size="11" fill="#1E293B" font-weight="bold" text-anchor="end">pip</text>
  <text x="290" y="78" font-family="monospace" font-size="11" fill="#FFFFFF" font-weight="bold" text-anchor="end">21.4 s</text>

  <!-- uv bar (short, green) -->
  <rect x="80" y="110" width="26" height="28" fill="#059669"/>
  <text x="74" y="128" font-family="monospace" font-size="11" fill="#1E293B" font-weight="bold" text-anchor="end">uv</text>
  <text x="112" y="128" font-family="monospace" font-size="11" fill="#1E293B" font-weight="bold" text-anchor="start">2.6 s</text>

  <!-- Tick labels on x axis -->
  <text x="80" y="174" font-family="monospace" font-size="9" fill="#64748B" text-anchor="middle">0</text>
  <text x="180" y="174" font-family="monospace" font-size="9" fill="#64748B" text-anchor="middle">10 s</text>
  <text x="280" y="174" font-family="monospace" font-size="9" fill="#64748B" text-anchor="middle">20 s</text>

  <!-- Annotation -->
  <text x="160" y="194" font-family="sans-serif" font-size="10" fill="#475569" font-style="italic" text-anchor="middle">~8x cold, up to ~100x with warm cache. CI runs every push.</text>
</svg>
