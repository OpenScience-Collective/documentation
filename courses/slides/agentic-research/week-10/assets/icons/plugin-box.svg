<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" width="1000" height="380">
  <text x="500" y="26" font-family="sans-serif" font-size="16" fill="#1E293B" font-weight="bold" text-anchor="middle">The plugin is the box; the marketplace is the shelf</text>
  <text x="500" y="46" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">one plugin.json bundles skills, agents, commands, and hooks; a marketplace lists them for install</text>

  <defs>
    <marker id="arrow-blue-box" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- the plugin box -->
  <rect x="70" y="80" width="430" height="252" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <rect x="70" y="80" width="430" height="30" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="90" y="100" font-family="monospace" font-size="12" font-weight="bold" fill="#1E40AF">plugin.json</text>
  <text x="480" y="100" font-family="sans-serif" font-size="10" fill="#1E40AF" text-anchor="end">name · version · author</text>

  <!-- compartments -->
  <rect x="95" y="128" width="180" height="52" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.6"/>
  <text x="185" y="150" font-family="monospace" font-size="12" font-weight="bold" fill="#166534" text-anchor="middle">skills/</text>
  <text x="185" y="167" font-family="sans-serif" font-size="9" fill="#166534" text-anchor="middle">knowledge + workflows</text>

  <rect x="295" y="128" width="180" height="52" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="385" y="150" font-family="monospace" font-size="12" font-weight="bold" fill="#5B21B6" text-anchor="middle">agents/</text>
  <text x="385" y="167" font-family="sans-serif" font-size="9" fill="#5B21B6" text-anchor="middle">autonomous workers</text>

  <rect x="95" y="190" width="180" height="52" rx="6" fill="#CFFAFE" stroke="#0891B2" stroke-width="1.6"/>
  <text x="185" y="212" font-family="monospace" font-size="12" font-weight="bold" fill="#155E75" text-anchor="middle">commands/</text>
  <text x="185" y="229" font-family="sans-serif" font-size="9" fill="#155E75" text-anchor="middle">/slash entry points</text>

  <rect x="295" y="190" width="180" height="52" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
  <text x="385" y="212" font-family="monospace" font-size="12" font-weight="bold" fill="#92400E" text-anchor="middle">hooks/</text>
  <text x="385" y="229" font-family="sans-serif" font-size="9" fill="#92400E" text-anchor="middle">event-driven automation</text>

  <rect x="95" y="252" width="380" height="40" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="285" y="277" font-family="sans-serif" font-size="10.5" fill="#991B1B" text-anchor="middle">MCP server config  (optional -- a wire to the outside)</text>

  <text x="285" y="316" font-family="sans-serif" font-size="11" font-style="italic" fill="#475569" text-anchor="middle">one installable package</text>

  <!-- arrow to shelf -->
  <line x1="502" y1="206" x2="556" y2="206" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrow-blue-box)"/>

  <!-- the marketplace shelf -->
  <rect x="560" y="100" width="380" height="232" rx="10" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.6"/>
  <rect x="560" y="100" width="380" height="30" rx="10" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.6"/>
  <text x="580" y="120" font-family="monospace" font-size="12" font-weight="bold" fill="#334155">marketplace.json</text>

  <!-- plugin boxes on the shelf -->
  <rect x="585" y="148" width="150" height="40" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
  <text x="660" y="173" font-family="monospace" font-size="11" fill="#1E40AF" text-anchor="middle">neuroinformatics</text>
  <rect x="765" y="148" width="150" height="40" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
  <text x="840" y="173" font-family="monospace" font-size="11" fill="#1E40AF" text-anchor="middle">figures</text>
  <rect x="585" y="198" width="150" height="40" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
  <text x="660" y="223" font-family="monospace" font-size="11" fill="#1E40AF" text-anchor="middle">manuscript</text>
  <rect x="765" y="198" width="150" height="40" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
  <text x="840" y="223" font-family="monospace" font-size="11" fill="#1E40AF" text-anchor="middle">grant</text>

  <text x="750" y="266" font-family="sans-serif" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">... 7 plugins in research-skills</text>
  <text x="750" y="300" font-family="sans-serif" font-size="10" fill="#64748B" text-anchor="middle">add it once; install the plugins you want</text>

  <!-- bottom strip -->
  <rect x="70" y="346" width="870" height="24" rx="5" fill="#F1F5F9" stroke="#94A3B8" stroke-width="0.6"/>
  <text x="505" y="362" font-family="sans-serif" font-size="11" fill="#1E293B" text-anchor="middle" font-weight="bold">research-skills is one marketplace holding seven plugins.</text>
</svg>
