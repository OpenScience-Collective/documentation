<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" width="360" height="280">
  <!-- File tab -->
  <rect x="10" y="10" width="180" height="22" rx="4" fill="#1E293B"/>
  <text x="20" y="26" font-family="monospace" font-size="11" fill="#E2E8F0">.github/workflows/ci.yml</text>

  <!-- Code panel -->
  <rect x="10" y="32" width="220" height="240" fill="#0F172A" stroke="#334155" stroke-width="1"/>

  <!-- Code lines (monospace) -->
  <text x="22" y="54"  font-family="monospace" font-size="11" fill="#F472B6">name</text>
  <text x="56" y="54"  font-family="monospace" font-size="11" fill="#E2E8F0">: CI</text>

  <text x="22" y="76"  font-family="monospace" font-size="11" fill="#F472B6">on</text>
  <text x="44" y="76"  font-family="monospace" font-size="11" fill="#E2E8F0">:</text>
  <text x="34" y="92"  font-family="monospace" font-size="11" fill="#E2E8F0">push:</text>
  <text x="46" y="108" font-family="monospace" font-size="11" fill="#E2E8F0">branches: [main]</text>
  <text x="34" y="124" font-family="monospace" font-size="11" fill="#E2E8F0">pull_request:</text>

  <text x="22" y="146" font-family="monospace" font-size="11" fill="#F472B6">jobs</text>
  <text x="56" y="146" font-family="monospace" font-size="11" fill="#E2E8F0">:</text>
  <text x="34" y="162" font-family="monospace" font-size="11" fill="#FBBF24">test:</text>

  <text x="46" y="178" font-family="monospace" font-size="11" fill="#F472B6">runs-on</text>
  <text x="100" y="178" font-family="monospace" font-size="11" fill="#E2E8F0">: ubuntu-latest</text>

  <text x="46" y="200" font-family="monospace" font-size="11" fill="#F472B6">steps</text>
  <text x="86" y="200" font-family="monospace" font-size="11" fill="#E2E8F0">:</text>
  <text x="58" y="216" font-family="monospace" font-size="11" fill="#E2E8F0">- uses: actions/checkout@v4</text>
  <text x="58" y="232" font-family="monospace" font-size="11" fill="#E2E8F0">- run: uv sync</text>
  <text x="58" y="248" font-family="monospace" font-size="11" fill="#E2E8F0">- run: uv run pytest</text>

  <!-- Annotation arrows + labels (right side) -->
  <!-- name -->
  <line x1="80" y1="50" x2="248" y2="50" stroke="#2563EB" stroke-width="1.2" stroke-dasharray="2,2"/>
  <rect x="248" y="42" width="100" height="18" rx="3" fill="#2563EB"/>
  <text x="298" y="55" font-family="sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold" text-anchor="middle">name</text>

  <!-- on -->
  <line x1="50" y1="76" x2="248" y2="86" stroke="#F59E0B" stroke-width="1.2" stroke-dasharray="2,2"/>
  <rect x="248" y="78" width="100" height="18" rx="3" fill="#F59E0B"/>
  <text x="298" y="91" font-family="sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold" text-anchor="middle">on (triggers)</text>

  <!-- jobs -->
  <line x1="56" y1="146" x2="248" y2="138" stroke="#7C3AED" stroke-width="1.2" stroke-dasharray="2,2"/>
  <rect x="248" y="130" width="100" height="18" rx="3" fill="#7C3AED"/>
  <text x="298" y="143" font-family="sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold" text-anchor="middle">jobs</text>

  <!-- runs-on -->
  <line x1="100" y1="178" x2="248" y2="174" stroke="#059669" stroke-width="1.2" stroke-dasharray="2,2"/>
  <rect x="248" y="166" width="100" height="18" rx="3" fill="#059669"/>
  <text x="298" y="179" font-family="sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold" text-anchor="middle">runs-on (OS)</text>

  <!-- steps -->
  <line x1="86" y1="200" x2="248" y2="216" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="2,2"/>
  <rect x="248" y="208" width="100" height="18" rx="3" fill="#DC2626"/>
  <text x="298" y="221" font-family="sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold" text-anchor="middle">steps</text>
</svg>
