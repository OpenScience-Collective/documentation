<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="1000" height="320">
  <defs>
    <marker id="arrowfwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="500" y="24" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Why HED workflows stall for most labs</text>
  <text x="500" y="42" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">Hierarchical Event Descriptors (HED): every event needs hand-built, schema-valid tags before anyone can search them.</text>

  <!-- Step 1: Read the paper (amber) -->
  <g>
    <rect x="40" y="90" width="200" height="110" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
    <text x="140" y="116" font-family="sans-serif" font-size="13" fill="#92400E" font-weight="bold" text-anchor="middle">1. Read the paper</text>
    <text x="140" y="142" font-family="sans-serif" font-size="10" fill="#92400E" text-anchor="middle">hours per session</text>
    <text x="140" y="160" font-family="sans-serif" font-size="10" fill="#92400E" text-anchor="middle">extract event structure</text>
    <text x="140" y="176" font-family="sans-serif" font-size="10" fill="#92400E" text-anchor="middle">by hand</text>
  </g>

  <!-- Step 2: Learn the schema (amber) -->
  <g>
    <rect x="278" y="90" width="200" height="110" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
    <text x="378" y="116" font-family="sans-serif" font-size="13" fill="#92400E" font-weight="bold" text-anchor="middle">2. Learn the schema</text>
    <text x="378" y="142" font-family="sans-serif" font-size="10" fill="#92400E" text-anchor="middle">~2000 tags</text>
    <text x="378" y="160" font-family="sans-serif" font-size="10" fill="#92400E" text-anchor="middle">expert-only</text>
    <text x="378" y="176" font-family="sans-serif" font-size="10" fill="#92400E" text-anchor="middle">vocabulary</text>
  </g>

  <!-- Step 3: Write the sidecar (red) -->
  <g>
    <rect x="516" y="90" width="200" height="110" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.6"/>
    <text x="616" y="116" font-family="sans-serif" font-size="13" fill="#991B1B" font-weight="bold" text-anchor="middle">3. Write the sidecar</text>
    <text x="616" y="142" font-family="sans-serif" font-size="10" fill="#991B1B" text-anchor="middle">value levels +</text>
    <text x="616" y="160" font-family="sans-serif" font-size="10" fill="#991B1B" text-anchor="middle">value slots</text>
    <text x="616" y="176" font-family="sans-serif" font-size="10" fill="#991B1B" text-anchor="middle">error-prone</text>
  </g>

  <!-- Step 4: Validate & repeat (red) -->
  <g>
    <rect x="754" y="90" width="206" height="110" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.8"/>
    <text x="857" y="116" font-family="sans-serif" font-size="13" fill="#991B1B" font-weight="bold" text-anchor="middle">4. Validate &amp; repeat</text>
    <text x="857" y="142" font-family="sans-serif" font-size="10" fill="#991B1B" text-anchor="middle">cryptic validator</text>
    <text x="857" y="160" font-family="sans-serif" font-size="10" fill="#991B1B" text-anchor="middle">messages</text>
    <text x="857" y="176" font-family="sans-serif" font-size="10" fill="#991B1B" text-anchor="middle">loop until clean</text>
  </g>

  <!-- Forward arrows -->
  <line x1="240" y1="145" x2="276" y2="145" stroke="#475569" stroke-width="1.6" marker-end="url(#arrowfwd)"/>
  <line x1="478" y1="145" x2="514" y2="145" stroke="#475569" stroke-width="1.6" marker-end="url(#arrowfwd)"/>
  <line x1="716" y1="145" x2="752" y2="145" stroke="#475569" stroke-width="1.6" marker-end="url(#arrowfwd)"/>

  <!-- Bottom moral strip (red) -->
  <rect x="40" y="288" width="920" height="22" rx="4" fill="#FEE2E2" stroke="#DC2626" stroke-width="0.8"/>
  <text x="500" y="303" font-family="sans-serif" font-size="11" fill="#991B1B" font-weight="bold" text-anchor="middle">HED adoption stays inside the labs that build HED.</text>
</svg>
