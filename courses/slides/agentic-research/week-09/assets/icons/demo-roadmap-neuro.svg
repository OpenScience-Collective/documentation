<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360">
  <text x="500" y="24" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Live demo -- small and honest</text>
  <text x="500" y="42" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">Two short actions, ~4 minutes -- annotate one event, then validate the practicum dataset</text>

  <defs>
    <marker id="arrowfwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Step 1: HEDit -->
  <g>
    <rect x="60" y="86" width="420" height="200" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.8"/>
    <rect x="60" y="86" width="420" height="32" rx="6" fill="#DDD6FE" stroke="#7C3AED" stroke-width="1.8"/>
    <text x="270" y="107" font-family="sans-serif" font-size="12" fill="#5B21B6" font-weight="bold" text-anchor="middle">Step 1 -- HEDit</text>
    <!-- timing badge -->
    <rect x="434" y="74" width="50" height="22" rx="3" fill="#5B21B6"/>
    <text x="459" y="89" font-family="sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold" text-anchor="middle">~2:00</text>

    <text x="270" y="136" font-family="sans-serif" font-size="10" fill="#5B21B6" text-anchor="middle">one rich prose description of an HBN event</text>

    <!-- input: prose card -->
    <rect x="84" y="148" width="170" height="74" rx="4" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.2"/>
    <text x="169" y="164" font-family="sans-serif" font-size="9" fill="#5B21B6" font-weight="bold" text-anchor="middle">prose</text>
    <text x="169" y="180" font-family="sans-serif" font-size="8.5" fill="#475569" text-anchor="middle">"hard cut to a new</text>
    <text x="169" y="192" font-family="sans-serif" font-size="8.5" fill="#475569" text-anchor="middle">scene; bright outdoor</text>
    <text x="169" y="204" font-family="sans-serif" font-size="8.5" fill="#475569" text-anchor="middle">shot; subject viewing"</text>

    <!-- arrow prose -> HED -->
    <line x1="256" y1="185" x2="284" y2="185" stroke="#475569" stroke-width="1.4" marker-end="url(#arrowfwd)"/>

    <!-- output: validated HED string -->
    <rect x="286" y="148" width="170" height="74" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="1.2"/>
    <text x="371" y="164" font-family="sans-serif" font-size="9" fill="#065F46" font-weight="bold" text-anchor="middle">validated HED</text>
    <text x="371" y="180" font-family="monospace" font-size="8" fill="#065F46" text-anchor="middle">Sensory-event,</text>
    <text x="371" y="192" font-family="monospace" font-size="8" fill="#065F46" text-anchor="middle">Visual-presentation,</text>
    <text x="371" y="204" font-family="monospace" font-size="8" fill="#065F46" text-anchor="middle">(Onset, Scene-cut)</text>
    <text x="371" y="216" font-family="sans-serif" font-size="8" fill="#065F46" font-style="italic" text-anchor="middle">schema-valid</text>

    <text x="270" y="256" font-family="sans-serif" font-size="9.5" fill="#5B21B6" font-style="italic" text-anchor="middle">the recreate-the-stimulus bar in miniature</text>
  </g>

  <!-- Step 2: nemar dataset validate -->
  <g>
    <rect x="520" y="86" width="420" height="200" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.8"/>
    <rect x="520" y="86" width="420" height="32" rx="6" fill="#A7F3D0" stroke="#059669" stroke-width="1.8"/>
    <text x="730" y="107" font-family="sans-serif" font-size="12" fill="#065F46" font-weight="bold" text-anchor="middle">Step 2 -- validate the dataset</text>
    <!-- timing badge -->
    <rect x="894" y="74" width="50" height="22" rx="3" fill="#065F46"/>
    <text x="919" y="89" font-family="sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold" text-anchor="middle">~2:00</text>

    <text x="730" y="136" font-family="monospace" font-size="10.5" fill="#065F46" font-weight="bold" text-anchor="middle">nemar dataset validate</text>
    <text x="730" y="150" font-family="sans-serif" font-size="9.5" fill="#065F46" text-anchor="middle">run on the HBN practicum dataset</text>

    <!-- mock clean BIDS report terminal -->
    <rect x="556" y="158" width="348" height="98" rx="4" fill="#0F172A"/>
    <text x="570" y="176" font-family="monospace" font-size="9.5" fill="#94A3B8" text-anchor="start">$ nemar dataset validate ./hbn-shot</text>
    <text x="570" y="192" font-family="monospace" font-size="9.5" fill="#E2E8F0" text-anchor="start">BIDS: eeg  subjects: 12  runs: 24</text>
    <text x="570" y="208" font-family="monospace" font-size="9.5" fill="#34D399" text-anchor="start">errors:   0</text>
    <text x="570" y="224" font-family="monospace" font-size="9.5" fill="#FCD34D" text-anchor="start">warnings: 2  (non-blocking)</text>
    <text x="570" y="240" font-family="monospace" font-size="9.5" fill="#34D399" font-weight="bold" text-anchor="start">Ready for submission: YES</text>

    <text x="730" y="274" font-family="sans-serif" font-size="9.5" fill="#065F46" font-style="italic" text-anchor="middle">a clean BIDS report, validated at the gate</text>
  </g>

  <!-- connector arrow Step1 -> Step2 -->
  <line x1="482" y1="186" x2="516" y2="186" stroke="#475569" stroke-width="1.6" marker-end="url(#arrowfwd)"/>

  <!-- Bottom tail note -->
  <rect x="60" y="306" width="880" height="44" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="0.8"/>
  <text x="500" y="324" font-family="sans-serif" font-size="11" fill="#92400E" font-weight="bold" text-anchor="middle">We do not manufacture a pass.</text>
  <text x="500" y="340" font-family="sans-serif" font-size="10" fill="#78350F" font-style="italic" text-anchor="middle">If the validator flags real errors, we read them live and fix the data -- the report reflects the dataset, not our hopes.</text>
</svg>
