<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360">
  <text x="500" y="24" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">HED -- the fix in principle</text>
  <text x="500" y="42" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">Hierarchical Event Descriptors put the meaning into controlled, composable tags.</text>

  <defs>
    <marker id="arrow-hier" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrow-map" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- TOP zone: one HED tag string as a comma-separated path -->
  <text x="60" y="64" font-family="sans-serif" font-size="10" fill="#475569" font-style="italic" text-anchor="start">one tag = a comma-separated path through the schema</text>
  <rect x="60" y="70" width="880" height="40" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.8"/>
  <text x="74" y="95" font-family="monospace" font-size="11.5" fill="#065F46" text-anchor="start">Sensory-event, Visual-presentation, (Foreground-disk, (Contrast, High)), (Background, Uniform), (Temporal-frequency, 25 Hz)</text>

  <!-- BOTTOM-LEFT zone: inheritance hierarchy tree -->
  <g>
    <text x="60" y="138" font-family="sans-serif" font-size="12" fill="#065F46" font-weight="bold" text-anchor="start">analysis works at any level of the hierarchy</text>

    <!-- level 1: Action (top ancestor) -->
    <rect x="60" y="150" width="118" height="26" rx="5" fill="#EFF6FF" stroke="#94A3B8" stroke-width="1.2"/>
    <text x="119" y="167" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle">Action</text>
    <!-- level 2: Move -->
    <rect x="92" y="184" width="118" height="26" rx="5" fill="#EFF6FF" stroke="#94A3B8" stroke-width="1.2"/>
    <text x="151" y="201" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle">Move</text>
    <!-- level 3: Move-body-part -->
    <rect x="124" y="218" width="178" height="26" rx="5" fill="#EFF6FF" stroke="#94A3B8" stroke-width="1.2"/>
    <text x="213" y="235" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle">Move-body-part</text>
    <!-- level 4: Move-upper-extremity -->
    <rect x="156" y="252" width="218" height="26" rx="5" fill="#EFF6FF" stroke="#94A3B8" stroke-width="1.2"/>
    <text x="265" y="269" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle">Move-upper-extremity</text>
    <!-- level 5: Press (leaf, highlighted green) -->
    <rect x="188" y="286" width="118" height="26" rx="5" fill="#D1FAE5" stroke="#059669" stroke-width="1.8"/>
    <text x="247" y="303" font-family="monospace" font-size="11" fill="#065F46" font-weight="bold" text-anchor="middle">Press</text>

    <!-- connector arrows (elbow lines down the left edges) -->
    <path d="M 80 176 L 80 197 L 90 197" fill="none" stroke="#059669" stroke-width="1.2" marker-end="url(#arrow-hier)"/>
    <path d="M 112 210 L 112 231 L 122 231" fill="none" stroke="#059669" stroke-width="1.2" marker-end="url(#arrow-hier)"/>
    <path d="M 144 244 L 144 265 L 154 265" fill="none" stroke="#059669" stroke-width="1.2" marker-end="url(#arrow-hier)"/>
    <path d="M 176 278 L 176 299 L 186 299" fill="none" stroke="#059669" stroke-width="1.2" marker-end="url(#arrow-hier)"/>

    <!-- note pointing at leaf vs ancestor (sits clear, below the leaf box) -->
    <text x="320" y="288" font-family="sans-serif" font-size="9.5" fill="#065F46" text-anchor="start">tag at the leaf (Press)</text>
    <text x="320" y="301" font-family="sans-serif" font-size="9.5" fill="#065F46" text-anchor="start">OR at any ancestor: a</text>
    <text x="320" y="314" font-family="sans-serif" font-size="9.5" fill="#065F46" text-anchor="start">"Move" query matches all.</text>
  </g>

  <!-- vertical divider between bottom zones -->
  <line x1="490" y1="130" x2="490" y2="318" stroke="#CBD5E1" stroke-width="1"/>

  <!-- BOTTOM-RIGHT zone: sidecar pattern (events.tsv + events.json) -->
  <g>
    <text x="510" y="138" font-family="sans-serif" font-size="12" fill="#065F46" font-weight="bold" text-anchor="start">the sidecar pattern -- meaning lives beside the data</text>

    <!-- events.tsv (unchanged) -->
    <text x="510" y="156" font-family="monospace" font-size="9.5" fill="#475569" text-anchor="start">events.tsv (unchanged)</text>
    <rect x="510" y="160" width="150" height="118" rx="4" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.4"/>
    <rect x="510" y="160" width="150" height="24" rx="4" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.4"/>
    <line x1="585" y1="160" x2="585" y2="278" stroke="#CBD5E1" stroke-width="1"/>
    <text x="547" y="177" font-family="monospace" font-size="10" fill="#475569" font-weight="bold" text-anchor="middle">onset</text>
    <text x="622" y="177" font-family="monospace" font-size="10" fill="#475569" font-weight="bold" text-anchor="middle">value</text>
    <text x="547" y="203" font-family="monospace" font-size="10" fill="#1E293B" text-anchor="middle">0.000</text>
    <text x="622" y="203" font-family="monospace" font-size="11" fill="#1E40AF" font-weight="bold" text-anchor="middle">12</text>
    <text x="547" y="225" font-family="monospace" font-size="10" fill="#1E293B" text-anchor="middle">1.500</text>
    <text x="622" y="225" font-family="monospace" font-size="11" fill="#1E40AF" font-weight="bold" text-anchor="middle">14</text>
    <text x="547" y="247" font-family="monospace" font-size="10" fill="#1E293B" text-anchor="middle">3.000</text>
    <text x="622" y="247" font-family="monospace" font-size="11" fill="#1E40AF" font-weight="bold" text-anchor="middle">12</text>
    <text x="547" y="269" font-family="monospace" font-size="10" fill="#1E293B" text-anchor="middle">4.500</text>
    <text x="622" y="269" font-family="monospace" font-size="11" fill="#1E40AF" font-weight="bold" text-anchor="middle">13</text>

    <!-- mapping arrow -->
    <line x1="664" y1="219" x2="700" y2="219" stroke="#475569" stroke-width="1.4" marker-end="url(#arrow-map)"/>
    <text x="682" y="212" font-family="sans-serif" font-size="9" fill="#64748B" font-style="italic" text-anchor="middle">maps</text>

    <!-- events.json (HED keys) -->
    <text x="704" y="156" font-family="monospace" font-size="9.5" fill="#065F46" text-anchor="start">events.json (HED keys)</text>
    <rect x="704" y="160" width="236" height="118" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="1.6"/>
    <text x="714" y="177" font-family="monospace" font-size="9" fill="#065F46" text-anchor="start">"value": {</text>
    <text x="726" y="192" font-family="monospace" font-size="9" fill="#065F46" text-anchor="start">"HED": {</text>
    <text x="738" y="207" font-family="monospace" font-size="9" fill="#065F46" text-anchor="start">"12": "Sensory-event,</text>
    <text x="762" y="219" font-family="monospace" font-size="9" fill="#065F46" text-anchor="start">Visual-presentation,</text>
    <text x="762" y="231" font-family="monospace" font-size="9" fill="#065F46" text-anchor="start">(Contrast, High)",</text>
    <text x="738" y="246" font-family="monospace" font-size="9" fill="#065F46" text-anchor="start">"14": "Sensory-event,</text>
    <text x="762" y="258" font-family="monospace" font-size="9" fill="#065F46" text-anchor="start">(Background, Uniform)"</text>
    <text x="726" y="270" font-family="monospace" font-size="9" fill="#065F46" text-anchor="start">}</text>
  </g>

  <!-- right-zone caption -->
  <text x="724" y="294" font-family="sans-serif" font-size="9.5" fill="#475569" font-style="italic" text-anchor="middle">events.tsv unchanged; meaning lives in events.json</text>

  <!-- Bottom moral strip -->
  <rect x="60" y="334" width="880" height="20" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="0.8"/>
  <text x="500" y="348" font-family="sans-serif" font-size="10.5" fill="#065F46" font-weight="bold" text-anchor="middle">Controlled, composable, validatable -- the schema means the same thing across labs.</text>
</svg>
