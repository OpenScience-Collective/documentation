<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" width="960" height="360">
  <text x="480" y="26" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Aims-page style rules -- the agent enforces them at draft time</text>

  <!-- 4 rule cards, 2x2 grid -->
  <!-- Bold strategically -->
  <g>
    <rect x="50" y="60" width="420" height="130" rx="10" fill="#FEF3C7" stroke="#B45309" stroke-width="1.6"/>
    <text x="68" y="84" font-family="sans-serif" font-size="13" fill="#7C2D12" font-weight="bold">1. Bold strategically</text>
    <text x="68" y="104" font-family="sans-serif" font-size="11.5" fill="#1E293B">The overarching goal sentence,</text>
    <text x="68" y="120" font-family="sans-serif" font-size="11.5" fill="#1E293B">aim titles, one key innovation per aim,</text>
    <text x="68" y="136" font-family="sans-serif" font-size="11.5" fill="#1E293B">memorable phrases.</text>
    <text x="68" y="160" font-family="sans-serif" font-size="11" fill="#7C2D12" font-style="italic">"If everything is bold, nothing is."</text>
    <text x="68" y="178" font-family="monospace" font-size="11" fill="#475569">enforced by: grant-writing template</text>
  </g>

  <!-- Italic hypotheses -->
  <g>
    <rect x="490" y="60" width="420" height="130" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.6"/>
    <text x="508" y="84" font-family="sans-serif" font-size="13" fill="#5B21B6" font-weight="bold">2. Italicise hypothesis labels</text>
    <text x="508" y="104" font-family="sans-serif" font-size="11.5" fill="#1E293B" font-style="italic">Hypothesis 1A: <tspan font-style="normal">one sentence,</tspan></text>
    <text x="508" y="120" font-family="sans-serif" font-size="11.5" fill="#1E293B">testable, directional.</text>
    <text x="508" y="144" font-family="sans-serif" font-size="11" fill="#5B21B6" font-style="italic">Continuation on the same line if</text>
    <text x="508" y="160" font-family="sans-serif" font-size="11" fill="#5B21B6" font-style="italic">space is tight.</text>
    <text x="508" y="178" font-family="monospace" font-size="11" fill="#475569">enforced by: grant-writing template</text>
  </g>

  <!-- Active voice -->
  <g>
    <rect x="50" y="206" width="420" height="130" rx="10" fill="#D1FAE5" stroke="#059669" stroke-width="1.6"/>
    <text x="68" y="230" font-family="sans-serif" font-size="13" fill="#065F46" font-weight="bold">3. Active voice. Quantify.</text>
    <text x="68" y="252" font-family="monospace" font-size="11" fill="#065F46">+  "We will demonstrate ..."</text>
    <text x="68" y="270" font-family="monospace" font-size="11" fill="#991B1B">-  "It will be demonstrated ..."</text>
    <text x="68" y="294" font-family="monospace" font-size="11" fill="#065F46">+  "N=24 across 6 months"</text>
    <text x="68" y="312" font-family="monospace" font-size="11" fill="#991B1B">-  "an adequate sample"</text>
  </g>

  <!-- No em-dashes, define abbreviations -->
  <g>
    <rect x="490" y="206" width="420" height="130" rx="10" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.6"/>
    <text x="508" y="230" font-family="sans-serif" font-size="13" fill="#991B1B" font-weight="bold">4. No em-dashes. Define abbreviations.</text>
    <text x="508" y="252" font-family="monospace" font-size="11" fill="#991B1B">-  Brain-Imaging Data Structure</text>
    <text x="508" y="270" font-family="monospace" font-size="11" fill="#065F46">+  Brain Imaging Data Structure (BIDS)</text>
    <text x="508" y="294" font-family="monospace" font-size="11" fill="#991B1B">-  ...rigour --- not negotiable</text>
    <text x="508" y="312" font-family="monospace" font-size="11" fill="#065F46">+  ...rigour, which is not negotiable</text>
  </g>
</svg>
