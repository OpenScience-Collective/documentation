<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" width="1000" height="380">
  <text x="500" y="26" font-family="sans-serif" font-size="16" fill="#1E293B" font-weight="bold" text-anchor="middle">The trigger description decides everything</text>
  <text x="500" y="46" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">third person, full of the exact phrases a user would say -- or the skill never loads</text>

  <!-- dissected description line -->
  <rect x="60" y="70" width="880" height="74" rx="8" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.4"/>
  <text x="80" y="98" font-family="monospace" font-size="11.5" fill="#1E293B"><tspan fill="#0891B2" font-weight="bold">description:</tspan> "This skill should be used when the user asks to</text>
  <text x="80" y="118" font-family="monospace" font-size="11.5" fill="#16A34A" font-weight="bold">  "analyze shot-change ERPs", "epoch around movie cuts", "shot-onset ERP"...</text>
  <text x="80" y="135" font-family="sans-serif" font-size="10" font-style="italic" fill="#64748B">third person ("This skill should be used when...")  +  the exact phrases users actually type</text>

  <!-- PASS card -->
  <rect x="60" y="166" width="415" height="150" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.8"/>
  <rect x="60" y="166" width="415" height="26" rx="8" fill="#BBF7D0" stroke="#16A34A" stroke-width="1.8"/>
  <text x="80" y="184" font-family="sans-serif" font-size="12" font-weight="bold" fill="#166534">PASS -- it will fire</text>
  <text x="80" y="214" font-family="sans-serif" font-size="11" fill="#166534">Specific intent + concrete phrases:</text>
  <text x="80" y="236" font-family="monospace" font-size="10" fill="#14532D">"...asks to 'convert to BIDS',</text>
  <text x="80" y="251" font-family="monospace" font-size="10" fill="#14532D">'create a BIDS sidecar',</text>
  <text x="80" y="266" font-family="monospace" font-size="10" fill="#14532D">'validate BIDS compliance'..."</text>
  <text x="80" y="296" font-family="sans-serif" font-size="10" fill="#166534">Claude matches a real user message to it.</text>

  <!-- FAIL card -->
  <rect x="525" y="166" width="415" height="150" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.8"/>
  <rect x="525" y="166" width="415" height="26" rx="8" fill="#FECACA" stroke="#DC2626" stroke-width="1.8"/>
  <text x="545" y="184" font-family="sans-serif" font-size="12" font-weight="bold" fill="#991B1B">FAIL -- it stays asleep</text>
  <text x="545" y="214" font-family="sans-serif" font-size="11" fill="#991B1B">Vague, no phrases, wrong person:</text>
  <text x="545" y="240" font-family="monospace" font-size="10" fill="#7F1D1D">"Provides guidance for figures."</text>
  <text x="545" y="262" font-family="monospace" font-size="10" fill="#7F1D1D">"Use this when working with data."</text>
  <text x="545" y="296" font-family="sans-serif" font-size="10" fill="#991B1B">Nothing for Claude to match -- it never loads.</text>

  <!-- bottom strip -->
  <rect x="60" y="338" width="880" height="26" rx="5" fill="#F1F5F9" stroke="#94A3B8" stroke-width="0.6"/>
  <text x="500" y="355" font-family="sans-serif" font-size="11.5" fill="#1E293B" text-anchor="middle" font-weight="bold">The body is for when it loads. The description is whether it loads.</text>
</svg>
