<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" width="1000" height="340">
  <text x="500" y="26" font-family="sans-serif" font-size="16" fill="#1E293B" font-weight="bold" text-anchor="middle">Version it, then share it</text>
  <text x="500" y="46" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">semantic versioning per plugin, and three ways to put it in others' hands</text>

  <!-- LEFT: version -->
  <rect x="60" y="72" width="430" height="218" rx="10" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.4"/>
  <text x="80" y="98" font-family="sans-serif" font-size="12" font-weight="bold" fill="#475569">VERSION  (per plugin)</text>

  <text x="275" y="148" font-family="monospace" font-size="34" font-weight="bold" fill="#1E293B" text-anchor="middle"><tspan fill="#94A3B8">0</tspan> . <tspan fill="#2563EB">3</tspan> . <tspan fill="#16A34A">0</tspan></text>
  <text x="153" y="172" font-family="sans-serif" font-size="10" font-weight="bold" fill="#94A3B8" text-anchor="middle">MAJOR</text>
  <text x="153" y="186" font-family="sans-serif" font-size="8.5" fill="#94A3B8" text-anchor="middle">breaking</text>
  <text x="275" y="172" font-family="sans-serif" font-size="10" font-weight="bold" fill="#2563EB" text-anchor="middle">MINOR</text>
  <text x="275" y="186" font-family="sans-serif" font-size="8.5" fill="#2563EB" text-anchor="middle">new skill/plugin</text>
  <text x="397" y="172" font-family="sans-serif" font-size="10" font-weight="bold" fill="#16A34A" text-anchor="middle">PATCH</text>
  <text x="397" y="186" font-family="sans-serif" font-size="8.5" fill="#16A34A" text-anchor="middle">edit within</text>

  <rect x="80" y="210" width="390" height="30" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
  <text x="275" y="229" font-family="sans-serif" font-size="10.5" fill="#1E40AF" text-anchor="middle">add a new skill  →  minor bump (0.x.0)</text>
  <rect x="80" y="246" width="390" height="30" rx="5" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.2"/>
  <text x="275" y="265" font-family="sans-serif" font-size="10.5" fill="#166534" text-anchor="middle">edit within a plugin  →  patch bump (0.x.y)</text>

  <!-- RIGHT: share -->
  <rect x="510" y="72" width="430" height="218" rx="10" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.4"/>
  <text x="530" y="98" font-family="sans-serif" font-size="12" font-weight="bold" fill="#475569">SHARE  (three paths)</text>

  <rect x="530" y="118" width="390" height="46" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.4"/>
  <text x="548" y="139" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1E40AF">Push your fork</text>
  <text x="548" y="156" font-family="sans-serif" font-size="9.5" fill="#475569">your lab installs from your repo</text>

  <rect x="530" y="170" width="390" height="46" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.4"/>
  <text x="548" y="191" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1E40AF">Open a pull request upstream</text>
  <text x="548" y="208" font-family="sans-serif" font-size="9.5" fill="#475569">contribute it back to research-skills</text>

  <rect x="530" y="222" width="390" height="46" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.4"/>
  <text x="548" y="243" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1E40AF">Post it in the OSC Discord</text>
  <text x="548" y="260" font-family="sans-serif" font-size="9.5" fill="#475569">the community installs and gives feedback</text>

  <!-- bottom strip -->
  <rect x="60" y="300" width="880" height="24" rx="5" fill="#F1F5F9" stroke="#94A3B8" stroke-width="0.6"/>
  <text x="500" y="316" font-family="sans-serif" font-size="11" fill="#1E293B" text-anchor="middle" font-weight="bold">A skill your lab can install beats a script in your downloads folder.</text>
</svg>
