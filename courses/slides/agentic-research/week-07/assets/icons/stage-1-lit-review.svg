<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" width="960" height="320">
  <text x="480" y="22" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Stage 1 -- Lit review (inherits Week 5)</text>
  <text x="480" y="40" font-family="sans-serif" font-size="11.5" fill="#64748B" font-style="italic" text-anchor="middle">Week-5 corpus feeds the manuscript; /manuscript:manuscript-formatting picks the structure</text>

  <!-- LEFT: Corpus folder (Amber) -->
  <g>
    <rect x="60" y="62" width="300" height="246" rx="6" fill="#FFFFFF" stroke="#B45309" stroke-width="1.4"/>
    <rect x="60" y="62" width="300" height="22" rx="6" fill="#FEF3C7" stroke="#B45309" stroke-width="1.4"/>
    <text x="210" y="78" font-family="sans-serif" font-size="11.5" fill="#78350F" font-weight="bold" text-anchor="middle">lit-review/  (Week-5 corpus)</text>

    <text x="74" y="106" font-family="monospace" font-size="10.5" fill="#1E293B">+ psychophysics/</text>
    <text x="84" y="120" font-family="monospace" font-size="10" fill="#475569">  hasson-2004/card.md</text>
    <text x="84" y="133" font-family="monospace" font-size="10" fill="#475569">  dmochowski-2012/card.md</text>

    <text x="74" y="154" font-family="monospace" font-size="10.5" fill="#1E293B">+ action/</text>
    <text x="84" y="168" font-family="monospace" font-size="10" fill="#475569">  hasson-2008/card.md</text>

    <text x="74" y="188" font-family="monospace" font-size="10.5" fill="#1E293B">+ language/</text>
    <text x="84" y="202" font-family="monospace" font-size="10" fill="#475569">  huth-2016/card.md</text>

    <text x="74" y="222" font-family="monospace" font-size="10.5" fill="#1E293B">+ emotion/</text>
    <text x="84" y="236" font-family="monospace" font-size="10" fill="#475569">  saarimaki-2016/card.md</text>

    <text x="210" y="282" font-family="sans-serif" font-size="10" fill="#78350F" font-style="italic" text-anchor="middle">paper-cards addressable by relative path</text>
  </g>

  <!-- Arrow into the structure picker -->
  <path d="M370 184 L450 184" fill="none" stroke="#475569" stroke-width="2"/>
  <polygon points="450,184 442,180 442,188" fill="#475569"/>

  <!-- RIGHT: Structure picker (Blue with narrative highlighted) -->
  <g>
    <rect x="460" y="62" width="440" height="246" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.4"/>
    <rect x="460" y="62" width="440" height="22" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
    <text x="680" y="78" font-family="sans-serif" font-size="11.5" fill="#1E40AF" font-weight="bold" text-anchor="middle">/manuscript:manuscript-formatting  --  pick a structure</text>

    <!-- 5 options, two-line rows, tighter heights -->
    <rect x="476" y="96" width="408" height="34" rx="3" fill="#F8FAFC" stroke="#94A3B8" stroke-width="0.8"/>
    <circle cx="494" cy="113" r="4" fill="none" stroke="#94A3B8" stroke-width="1"/>
    <text x="508" y="110" font-family="sans-serif" font-size="11" fill="#1E293B" font-weight="bold">Mini-review</text>
    <text x="508" y="124" font-family="sans-serif" font-size="10" fill="#475569">focused, single-question synthesis</text>

    <rect x="476" y="136" width="408" height="34" rx="3" fill="#F8FAFC" stroke="#94A3B8" stroke-width="0.8"/>
    <circle cx="494" cy="153" r="4" fill="none" stroke="#94A3B8" stroke-width="1"/>
    <text x="508" y="150" font-family="sans-serif" font-size="11" fill="#1E293B" font-weight="bold">Scoping review</text>
    <text x="508" y="164" font-family="sans-serif" font-size="10" fill="#475569">map the extent of the field; broad categorisation</text>

    <rect x="476" y="176" width="408" height="34" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
    <circle cx="494" cy="193" r="4" fill="#2563EB"/>
    <text x="508" y="190" font-family="sans-serif" font-size="11" fill="#1E40AF" font-weight="bold">Narrative review  &lt;-- live demo</text>
    <text x="508" y="204" font-family="sans-serif" font-size="10" fill="#1E40AF">thematic synthesis with an argument</text>

    <rect x="476" y="216" width="408" height="34" rx="3" fill="#F8FAFC" stroke="#94A3B8" stroke-width="0.8"/>
    <circle cx="494" cy="233" r="4" fill="none" stroke="#94A3B8" stroke-width="1"/>
    <text x="508" y="230" font-family="sans-serif" font-size="11" fill="#1E293B" font-weight="bold">Systematic review</text>
    <text x="508" y="244" font-family="sans-serif" font-size="10" fill="#475569">exhaustive search under a PRISMA protocol</text>

    <rect x="476" y="256" width="408" height="22" rx="3" fill="#F8FAFC" stroke="#94A3B8" stroke-width="0.8"/>
    <circle cx="494" cy="267" r="4" fill="none" stroke="#94A3B8" stroke-width="1"/>
    <text x="508" y="271" font-family="sans-serif" font-size="11" fill="#1E293B" font-weight="bold">IMRAD background  --  Introduction of a paper or grant</text>
  </g>
</svg>
