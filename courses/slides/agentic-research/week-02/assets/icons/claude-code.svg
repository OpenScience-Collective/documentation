<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Terminal window frame -->
  <rect x="20" y="30" width="160" height="140" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="20" y="30" width="160" height="24" rx="8" fill="#334155"/>
  <rect x="20" y="46" width="160" height="8" fill="#334155"/>
  <!-- Window dots -->
  <circle cx="36" cy="42" r="4" fill="#EF4444"/>
  <circle cx="50" cy="42" r="4" fill="#F59E0B"/>
  <circle cx="64" cy="42" r="4" fill="#22C55E"/>
  <!-- Prompt line -->
  <text x="32" y="76" font-family="monospace" font-size="12" fill="#22C55E" font-weight="bold">$</text>
  <text x="44" y="76" font-family="monospace" font-size="12" fill="#94A3B8">claude</text>
  <!-- Code lines -->
  <rect x="32" y="88" width="80" height="3" rx="1.5" fill="#2563EB" opacity="0.7"/>
  <rect x="32" y="98" width="120" height="3" rx="1.5" fill="#94A3B8" opacity="0.4"/>
  <rect x="32" y="108" width="60" height="3" rx="1.5" fill="#94A3B8" opacity="0.4"/>
  <rect x="32" y="118" width="100" height="3" rx="1.5" fill="#F59E0B" opacity="0.5"/>
  <rect x="32" y="128" width="70" height="3" rx="1.5" fill="#94A3B8" opacity="0.4"/>
  <!-- Cursor blink -->
  <rect x="32" y="140" width="8" height="14" fill="#22C55E" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <!-- AI sparkle -->
  <circle cx="155" cy="42" r="3" fill="#A78BFA"/>
  <path d="M150 37 L155 32 L160 37 L155 42 Z" fill="#A78BFA" opacity="0.6"/>
</svg>
