<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360">
  <text x="500" y="24" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">events.tsv is thin -- an onset and a cryptic code</text>
  <text x="500" y="42" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">The shared events file carries timing and a number; everything that gives it meaning is left out.</text>

  <defs>
    <marker id="arrow-gap" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- LEFT panel: thin events.tsv table -->
  <g>
    <text x="220" y="74" font-family="sans-serif" font-size="12" fill="#1E40AF" font-weight="bold" text-anchor="middle">what the file actually holds</text>
    <text x="220" y="90" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">sub-01_task-movie_events.tsv</text>

    <!-- table outer frame -->
    <rect x="60" y="102" width="320" height="168" rx="4" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.6"/>
    <!-- header band -->
    <rect x="60" y="102" width="320" height="28" rx="4" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.6"/>
    <line x1="60" y1="130" x2="380" y2="130" stroke="#2563EB" stroke-width="1.2"/>
    <!-- column separators -->
    <line x1="167" y1="102" x2="167" y2="270" stroke="#CBD5E1" stroke-width="1"/>
    <line x1="274" y1="102" x2="274" y2="270" stroke="#CBD5E1" stroke-width="1"/>
    <!-- header labels -->
    <text x="113" y="121" font-family="monospace" font-size="11" fill="#1E40AF" font-weight="bold" text-anchor="middle">onset</text>
    <text x="220" y="121" font-family="monospace" font-size="11" fill="#1E40AF" font-weight="bold" text-anchor="middle">duration</text>
    <text x="327" y="121" font-family="monospace" font-size="11" fill="#1E40AF" font-weight="bold" text-anchor="middle">value</text>
    <!-- row gridlines -->
    <line x1="60" y1="165" x2="380" y2="165" stroke="#EFF6FF" stroke-width="1"/>
    <line x1="60" y1="200" x2="380" y2="200" stroke="#EFF6FF" stroke-width="1"/>
    <line x1="60" y1="235" x2="380" y2="235" stroke="#EFF6FF" stroke-width="1"/>
    <!-- row 1 -->
    <text x="113" y="153" font-family="monospace" font-size="11" fill="#1E293B" text-anchor="middle">0.000</text>
    <text x="220" y="153" font-family="monospace" font-size="11" fill="#94A3B8" text-anchor="middle">n/a</text>
    <text x="327" y="153" font-family="monospace" font-size="12" fill="#991B1B" font-weight="bold" text-anchor="middle">12</text>
    <!-- row 2 -->
    <text x="113" y="188" font-family="monospace" font-size="11" fill="#1E293B" text-anchor="middle">1.500</text>
    <text x="220" y="188" font-family="monospace" font-size="11" fill="#94A3B8" text-anchor="middle">n/a</text>
    <text x="327" y="188" font-family="monospace" font-size="12" fill="#991B1B" font-weight="bold" text-anchor="middle">14</text>
    <!-- row 3 -->
    <text x="113" y="223" font-family="monospace" font-size="11" fill="#1E293B" text-anchor="middle">3.000</text>
    <text x="220" y="223" font-family="monospace" font-size="11" fill="#94A3B8" text-anchor="middle">n/a</text>
    <text x="327" y="223" font-family="monospace" font-size="12" fill="#991B1B" font-weight="bold" text-anchor="middle">12</text>
    <!-- row 4 -->
    <text x="113" y="258" font-family="monospace" font-size="11" fill="#1E293B" text-anchor="middle">4.500</text>
    <text x="220" y="258" font-family="monospace" font-size="11" fill="#94A3B8" text-anchor="middle">n/a</text>
    <text x="327" y="258" font-family="monospace" font-size="12" fill="#991B1B" font-weight="bold" text-anchor="middle">13</text>
  </g>

  <!-- contrast arrow between panels -->
  <line x1="392" y1="186" x2="448" y2="186" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow-gap)"/>
  <text x="420" y="176" font-family="sans-serif" font-size="9.5" fill="#64748B" font-style="italic" text-anchor="middle">but</text>

  <!-- RIGHT panel: what's missing (red) -->
  <g>
    <rect x="460" y="102" width="480" height="168" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.6"/>
    <rect x="460" y="102" width="480" height="28" rx="6" fill="#FECACA" stroke="#DC2626" stroke-width="1.6"/>
    <text x="700" y="121" font-family="sans-serif" font-size="12" fill="#7F1D1D" font-weight="bold" text-anchor="middle">what the code "12" never tells you</text>

    <!-- missing item 1 -->
    <text x="486" y="155" font-family="sans-serif" font-size="13" fill="#DC2626" font-weight="bold" text-anchor="middle">x</text>
    <text x="504" y="155" font-family="sans-serif" font-size="11" fill="#7F1D1D" text-anchor="start" text-decoration="line-through">stimulus content -- what was on screen?</text>
    <!-- missing item 2 -->
    <text x="486" y="178" font-family="sans-serif" font-size="13" fill="#DC2626" font-weight="bold" text-anchor="middle">x</text>
    <text x="504" y="178" font-family="sans-serif" font-size="11" fill="#7F1D1D" text-anchor="start" text-decoration="line-through">modality -- visual or audio?</text>
    <!-- missing item 3 -->
    <text x="486" y="201" font-family="sans-serif" font-size="13" fill="#DC2626" font-weight="bold" text-anchor="middle">x</text>
    <text x="504" y="201" font-family="sans-serif" font-size="11" fill="#7F1D1D" text-anchor="start" text-decoration="line-through">condition -- foreground vs background contrast?</text>
    <!-- missing item 4 -->
    <text x="486" y="224" font-family="sans-serif" font-size="13" fill="#DC2626" font-weight="bold" text-anchor="middle">x</text>
    <text x="504" y="224" font-family="sans-serif" font-size="11" fill="#7F1D1D" text-anchor="start" text-decoration="line-through">participant response -- was there one?</text>
    <!-- missing item 5 -->
    <text x="486" y="247" font-family="sans-serif" font-size="13" fill="#DC2626" font-weight="bold" text-anchor="middle">x</text>
    <text x="504" y="247" font-family="sans-serif" font-size="11" fill="#7F1D1D" text-anchor="start" text-decoration="line-through">trial context -- which block, which run?</text>
  </g>

  <!-- HBN note -->
  <rect x="60" y="282" width="880" height="22" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="0.8"/>
  <text x="500" y="297" font-family="sans-serif" font-size="10" fill="#92400E" text-anchor="middle">HBN originally shipped numeric event codes; step one was replacing them with meaningful strings.</text>

  <!-- Bottom moral strip -->
  <rect x="60" y="334" width="880" height="20" rx="4" fill="#F1F5F9" stroke="#94A3B8" stroke-width="0.6"/>
  <text x="500" y="348" font-family="sans-serif" font-size="10.5" fill="#1E293B" text-anchor="middle">The meaning isn't lost -- it just never reaches the shared file.</text>
</svg>
