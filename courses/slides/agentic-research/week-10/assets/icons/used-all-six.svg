  <text x="800" y="92" font-family="monospace" font-size="9" fill="#5B21B6" text-anchor="middle">figure-qa</text>
  <text x="800" y="110" font-family="sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">Wk8</text>
