<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Terminal window -->
  <rect x="20" y="30" width="160" height="140" rx="12" fill="#1E293B"/>
  <!-- Title bar -->
  <rect x="20" y="30" width="160" height="28" rx="12" fill="#334155"/>
  <rect x="20" y="46" width="160" height="12" fill="#334155"/>
  <!-- Traffic lights -->
  <circle cx="40" cy="44" r="5" fill="#EF4444"/>
  <circle cx="56" cy="44" r="5" fill="#F59E0B"/>
  <circle cx="72" cy="44" r="5" fill="#22C55E"/>
  <!-- Prompt line 1 -->
  <text x="38" y="92" font-family="SF Mono, Monaco, monospace" font-size="20" font-weight="bold" fill="#2563EB">$</text>
  <text x="58" y="92" font-family="SF Mono, Monaco, monospace" font-size="16" fill="#94A3B8">git init</text>
  <!-- Prompt line 2 -->
  <text x="38" y="120" font-family="SF Mono, Monaco, monospace" font-size="20" font-weight="bold" fill="#F59E0B">&gt;</text>
  <rect x="58" y="110" width="8" height="16" fill="#F59E0B" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
