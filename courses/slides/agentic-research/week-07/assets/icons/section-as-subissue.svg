<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" width="960" height="320">
  <text x="480" y="22" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Section-as-sub-issue -- the Week 3 pattern applied to prose</text>
  <text x="480" y="40" font-family="sans-serif" font-size="11.5" fill="#64748B" font-style="italic" text-anchor="middle">One sub-issue per IMRAD section -- parallel worktrees into manuscript/</text>

  <!-- Epic at top -->
  <g>
    <rect x="360" y="56" width="240" height="46" rx="6" fill="#FEF3C7" stroke="#B45309" stroke-width="1.6"/>
    <circle cx="378" cy="71" r="6" fill="#FFFFFF" stroke="#B45309" stroke-width="1.4"/>
    <circle cx="378" cy="71" r="2.5" fill="#B45309"/>
    <text x="392" y="75" font-family="sans-serif" font-size="11" fill="#78350F" font-weight="bold">Epic #N -- Manuscript: naturalistic-stimuli review</text>
    <text x="392" y="92" font-family="monospace" font-size="9.5" fill="#92400E">label: epic, paper</text>
  </g>

  <!-- 4 branching lines from epic to sub-issues -->
  <path d="M480 102 L480 122 L150 122 L150 142" fill="none" stroke="#94A3B8" stroke-width="1.4"/>
  <path d="M480 102 L480 122 L370 122 L370 142" fill="none" stroke="#94A3B8" stroke-width="1.4"/>
  <path d="M480 102 L480 122 L590 122 L590 142" fill="none" stroke="#94A3B8" stroke-width="1.4"/>
  <path d="M480 102 L480 122 L810 122 L810 142" fill="none" stroke="#94A3B8" stroke-width="1.4"/>

  <!-- 4 sub-issues (IMRAD sections) -->
  <g>
    <rect x="60" y="142" width="180" height="44" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
    <circle cx="78" cy="158" r="5" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2"/>
    <circle cx="78" cy="158" r="2" fill="#2563EB"/>
    <text x="90" y="162" font-family="sans-serif" font-size="10.5" fill="#1E40AF" font-weight="bold">#N+1 -- Introduction</text>
    <text x="90" y="178" font-family="monospace" font-size="9" fill="#475569">feature/issue-N+1-intro</text>
  </g>
  <g>
    <rect x="280" y="142" width="180" height="44" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
    <circle cx="298" cy="158" r="5" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2"/>
    <circle cx="298" cy="158" r="2" fill="#2563EB"/>
    <text x="310" y="162" font-family="sans-serif" font-size="10.5" fill="#1E40AF" font-weight="bold">#N+2 -- Methods</text>
    <text x="310" y="178" font-family="monospace" font-size="9" fill="#475569">feature/issue-N+2-methods</text>
  </g>
  <g>
    <rect x="500" y="142" width="180" height="44" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
    <circle cx="518" cy="158" r="5" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2"/>
    <circle cx="518" cy="158" r="2" fill="#2563EB"/>
    <text x="530" y="162" font-family="sans-serif" font-size="10.5" fill="#1E40AF" font-weight="bold">#N+3 -- Results</text>
    <text x="530" y="178" font-family="monospace" font-size="9" fill="#475569">feature/issue-N+3-results</text>
  </g>
  <g>
    <rect x="720" y="142" width="180" height="44" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
    <circle cx="738" cy="158" r="5" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2"/>
    <circle cx="738" cy="158" r="2" fill="#2563EB"/>
    <text x="750" y="162" font-family="sans-serif" font-size="10.5" fill="#1E40AF" font-weight="bold">#N+4 -- Discussion</text>
    <text x="750" y="178" font-family="monospace" font-size="9" fill="#475569">feature/issue-N+4-discussion</text>
  </g>

  <!-- arrows down to PRs -->
  <path d="M150 186 L150 210" fill="none" stroke="#475569" stroke-width="1.4"/>
  <polygon points="150,210 146,202 154,202" fill="#475569"/>
  <path d="M370 186 L370 210" fill="none" stroke="#475569" stroke-width="1.4"/>
  <polygon points="370,210 366,202 374,202" fill="#475569"/>
  <path d="M590 186 L590 210" fill="none" stroke="#475569" stroke-width="1.4"/>
  <polygon points="590,210 586,202 594,202" fill="#475569"/>
  <path d="M810 186 L810 210" fill="none" stroke="#475569" stroke-width="1.4"/>
  <polygon points="810,210 806,202 814,202" fill="#475569"/>

  <!-- PRs -->
  <g>
    <rect x="100" y="212" width="100" height="32" rx="4" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2"/>
    <text x="150" y="226" font-family="sans-serif" font-size="9.5" fill="#1E40AF" font-weight="bold" text-anchor="middle">PR -- intro</text>
    <text x="150" y="238" font-family="monospace" font-size="8.5" fill="#16A34A" text-anchor="middle">CI: pass</text>
  </g>
  <g>
    <rect x="320" y="212" width="100" height="32" rx="4" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2"/>
    <text x="370" y="226" font-family="sans-serif" font-size="9.5" fill="#1E40AF" font-weight="bold" text-anchor="middle">PR -- methods</text>
    <text x="370" y="238" font-family="monospace" font-size="8.5" fill="#16A34A" text-anchor="middle">CI: pass</text>
  </g>
  <g>
    <rect x="540" y="212" width="100" height="32" rx="4" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2"/>
    <text x="590" y="226" font-family="sans-serif" font-size="9.5" fill="#1E40AF" font-weight="bold" text-anchor="middle">PR -- results</text>
    <text x="590" y="238" font-family="monospace" font-size="8.5" fill="#16A34A" text-anchor="middle">CI: pass</text>
  </g>
  <g>
    <rect x="760" y="212" width="100" height="32" rx="4" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2"/>
    <text x="810" y="226" font-family="sans-serif" font-size="9.5" fill="#1E40AF" font-weight="bold" text-anchor="middle">PR -- discussion</text>
    <text x="810" y="238" font-family="monospace" font-size="8.5" fill="#16A34A" text-anchor="middle">CI: pass</text>
  </g>

  <!-- arrows converging into manuscript/ -->
  <path d="M150 244 L150 266 L480 266 L480 270" fill="none" stroke="#475569" stroke-width="1.4"/>
  <path d="M370 244 L370 266" fill="none" stroke="#475569" stroke-width="1.4"/>
  <path d="M590 244 L590 266" fill="none" stroke="#475569" stroke-width="1.4"/>
  <path d="M810 244 L810 266 L480 266" fill="none" stroke="#475569" stroke-width="1.4"/>
  <polygon points="480,270 476,262 484,262" fill="#475569"/>

  <!-- manuscript/ branch -->
  <g>
    <rect x="360" y="272" width="240" height="34" rx="5" fill="#D1FAE5" stroke="#059669" stroke-width="1.6"/>
    <text x="480" y="294" font-family="sans-serif" font-size="11.5" fill="#065F46" font-weight="bold" text-anchor="middle">manuscript/  (long-lived branch)</text>
  </g>

  <text x="480" y="316" font-family="sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">merges to main only at submission</text>
</svg>
