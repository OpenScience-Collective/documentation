<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320">
  <!-- Title -->
  <text x="380" y="22" font-family="sans-serif" font-size="14" fill="#1E293B" font-weight="bold" text-anchor="middle">Bias and rigor</text>

  <!-- Shield 1: Calibration anchors (blue) -->
  <g>
    <path d="M150 60 L210 60 L210 132 Q 210 168, 180 184 Q 150 168, 150 132 Z" fill="#DBEAFE" stroke="#2563EB" stroke-width="2.2"/>
    <!-- shield emblem: three bars -->
    <rect x="166" y="92" width="28" height="6" rx="2" fill="#2563EB"/>
    <rect x="170" y="106" width="20" height="6" rx="2" fill="#2563EB"/>
    <rect x="174" y="120" width="12" height="6" rx="2" fill="#2563EB"/>
    <text x="180" y="216" font-family="sans-serif" font-size="13" fill="#1E40AF" font-weight="bold" text-anchor="middle">Calibration anchors</text>
    <text x="180" y="234" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">at scoring time</text>
    <rect x="120" y="248" width="120" height="22" rx="11" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2"/>
    <text x="180" y="264" font-family="monospace" font-size="10" fill="#1E40AF" text-anchor="middle">Stage 2</text>
  </g>

  <!-- Shield 2: Cite-the-card (green) -->
  <g>
    <path d="M350 60 L410 60 L410 132 Q 410 168, 380 184 Q 350 168, 350 132 Z" fill="#D1FAE5" stroke="#059669" stroke-width="2.2"/>
    <!-- shield emblem: card icon -->
    <rect x="368" y="94" width="24" height="32" rx="2" fill="#FFFFFF" stroke="#059669" stroke-width="1.6"/>
    <line x1="372" y1="102" x2="388" y2="102" stroke="#059669" stroke-width="1.4"/>
    <line x1="372" y1="110" x2="386" y2="110" stroke="#059669" stroke-width="1.4"/>
    <line x1="372" y1="118" x2="384" y2="118" stroke="#059669" stroke-width="1.4"/>
    <text x="380" y="216" font-family="sans-serif" font-size="13" fill="#064E3B" font-weight="bold" text-anchor="middle">Cite-the-card</text>
    <text x="380" y="234" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">at drafting time</text>
    <rect x="320" y="248" width="120" height="22" rx="11" fill="#FFFFFF" stroke="#059669" stroke-width="1.2"/>
    <text x="380" y="264" font-family="monospace" font-size="10" fill="#064E3B" text-anchor="middle">Stage 4</text>
  </g>

  <!-- Shield 3: Boomerang (red) -->
  <g>
    <path d="M550 60 L610 60 L610 132 Q 610 168, 580 184 Q 550 168, 550 132 Z" fill="#FEE2E2" stroke="#DC2626" stroke-width="2.2"/>
    <!-- shield emblem: curved arrow -->
    <path d="M566 110 Q 580 90, 594 110" fill="none" stroke="#DC2626" stroke-width="2.4"/>
    <polygon points="566,110 562,102 572,104" fill="#DC2626"/>
    <path d="M566 122 Q 580 142, 594 122" fill="none" stroke="#DC2626" stroke-width="2.4"/>
    <polygon points="594,122 596,130 588,128" fill="#DC2626"/>
    <text x="580" y="216" font-family="sans-serif" font-size="13" fill="#7F1D1D" font-weight="bold" text-anchor="middle">Boomerang</text>
    <text x="580" y="234" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">at review time</text>
    <rect x="520" y="248" width="120" height="22" rx="11" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.2"/>
    <text x="580" y="264" font-family="monospace" font-size="10" fill="#7F1D1D" text-anchor="middle">Stage 5</text>
  </g>

  <!-- Caption -->
  <rect x="120" y="288" width="520" height="22" rx="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.2"/>
  <text x="380" y="304" font-family="sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="middle">Three defences against thumb-on-scale, one per stage.</text>
</svg>
