<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360">
  <text x="500" y="24" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Strict separation -- deterministic checks vs VLM judgment</text>
  <text x="500" y="42" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">Programmatic owns ground truth. VLM owns judgment. Never blur the line.</text>

  <!-- LEFT column header -->
  <g>
    <rect x="50" y="68" width="420" height="36" rx="4" fill="#2563EB"/>
    <text x="260" y="91" font-family="sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Deterministic (programmatic)</text>
  </g>

  <!-- LEFT items -->
  <g>
    <rect x="50" y="112" width="420" height="32" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="0.8"/>
    <text x="78" y="132" font-family="sans-serif" font-size="11" fill="#1E40AF" font-weight="bold">hex code</text>
    <text x="180" y="132" font-family="monospace" font-size="10" fill="#1E40AF">==</text>
    <text x="220" y="132" font-family="monospace" font-size="10.5" fill="#1E40AF">"#0072B2"</text>

    <rect x="50" y="150" width="420" height="32" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="0.8"/>
    <text x="78" y="170" font-family="sans-serif" font-size="11" fill="#1E40AF" font-weight="bold">pt size</text>
    <text x="180" y="170" font-family="monospace" font-size="10" fill="#1E40AF">&gt;=</text>
    <text x="220" y="170" font-family="monospace" font-size="10.5" fill="#1E40AF">5.0 pt</text>

    <rect x="50" y="188" width="420" height="32" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="0.8"/>
    <text x="78" y="208" font-family="sans-serif" font-size="11" fill="#1E40AF" font-weight="bold">bbox overlap</text>
    <text x="180" y="208" font-family="monospace" font-size="10" fill="#1E40AF">==</text>
    <text x="220" y="208" font-family="monospace" font-size="10.5" fill="#1E40AF">0 (no panels collide)</text>

    <rect x="50" y="226" width="420" height="32" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="0.8"/>
    <text x="78" y="246" font-family="sans-serif" font-size="11" fill="#1E40AF" font-weight="bold">alpha value</text>
    <text x="180" y="246" font-family="monospace" font-size="10" fill="#1E40AF">==</text>
    <text x="220" y="246" font-family="monospace" font-size="10.5" fill="#1E40AF">1.0 (no transparency)</text>

    <rect x="50" y="264" width="420" height="32" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="0.8"/>
    <text x="78" y="284" font-family="sans-serif" font-size="11" fill="#1E40AF" font-weight="bold">arrow tip</text>
    <text x="180" y="284" font-family="monospace" font-size="10" fill="#1E40AF">&lt;=</text>
    <text x="220" y="284" font-family="monospace" font-size="10.5" fill="#1E40AF">0.5 mm of target edge</text>

    <rect x="50" y="302" width="420" height="32" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="0.8"/>
    <text x="78" y="322" font-family="sans-serif" font-size="11" fill="#1E40AF" font-weight="bold">DPI</text>
    <text x="180" y="322" font-family="monospace" font-size="10" fill="#1E40AF">&gt;=</text>
    <text x="220" y="322" font-family="monospace" font-size="10.5" fill="#1E40AF">300 (raster, journal cutoff)</text>
  </g>

  <!-- Vertical divider -->
  <line x1="500" y1="100" x2="500" y2="334" stroke="#94A3B8" stroke-width="2.4" stroke-dasharray="6,4"/>
  <rect x="478" y="180" width="44" height="60" fill="#FFFFFF"/>
  <text x="500" y="206" font-family="sans-serif" font-size="11" fill="#1E293B" font-weight="bold" text-anchor="middle">vs</text>

  <!-- RIGHT column header -->
  <g>
    <rect x="530" y="68" width="420" height="36" rx="4" fill="#BE185D"/>
    <text x="740" y="91" font-family="sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold" text-anchor="middle">VLM (judgment)</text>
  </g>

  <!-- RIGHT items -->
  <g>
    <rect x="530" y="112" width="420" height="32" rx="3" fill="#FCE7F3" stroke="#BE185D" stroke-width="0.8"/>
    <text x="558" y="132" font-family="sans-serif" font-size="11" fill="#831843" font-weight="bold">hierarchy</text>
    <text x="650" y="132" font-family="sans-serif" font-size="10" fill="#831843" font-style="italic">reads top-down, panel A first?</text>

    <rect x="530" y="150" width="420" height="32" rx="3" fill="#FCE7F3" stroke="#BE185D" stroke-width="0.8"/>
    <text x="558" y="170" font-family="sans-serif" font-size="11" fill="#831843" font-weight="bold">layering</text>
    <text x="650" y="170" font-family="sans-serif" font-size="10" fill="#831843" font-style="italic">background sits behind data?</text>

    <rect x="530" y="188" width="420" height="32" rx="3" fill="#FCE7F3" stroke="#BE185D" stroke-width="0.8"/>
    <text x="558" y="208" font-family="sans-serif" font-size="11" fill="#831843" font-weight="bold">panel labels</text>
    <text x="650" y="208" font-family="sans-serif" font-size="10" fill="#831843" font-style="italic">positioned consistently?</text>

    <rect x="530" y="226" width="420" height="32" rx="3" fill="#FCE7F3" stroke="#BE185D" stroke-width="0.8"/>
    <text x="558" y="246" font-family="sans-serif" font-size="11" fill="#831843" font-weight="bold">visual balance</text>
    <text x="650" y="246" font-family="sans-serif" font-size="10" fill="#831843" font-style="italic">whitespace distributed evenly?</text>

    <rect x="530" y="264" width="420" height="32" rx="3" fill="#FCE7F3" stroke="#BE185D" stroke-width="0.8"/>
    <text x="558" y="284" font-family="sans-serif" font-size="11" fill="#831843" font-weight="bold">callout placement</text>
    <text x="700" y="284" font-family="sans-serif" font-size="10" fill="#831843" font-style="italic">does not occlude data?</text>

    <rect x="530" y="302" width="420" height="32" rx="3" fill="#FCE7F3" stroke="#BE185D" stroke-width="0.8"/>
    <text x="558" y="322" font-family="sans-serif" font-size="11" fill="#831843" font-weight="bold">narrative arc</text>
    <text x="650" y="322" font-family="sans-serif" font-size="10" fill="#831843" font-style="italic">panels flow in argumentative order?</text>
  </g>
</svg>
