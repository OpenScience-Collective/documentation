<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360">
  <text x="500" y="24" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">A finished analysis nobody can reuse</text>
  <text x="500" y="42" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">A rich raw recording funnels down to a thin, locked artifact -- structure, semantics, and credit all lost</text>

  <defs>
    <marker id="arrowfwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- LEFT: rich raw recording -->
  <g>
    <text x="180" y="68" font-family="sans-serif" font-size="12" fill="#1E40AF" font-weight="bold" text-anchor="middle">Rich raw recording</text>

    <!-- EEG 128-ch chip -->
    <rect x="60" y="78" width="240" height="34" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
    <text x="180" y="99" font-family="sans-serif" font-size="10.5" fill="#1E40AF" font-weight="bold" text-anchor="middle">EEG 128-ch continuous</text>

    <!-- event markers chip -->
    <rect x="60" y="120" width="240" height="34" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
    <text x="180" y="141" font-family="sans-serif" font-size="10.5" fill="#1E40AF" font-weight="bold" text-anchor="middle">Event markers (timed)</text>

    <!-- behavioral log chip -->
    <rect x="60" y="162" width="240" height="34" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
    <text x="180" y="183" font-family="sans-serif" font-size="10.5" fill="#1E40AF" font-weight="bold" text-anchor="middle">Behavioral log</text>

    <!-- stimulus log chip -->
    <rect x="60" y="204" width="240" height="34" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
    <text x="180" y="225" font-family="sans-serif" font-size="10.5" fill="#1E40AF" font-weight="bold" text-anchor="middle">Stimulus log</text>
  </g>

  <!-- MIDDLE: funnel (converging walls) -->
  <g>
    <polygon points="330,90 470,150 470,170 330,226" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.2"/>
    <!-- converging arrows feeding the funnel -->
    <line x1="304" y1="95"  x2="354" y2="118" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowfwd)"/>
    <line x1="304" y1="137" x2="354" y2="142" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowfwd)"/>
    <line x1="304" y1="179" x2="354" y2="178" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowfwd)"/>
    <line x1="304" y1="221" x2="354" y2="200" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowfwd)"/>
    <!-- funnel spout exit arrow leading to the thin artifact panel -->
    <line x1="470" y1="160" x2="598" y2="160" stroke="#475569" stroke-width="1.6" marker-end="url(#arrowfwd)"/>
    <text x="534" y="152" font-family="sans-serif" font-size="9" fill="#64748B" font-style="italic" text-anchor="middle">all that's left</text>
  </g>

  <!-- RIGHT: thin shared artifact -->
  <g>
    <text x="780" y="68" font-family="sans-serif" font-size="12" fill="#991B1B" font-weight="bold" text-anchor="middle">Thin shared artifact</text>

    <!-- events.tsv card -->
    <rect x="600" y="84" width="360" height="62" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.4"/>
    <text x="780" y="106" font-family="monospace" font-size="11" fill="#991B1B" font-weight="bold" text-anchor="middle">events.tsv</text>
    <text x="780" y="124" font-family="sans-serif" font-size="9.5" fill="#7F1D1D" font-style="italic" text-anchor="middle">1 cryptic column, no labels</text>
    <text x="780" y="138" font-family="monospace" font-size="9.5" fill="#7F1D1D" text-anchor="middle">onset</text>

    <!-- results figure card -->
    <rect x="600" y="156" width="360" height="82" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.4"/>
    <text x="780" y="178" font-family="sans-serif" font-size="11" fill="#991B1B" font-weight="bold" text-anchor="middle">results figure</text>
    <text x="780" y="194" font-family="sans-serif" font-size="9.5" fill="#7F1D1D" font-style="italic" text-anchor="middle">locked in a folder, no provenance</text>
    <!-- tiny figure glyph -->
    <rect x="700" y="202" width="160" height="28" fill="#FFFFFF" stroke="#DC2626" stroke-width="1"/>
    <path d="M 706 226 Q 730 210 754 216 T 802 206 L 854 208" fill="none" stroke="#DC2626" stroke-width="1.2"/>
  </g>

  <!-- THREE padlocks across the bottom -->
  <!-- padlock 1: Structure -->
  <g>
    <path d="M 160 278 v -8 a 10 10 0 0 1 20 0 v 8" fill="none" stroke="#92400E" stroke-width="2.4"/>
    <rect x="150" y="278" width="40" height="30" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
    <circle cx="170" cy="291" r="3.2" fill="#92400E"/>
    <rect x="168.5" y="291" width="3" height="9" fill="#92400E"/>
    <text x="170" y="324" font-family="sans-serif" font-size="11" fill="#92400E" font-weight="bold" text-anchor="middle">Structure</text>
    <text x="170" y="338" font-family="sans-serif" font-size="9.5" fill="#78350F" text-anchor="middle">can't find things</text>
  </g>
  <!-- padlock 2: Semantics -->
  <g>
    <path d="M 490 278 v -8 a 10 10 0 0 1 20 0 v 8" fill="none" stroke="#92400E" stroke-width="2.4"/>
    <rect x="480" y="278" width="40" height="30" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
    <circle cx="500" cy="291" r="3.2" fill="#92400E"/>
    <rect x="498.5" y="291" width="3" height="9" fill="#92400E"/>
    <text x="500" y="324" font-family="sans-serif" font-size="11" fill="#92400E" font-weight="bold" text-anchor="middle">Semantics</text>
    <text x="500" y="338" font-family="sans-serif" font-size="9.5" fill="#78350F" text-anchor="middle">can't decode events</text>
  </g>
  <!-- padlock 3: Credit -->
  <g>
    <path d="M 820 278 v -8 a 10 10 0 0 1 20 0 v 8" fill="none" stroke="#92400E" stroke-width="2.4"/>
    <rect x="810" y="278" width="40" height="30" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
    <circle cx="830" cy="291" r="3.2" fill="#92400E"/>
    <rect x="828.5" y="291" width="3" height="9" fill="#92400E"/>
    <text x="830" y="324" font-family="sans-serif" font-size="11" fill="#92400E" font-weight="bold" text-anchor="middle">Credit</text>
    <text x="830" y="338" font-family="sans-serif" font-size="9.5" fill="#78350F" text-anchor="middle">reuse traces to no one</text>
  </g>

  <!-- Bottom amber moral strip -->
  <rect x="60" y="344" width="880" height="14" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="0.8"/>
  <text x="500" y="354" font-family="sans-serif" font-size="10" fill="#92400E" font-weight="bold" text-anchor="middle">Analysis-ready means no forensic search for unreported details.</text>
</svg>
