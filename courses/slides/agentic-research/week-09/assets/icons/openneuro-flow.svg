<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="1000" height="320">
  <defs>
    <marker id="arrowfwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="500" y="24" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">OpenNeuro -- the default open BIDS archive</text>
  <text x="500" y="42" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">Brain Imaging Data Structure (BIDS) in, a citable public dataset out.</text>

  <!-- Step 1: Validate (BIDS) (blue) -->
  <g>
    <rect x="70" y="80" width="240" height="100" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.6"/>
    <text x="190" y="124" font-family="sans-serif" font-size="14" fill="#1E40AF" font-weight="bold" text-anchor="middle">Validate (BIDS)</text>
    <text x="190" y="148" font-family="sans-serif" font-size="10" fill="#1E40AF" text-anchor="middle">pass the validator first</text>
  </g>

  <!-- Step 2: Upload (blue) -->
  <g>
    <rect x="380" y="80" width="240" height="100" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.6"/>
    <text x="500" y="124" font-family="sans-serif" font-size="14" fill="#1E40AF" font-weight="bold" text-anchor="middle">Upload</text>
    <text x="500" y="148" font-family="sans-serif" font-size="10" fill="#1E40AF" text-anchor="middle">browser or CLI</text>
  </g>

  <!-- Step 3: Public + DOI (blue) -->
  <g>
    <rect x="690" y="80" width="240" height="100" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.8"/>
    <text x="810" y="124" font-family="sans-serif" font-size="14" fill="#1E40AF" font-weight="bold" text-anchor="middle">Public + DOI</text>
    <text x="810" y="148" font-family="sans-serif" font-size="10" fill="#1E40AF" text-anchor="middle">citable, versioned dataset</text>
  </g>

  <!-- Forward arrows -->
  <line x1="310" y1="130" x2="378" y2="130" stroke="#475569" stroke-width="1.6" marker-end="url(#arrowfwd)"/>
  <line x1="620" y1="130" x2="688" y2="130" stroke="#475569" stroke-width="1.6" marker-end="url(#arrowfwd)"/>

  <!-- Honest note card (amber) below the flow -->
  <rect x="170" y="216" width="660" height="64" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.4"/>
  <rect x="184" y="234" width="58" height="18" rx="3" fill="#D97706"/>
  <text x="213" y="247" font-family="sans-serif" font-size="9.5" fill="#FFFFFF" font-weight="bold" text-anchor="middle">NOTE</text>
  <text x="500" y="241" font-family="sans-serif" font-size="10.5" fill="#92400E" text-anchor="middle">Private upload exists, but only via CLI / direct push -- no polished GUI for it.</text>
  <text x="500" y="262" font-family="sans-serif" font-size="10.5" fill="#92400E" text-anchor="middle">And the DOI record stays sparse: no ORCID author links, minimal metadata.</text>
</svg>
