<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" width="960" height="320">
  <text x="480" y="26" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Live demo roadmap</text>
  <text x="480" y="44" font-family="sans-serif" font-size="11.5" fill="#64748B" font-style="italic" text-anchor="middle">Narrative review on naturalistic movie watching, four perspectives from Week 5</text>

  <!-- Pre-built state strip -->
  <rect x="60" y="60" width="840" height="36" rx="6" fill="#FEF3C7" stroke="#B45309" stroke-width="1.2"/>
  <text x="74" y="78" font-family="sans-serif" font-size="10.5" fill="#78350F" font-weight="bold">Pre-built:</text>
  <text x="142" y="78" font-family="monospace" font-size="9.5" fill="#1E293B">Week-5 corpus (psychophysics / action / language / emotion)</text>
  <text x="74" y="91" font-family="monospace" font-size="9.5" fill="#1E293B">manuscript/ stubs (main.tex, intro.tex, discussion.tex)  --  science-map figure stub  --  epic + 4 sub-issues</text>

  <!-- Step 1 -->
  <g>
    <rect x="60" y="116" width="200" height="148" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.6"/>
    <circle cx="84" cy="140" r="14" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.4"/>
    <text x="84" y="145" font-family="sans-serif" font-size="13" fill="#1E40AF" font-weight="bold" text-anchor="middle">1</text>
    <text x="160" y="138" font-family="monospace" font-size="9.5" fill="#1E40AF" text-anchor="middle">1:30</text>
    <line x1="76" y1="160" x2="244" y2="160" stroke="#2563EB" stroke-width="0.8"/>

    <text x="160" y="180" font-family="sans-serif" font-size="11" fill="#1E40AF" font-weight="bold" text-anchor="middle">Draft intro paragraph</text>
    <text x="160" y="200" font-family="monospace" font-size="9.5" fill="#1E40AF" text-anchor="middle">/manuscript:</text>
    <text x="160" y="212" font-family="monospace" font-size="9.5" fill="#1E40AF" text-anchor="middle">manuscript-writing</text>
    <text x="160" y="234" font-family="sans-serif" font-size="9.5" fill="#1E293B" text-anchor="middle">Synthesises 4 perspectives;</text>
    <text x="160" y="246" font-family="sans-serif" font-size="9.5" fill="#1E293B" text-anchor="middle">cite-the-card visible in diff</text>
  </g>

  <path d="M268 190 L302 190" fill="none" stroke="#475569" stroke-width="2"/>
  <polygon points="302,190 294,186 294,194" fill="#475569"/>

  <!-- Step 2 -->
  <g>
    <rect x="310" y="116" width="200" height="148" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.6"/>
    <circle cx="334" cy="140" r="14" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.4"/>
    <text x="334" y="145" font-family="sans-serif" font-size="13" fill="#991B1B" font-weight="bold" text-anchor="middle">2</text>
    <text x="410" y="138" font-family="monospace" font-size="9.5" fill="#991B1B" text-anchor="middle">2:30</text>
    <line x1="326" y1="160" x2="494" y2="160" stroke="#DC2626" stroke-width="0.8"/>

    <text x="410" y="180" font-family="sans-serif" font-size="11" fill="#991B1B" font-weight="bold" text-anchor="middle">Review the paragraph</text>
    <text x="410" y="200" font-family="monospace" font-size="9.5" fill="#991B1B" text-anchor="middle">/manuscript:paper-review</text>
    <text x="410" y="222" font-family="sans-serif" font-size="9.5" fill="#1E293B" text-anchor="middle">Likely natural finding:</text>
    <text x="410" y="234" font-family="sans-serif" font-size="9.5" fill="#1E293B" text-anchor="middle">uneven perspective coverage.</text>
    <text x="410" y="248" font-family="sans-serif" font-size="9" fill="#475569" font-style="italic" text-anchor="middle">Boomerang back to Stage 1 -- aloud</text>
  </g>

  <path d="M518 190 L552 190" fill="none" stroke="#475569" stroke-width="2"/>
  <polygon points="552,190 544,186 544,194" fill="#475569"/>

  <!-- Step 3 -->
  <g>
    <rect x="560" y="116" width="200" height="148" rx="6" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.6"/>
    <circle cx="584" cy="140" r="14" fill="#FFFFFF" stroke="#0D9488" stroke-width="1.4"/>
    <text x="584" y="145" font-family="sans-serif" font-size="13" fill="#0F766E" font-weight="bold" text-anchor="middle">3</text>
    <text x="660" y="138" font-family="monospace" font-size="9.5" fill="#0F766E" text-anchor="middle">1:00</text>
    <line x1="576" y1="160" x2="744" y2="160" stroke="#0D9488" stroke-width="0.8"/>

    <text x="660" y="180" font-family="sans-serif" font-size="11" fill="#0F766E" font-weight="bold" text-anchor="middle">Overleaf hand-off</text>
    <text x="660" y="200" font-family="monospace" font-size="9.5" fill="#0F766E" text-anchor="middle">zip -&gt; upload -&gt; git URL</text>
    <text x="660" y="222" font-family="sans-serif" font-size="9.5" fill="#1E293B" text-anchor="middle">Described with screenshots,</text>
    <text x="660" y="234" font-family="sans-serif" font-size="9.5" fill="#1E293B" text-anchor="middle">not run live</text>
    <text x="660" y="248" font-family="sans-serif" font-size="9" fill="#475569" font-style="italic" text-anchor="middle">Moral: the comment-merge slide</text>
  </g>

  <!-- Off-stage tail -->
  <g>
    <rect x="780" y="148" width="140" height="88" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="850" y="170" font-family="sans-serif" font-size="10.5" fill="#1E293B" font-weight="bold" text-anchor="middle">Off-stage</text>
    <text x="850" y="190" font-family="sans-serif" font-size="9.5" fill="#475569" text-anchor="middle">Boomerang follow-on</text>
    <text x="850" y="204" font-family="sans-serif" font-size="9.5" fill="#475569" text-anchor="middle">(opencite search,</text>
    <text x="850" y="218" font-family="sans-serif" font-size="9.5" fill="#475569" text-anchor="middle">comment transcription)</text>
    <text x="850" y="232" font-family="sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">described, not run</text>
  </g>

  <text x="480" y="296" font-family="sans-serif" font-size="11" fill="#1E293B" font-weight="bold" text-anchor="middle">We do not manufacture a finding. Whatever the review surfaces, we walk through.</text>
  <text x="480" y="312" font-family="sans-serif" font-size="10" fill="#64748B" font-style="italic" text-anchor="middle">Total live time: ~5 minutes. Q&amp;A follows for 15.</text>
</svg>
