<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <!-- Title -->
  <text x="400" y="22" font-family="sans-serif" font-size="14" fill="#1E293B" font-weight="bold" text-anchor="middle">Stage 3 outputs: structure before prose</text>

  <!-- Thumbnail 1: Tool ontology -->
  <g>
    <rect x="40" y="56" width="140" height="120" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.4"/>
    <!-- Tree -->
    <circle cx="110" cy="80" r="5" fill="#2563EB"/>
    <line x1="110" y1="85" x2="80" y2="110" stroke="#2563EB" stroke-width="1.2"/>
    <line x1="110" y1="85" x2="110" y2="110" stroke="#2563EB" stroke-width="1.2"/>
    <line x1="110" y1="85" x2="140" y2="110" stroke="#2563EB" stroke-width="1.2"/>
    <circle cx="80" cy="114" r="4" fill="#2563EB"/>
    <circle cx="110" cy="114" r="4" fill="#2563EB"/>
    <circle cx="140" cy="114" r="4" fill="#2563EB"/>
    <line x1="80" y1="118" x2="68" y2="138" stroke="#2563EB" stroke-width="1"/>
    <line x1="80" y1="118" x2="92" y2="138" stroke="#2563EB" stroke-width="1"/>
    <line x1="140" y1="118" x2="128" y2="138" stroke="#2563EB" stroke-width="1"/>
    <line x1="140" y1="118" x2="152" y2="138" stroke="#2563EB" stroke-width="1"/>
    <circle cx="68" cy="142" r="3" fill="#2563EB"/>
    <circle cx="92" cy="142" r="3" fill="#2563EB"/>
    <circle cx="128" cy="142" r="3" fill="#2563EB"/>
    <circle cx="152" cy="142" r="3" fill="#2563EB"/>
    <text x="110" y="168" font-family="sans-serif" font-size="11" fill="#1E40AF" font-weight="bold" text-anchor="middle">Tool ontology</text>
  </g>

  <!-- Thumbnail 2: Dataset hierarchy -->
  <g>
    <rect x="200" y="56" width="140" height="120" rx="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.4"/>
    <rect x="216" y="74" width="108" height="84" rx="3" fill="none" stroke="#F59E0B" stroke-width="1.4"/>
    <rect x="226" y="86" width="88" height="62" rx="3" fill="none" stroke="#F59E0B" stroke-width="1.2"/>
    <rect x="238" y="100" width="64" height="40" rx="3" fill="#FEF3C7" stroke="#B45309" stroke-width="1.2"/>
    <text x="270" y="124" font-family="monospace" font-size="9" fill="#78350F" text-anchor="middle">subject/</text>
    <text x="270" y="168" font-family="sans-serif" font-size="11" fill="#78350F" font-weight="bold" text-anchor="middle">Dataset hierarchy</text>
  </g>

  <!-- Thumbnail 3: Science map -->
  <g>
    <rect x="360" y="56" width="140" height="120" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.4"/>
    <!-- node link map -->
    <circle cx="394" cy="92" r="6" fill="#7C3AED"/>
    <circle cx="436" cy="86" r="6" fill="#7C3AED"/>
    <circle cx="466" cy="116" r="6" fill="#7C3AED"/>
    <circle cx="408" cy="138" r="6" fill="#7C3AED"/>
    <circle cx="450" cy="150" r="6" fill="#7C3AED"/>
    <line x1="394" y1="92" x2="436" y2="86" stroke="#7C3AED" stroke-width="1.2"/>
    <line x1="436" y1="86" x2="466" y2="116" stroke="#7C3AED" stroke-width="1.2"/>
    <line x1="394" y1="92" x2="408" y2="138" stroke="#7C3AED" stroke-width="1.2"/>
    <line x1="408" y1="138" x2="450" y2="150" stroke="#7C3AED" stroke-width="1.2"/>
    <line x1="466" y1="116" x2="450" y2="150" stroke="#7C3AED" stroke-width="1.2"/>
    <line x1="436" y1="86" x2="450" y2="150" stroke="#7C3AED" stroke-width="1.2" opacity="0.5"/>
    <text x="430" y="168" font-family="sans-serif" font-size="11" fill="#5B21B6" font-weight="bold" text-anchor="middle">Science map</text>
  </g>

  <!-- Thumbnail 4: Gap analysis - HIGHLIGHTED -->
  <g>
    <!-- drop shadow -->
    <rect x="524" y="60" width="140" height="120" rx="6" fill="#000000" opacity="0.18"/>
    <rect x="520" y="56" width="140" height="120" rx="6" fill="#FFFFFF" stroke="#DC2626" stroke-width="2.4"/>
    <!-- 3-column table with one highlighted -->
    <rect x="536" y="76" width="108" height="84" fill="none" stroke="#475569" stroke-width="1"/>
    <line x1="572" y1="76" x2="572" y2="160" stroke="#475569" stroke-width="1"/>
    <line x1="608" y1="76" x2="608" y2="160" stroke="#475569" stroke-width="1"/>
    <line x1="536" y1="92" x2="644" y2="92" stroke="#475569" stroke-width="1"/>
    <line x1="536" y1="110" x2="644" y2="110" stroke="#475569" stroke-width="1"/>
    <line x1="536" y1="128" x2="644" y2="128" stroke="#475569" stroke-width="1"/>
    <line x1="536" y1="144" x2="644" y2="144" stroke="#475569" stroke-width="1"/>
    <!-- highlighted column -->
    <rect x="608" y="92" width="36" height="68" fill="#FEE2E2" opacity="0.8"/>
    <text x="554" y="89" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">topic</text>
    <text x="590" y="89" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">covered</text>
    <text x="626" y="89" font-family="monospace" font-size="8" fill="#7F1D1D" text-anchor="middle" font-weight="bold">gap</text>
    <text x="590" y="168" font-family="sans-serif" font-size="11" fill="#7F1D1D" font-weight="bold" text-anchor="middle">Gap analysis</text>
  </g>

  <!-- Thumbnail 5: Scope diagram (Venn) -->
  <g>
    <rect x="680" y="56" width="100" height="120" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.4"/>
    <circle cx="715" cy="118" r="24" fill="#A7F3D0" stroke="#059669" stroke-width="1.4" opacity="0.7"/>
    <circle cx="745" cy="118" r="24" fill="#6EE7B7" stroke="#059669" stroke-width="1.4" opacity="0.7"/>
    <text x="730" y="168" font-family="sans-serif" font-size="11" fill="#064E3B" font-weight="bold" text-anchor="middle">Scope diagram</text>
  </g>

  <!-- Arrow from Gap analysis to Stage 4 -->
  <path d="M590 200 Q 590 240, 460 260" fill="none" stroke="#DC2626" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="460,260 470,256 470,266" fill="#DC2626"/>
  <rect x="320" y="248" width="180" height="26" rx="13" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.4"/>
  <text x="410" y="266" font-family="sans-serif" font-size="11" fill="#7F1D1D" font-weight="bold" text-anchor="middle">bridge to Stage 4</text>

  <!-- Caption -->
  <text x="400" y="306" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">Build maps and tables before paragraphs; Gap analysis sets the drafting agenda.</text>
</svg>
