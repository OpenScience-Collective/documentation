<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="240" height="200">
  <!-- Code box (left) -->
  <rect x="10" y="80" width="48" height="40" rx="6" fill="#FFFFFF" stroke="#64748B" stroke-width="1.5"/>
  <line x1="18" y1="90" x2="50" y2="90" stroke="#94A3B8" stroke-width="1.2"/>
  <line x1="18" y1="98" x2="44" y2="98" stroke="#94A3B8" stroke-width="1.2"/>
  <line x1="18" y1="106" x2="46" y2="106" stroke="#94A3B8" stroke-width="1.2"/>
  <line x1="18" y1="114" x2="40" y2="114" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="34" y="74" font-family="sans-serif" font-size="9" fill="#334155" font-weight="bold" text-anchor="middle">code</text>

  <!-- Arrow code -> runner -->
  <path d="M58 100 L82 100" fill="none" stroke="#2563EB" stroke-width="2"/>
  <polygon points="82,100 76,96 76,104" fill="#2563EB"/>
  <text x="70" y="92" font-family="sans-serif" font-size="8" fill="#475569" text-anchor="middle">push</text>

  <!-- Runner box (center) -->
  <rect x="84" y="60" width="72" height="80" rx="6" fill="#F1F5F9" stroke="#2563EB" stroke-width="1.5"/>
  <text x="120" y="74" font-family="sans-serif" font-size="9" fill="#1D4ED8" font-weight="bold" text-anchor="middle">runner</text>
  <!-- Steps inside runner -->
  <rect x="92" y="80" width="56" height="12" rx="2" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1"/>
  <text x="120" y="89" font-family="sans-serif" font-size="8" fill="#334155" text-anchor="middle">lint</text>
  <rect x="92" y="96" width="56" height="12" rx="2" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1"/>
  <text x="120" y="105" font-family="sans-serif" font-size="8" fill="#334155" text-anchor="middle">test</text>
  <rect x="92" y="112" width="56" height="12" rx="2" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1"/>
  <text x="120" y="121" font-family="sans-serif" font-size="8" fill="#334155" text-anchor="middle">build</text>

  <!-- Arrow runner -> result -->
  <path d="M156 100 L180 100" fill="none" stroke="#2563EB" stroke-width="2"/>
  <polygon points="180,100 174,96 174,104" fill="#2563EB"/>

  <!-- Result: green check or red X -->
  <circle cx="206" cy="80" r="16" fill="#059669" opacity="0.15"/>
  <path d="M198 80 L204 86 L214 74" fill="none" stroke="#059669" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="206" y="106" font-family="sans-serif" font-size="8" fill="#059669" font-weight="bold" text-anchor="middle">pass</text>

  <circle cx="206" cy="130" r="16" fill="#DC2626" opacity="0.15"/>
  <line x1="200" y1="124" x2="212" y2="136" stroke="#DC2626" stroke-width="3" stroke-linecap="round"/>
  <line x1="212" y1="124" x2="200" y2="136" stroke="#DC2626" stroke-width="3" stroke-linecap="round"/>
  <text x="206" y="156" font-family="sans-serif" font-size="8" fill="#DC2626" font-weight="bold" text-anchor="middle">fail</text>

  <!-- Title -->
  <text x="120" y="22" font-family="sans-serif" font-size="11" fill="#1E293B" font-weight="bold" text-anchor="middle">CI on every push</text>

  <!-- Loop arrow at bottom (feedback) -->
  <path d="M206 156 Q206 180 120 180 Q34 180 34 130" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="3,3"/>
  <polygon points="34,130 30,138 38,138" fill="#F59E0B"/>
  <text x="120" y="194" font-family="sans-serif" font-size="8" fill="#B45309" font-style="italic" text-anchor="middle">fix and re-push</text>
</svg>
