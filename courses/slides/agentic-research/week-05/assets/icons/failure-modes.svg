<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" width="720" height="260">
  <!-- Title -->
  <text x="360" y="24" font-family="sans-serif" font-size="14" fill="#1E293B" font-weight="bold" text-anchor="middle">Three failure modes of unstructured literature reviews</text>

  <!-- ========== Mode 1: String-of-pearls (slate) ========== -->
  <g>
    <rect x="40" y="44" width="200" height="160" rx="10" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.4"/>
    <!-- thin connecting thread -->
    <line x1="62" y1="120" x2="218" y2="120" stroke="#94A3B8" stroke-width="1.6"/>
    <!-- 5 pearls along the thread, slight vertical jitter to feel like a chain -->
    <circle cx="76" cy="120" r="11" fill="#E2E8F0" stroke="#64748B" stroke-width="1.5"/>
    <circle cx="76" cy="116" r="3" fill="#FFFFFF" opacity="0.85"/>
    <circle cx="112" cy="120" r="11" fill="#E2E8F0" stroke="#64748B" stroke-width="1.5"/>
    <circle cx="112" cy="116" r="3" fill="#FFFFFF" opacity="0.85"/>
    <circle cx="148" cy="120" r="11" fill="#E2E8F0" stroke="#64748B" stroke-width="1.5"/>
    <circle cx="148" cy="116" r="3" fill="#FFFFFF" opacity="0.85"/>
    <circle cx="184" cy="120" r="11" fill="#E2E8F0" stroke="#64748B" stroke-width="1.5"/>
    <circle cx="184" cy="116" r="3" fill="#FFFFFF" opacity="0.85"/>
    <circle cx="208" cy="120" r="9" fill="#E2E8F0" stroke="#64748B" stroke-width="1.5"/>
    <circle cx="208" cy="117" r="2.5" fill="#FFFFFF" opacity="0.85"/>
    <text x="140" y="186" font-family="sans-serif" font-size="13" fill="#1E293B" font-weight="bold" text-anchor="middle">String-of-pearls</text>
  </g>
  <text x="140" y="226" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">Paper, paper, paper, no plot.</text>

  <!-- ========== Mode 2: Recency bias (amber clock) ========== -->
  <g>
    <rect x="260" y="44" width="200" height="160" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.4"/>
    <!-- two faded older clocks behind, slightly offset -->
    <circle cx="328" cy="116" r="22" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1" opacity="0.35"/>
    <line x1="328" y1="116" x2="328" y2="100" stroke="#F59E0B" stroke-width="1" opacity="0.35"/>
    <line x1="328" y1="116" x2="316" y2="116" stroke="#F59E0B" stroke-width="1" opacity="0.35"/>
    <text x="328" y="148" font-family="sans-serif" font-size="9" fill="#B45309" text-anchor="middle" opacity="0.5">2018</text>

    <circle cx="346" cy="120" r="24" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.2" opacity="0.6"/>
    <line x1="346" y1="120" x2="346" y2="100" stroke="#F59E0B" stroke-width="1.2" opacity="0.6"/>
    <line x1="346" y1="120" x2="332" y2="120" stroke="#F59E0B" stroke-width="1.2" opacity="0.6"/>
    <text x="346" y="154" font-family="sans-serif" font-size="9" fill="#B45309" text-anchor="middle" opacity="0.7">2021</text>

    <!-- main, foreground clock with hands tilted to recent side (right) -->
    <circle cx="370" cy="124" r="28" fill="#FFFFFF" stroke="#B45309" stroke-width="2"/>
    <!-- 12, 3, 6, 9 ticks -->
    <line x1="370" y1="100" x2="370" y2="104" stroke="#B45309" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="394" y1="124" x2="390" y2="124" stroke="#B45309" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="370" y1="148" x2="370" y2="144" stroke="#B45309" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="346" y1="124" x2="350" y2="124" stroke="#B45309" stroke-width="1.6" stroke-linecap="round"/>
    <!-- both hands strongly tilted to right (toward "2026") -->
    <line x1="370" y1="124" x2="388" y2="120" stroke="#B45309" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="370" y1="124" x2="384" y2="116" stroke="#B45309" stroke-width="2.4" stroke-linecap="round"/>
    <circle cx="370" cy="124" r="2.4" fill="#B45309"/>
    <text x="370" y="170" font-family="sans-serif" font-size="9" fill="#B45309" font-weight="bold" text-anchor="middle">2026</text>

    <text x="360" y="186" font-family="sans-serif" font-size="13" fill="#1E293B" font-weight="bold" text-anchor="middle">Recency bias</text>
  </g>
  <text x="360" y="226" font-family="sans-serif" font-size="11" fill="#78350F" text-anchor="middle">Last 2 years swamp the rest.</text>

  <!-- ========== Mode 3: Hallucinated references (red ghost paper) ========== -->
  <g>
    <rect x="480" y="44" width="200" height="160" rx="10" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.4"/>
    <!-- ghostly paper outline (translucent), folded corner -->
    <path d="M520 76 L612 76 L632 96 L632 168 L520 168 Z" fill="#FFFFFF" stroke="#FCA5A5" stroke-width="1.6" stroke-dasharray="4,3" opacity="0.85"/>
    <path d="M612 76 L612 96 L632 96 Z" fill="#FCA5A5" stroke="#FCA5A5" stroke-width="1" opacity="0.6"/>
    <!-- fake content lines (faint) -->
    <line x1="532" y1="92" x2="600" y2="92" stroke="#CBD5E1" stroke-width="1.2"/>
    <line x1="532" y1="104" x2="612" y2="104" stroke="#CBD5E1" stroke-width="1.2"/>
    <line x1="532" y1="116" x2="592" y2="116" stroke="#CBD5E1" stroke-width="1.2"/>
    <!-- DOI line with question mark -->
    <text x="532" y="138" font-family="monospace" font-size="11" fill="#7F1D1D" font-weight="bold">DOI: ?</text>
    <line x1="568" y1="134" x2="618" y2="134" stroke="#CBD5E1" stroke-width="1.2"/>
    <line x1="532" y1="150" x2="608" y2="150" stroke="#CBD5E1" stroke-width="1.2"/>
    <!-- diagonal red strikethrough across the whole paper -->
    <line x1="510" y1="68" x2="640" y2="172" stroke="#DC2626" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
    <text x="580" y="186" font-family="sans-serif" font-size="13" fill="#1E293B" font-weight="bold" text-anchor="middle">Hallucinated refs</text>
  </g>
  <text x="580" y="226" font-family="sans-serif" font-size="11" fill="#7F1D1D" text-anchor="middle">Citations that do not exist.</text>

  <!-- Footer caption -->
  <text x="360" y="250" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">A pipeline with stage gates and stored evidence prevents all three.</text>
</svg>
