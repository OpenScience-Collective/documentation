<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 180" width="560" height="180">
  <!-- Title -->
  <text x="280" y="20" font-family="sans-serif" font-size="13" fill="#1E293B" font-weight="bold" text-anchor="middle">Workflow triggers -- controlling when CI fires</text>

  <!-- push -->
  <g>
    <circle cx="60" cy="70" r="28" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
    <circle cx="48" cy="70" r="3" fill="#2563EB"/>
    <circle cx="60" cy="70" r="3" fill="#2563EB"/>
    <circle cx="72" cy="70" r="3" fill="#2563EB"/>
    <line x1="48" y1="70" x2="72" y2="70" stroke="#2563EB" stroke-width="1.2"/>
    <text x="60" y="118" font-family="sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="middle">push</text>
    <text x="60" y="138" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">every commit</text>
  </g>

  <!-- pull_request -->
  <g>
    <circle cx="180" cy="70" r="28" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <circle cx="170" cy="60" r="3" fill="#B45309"/>
    <circle cx="170" cy="80" r="3" fill="#B45309"/>
    <circle cx="192" cy="70" r="3" fill="#B45309"/>
    <path d="M170 60 Q182 60 192 70" fill="none" stroke="#B45309" stroke-width="1.5"/>
    <path d="M170 80 Q182 80 192 70" fill="none" stroke="#B45309" stroke-width="1.5"/>
    <text x="180" y="118" font-family="sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="middle">pull_request</text>
    <text x="180" y="138" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">PR open / sync</text>
  </g>

  <!-- schedule -->
  <g>
    <circle cx="300" cy="70" r="28" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
    <circle cx="300" cy="70" r="14" fill="none" stroke="#7C3AED" stroke-width="2"/>
    <line x1="300" y1="70" x2="300" y2="60" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>
    <line x1="300" y1="70" x2="308" y2="74" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>
    <text x="300" y="118" font-family="sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="middle">schedule</text>
    <text x="300" y="138" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">cron schedule</text>
  </g>

  <!-- workflow_dispatch -->
  <g>
    <circle cx="420" cy="70" r="28" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
    <polygon points="414,62 414,78 430,70" fill="#059669"/>
    <text x="420" y="118" font-family="sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="middle">workflow_dispatch</text>
    <text x="420" y="138" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">manual run</text>
  </g>

  <!-- paths filter -->
  <g>
    <circle cx="510" cy="70" r="28" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
    <path d="M498 60 L522 60 L514 70 L514 82 L506 82 L506 70 Z" fill="none" stroke="#DC2626" stroke-width="1.8" stroke-linejoin="round"/>
    <text x="510" y="118" font-family="sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="middle">paths:</text>
    <text x="510" y="138" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">file glob</text>
  </g>

  <!-- Connecting line + footnote -->
  <line x1="60" y1="160" x2="510" y2="160" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="280" y="174" font-family="sans-serif" font-size="10" fill="#64748B" font-style="italic" text-anchor="middle">Combine triggers with a `paths:` filter to skip unnecessary runs.</text>
</svg>
