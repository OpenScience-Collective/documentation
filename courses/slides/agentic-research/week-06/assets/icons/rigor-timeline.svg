<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" width="960" height="340">
  <text x="480" y="26" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Rigor + Reproducibility, Preliminary Data, and Timeline</text>

  <!-- Rigor card -->
  <g>
    <rect x="40" y="56" width="270" height="240" rx="10" fill="#FEF3C7" stroke="#B45309" stroke-width="1.6"/>
    <text x="175" y="84" font-family="sans-serif" font-size="13" fill="#7C2D12" font-weight="bold" text-anchor="middle">Rigor &amp; reproducibility</text>
    <g font-family="sans-serif" font-size="12" fill="#1E293B">
      <text x="58" y="116" font-weight="bold" fill="#7C2D12">Biological variables</text>
      <text x="58" y="132" fill="#475569">sex, age, ancestry as variables</text>
      <text x="58" y="156" font-weight="bold" fill="#7C2D12">Authentication</text>
      <text x="58" y="172" fill="#475569">reagents, datasets, code versions</text>
      <text x="58" y="196" font-weight="bold" fill="#7C2D12">Blinding + randomisation</text>
      <text x="58" y="212" fill="#475569">analysis pre-registration</text>
      <text x="58" y="236" font-weight="bold" fill="#7C2D12">Open standards</text>
      <text x="58" y="252" fill="#475569">BIDS, HED, public code+data</text>
      <text x="58" y="276" font-style="italic" fill="#7C2D12">~1 page in R01 Approach</text>
    </g>
  </g>

  <!-- Preliminary data card -->
  <g>
    <rect x="335" y="56" width="270" height="240" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.6"/>
    <text x="470" y="84" font-family="sans-serif" font-size="13" fill="#1E40AF" font-weight="bold" text-anchor="middle">Preliminary data</text>
    <g font-family="sans-serif" font-size="12" fill="#1E293B">
      <text x="353" y="116" font-weight="bold" fill="#1E40AF">Show feasibility</text>
      <text x="353" y="132" fill="#475569">"we can already do this"</text>
      <text x="353" y="156" font-weight="bold" fill="#1E40AF">Effect-size estimate</text>
      <text x="353" y="172" fill="#475569">power analysis grounded</text>
      <text x="353" y="196" font-weight="bold" fill="#1E40AF">Pipeline checkpoint</text>
      <text x="353" y="212" fill="#475569">BIDS import + ICA + ERSP</text>
      <text x="353" y="236" font-weight="bold" fill="#1E40AF">One key figure</text>
      <text x="353" y="252" fill="#475569">cited from the Approach text</text>
      <text x="353" y="276" font-style="italic" fill="#1E40AF">~1.5-2 pages in R01</text>
    </g>
  </g>

  <!-- Timeline card -->
  <g>
    <rect x="630" y="56" width="290" height="240" rx="10" fill="#D1FAE5" stroke="#059669" stroke-width="1.6"/>
    <text x="775" y="84" font-family="sans-serif" font-size="13" fill="#065F46" font-weight="bold" text-anchor="middle">Timeline + milestones</text>

    <!-- gantt -->
    <g>
      <line x1="660" y1="120" x2="900" y2="120" stroke="#94A3B8" stroke-width="1"/>
      <g font-family="monospace" font-size="9" fill="#475569">
        <text x="660" y="116" text-anchor="start">Y1</text>
        <text x="720" y="116" text-anchor="middle">Y2</text>
        <text x="780" y="116" text-anchor="middle">Y3</text>
        <text x="840" y="116" text-anchor="middle">Y4</text>
        <text x="900" y="116" text-anchor="end">Y5</text>
      </g>
      <rect x="660" y="138" width="160" height="14" rx="3" fill="#059669"/>
      <text x="826" y="149" font-family="sans-serif" font-size="10" fill="#065F46" font-weight="bold">Aim 1</text>

      <rect x="700" y="160" width="180" height="14" rx="3" fill="#10B981"/>
      <text x="886" y="171" font-family="sans-serif" font-size="10" fill="#065F46" font-weight="bold">Aim 2</text>

      <rect x="780" y="182" width="120" height="14" rx="3" fill="#34D399"/>
      <text x="906" y="193" font-family="sans-serif" font-size="10" fill="#065F46" font-weight="bold" text-anchor="end">Aim 3</text>

      <!-- milestone diamonds -->
      <polygon points="780,210 786,216 780,222 774,216" fill="#DC2626"/>
      <polygon points="840,210 846,216 840,222 834,216" fill="#DC2626"/>
      <text x="780" y="240" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle">M1</text>
      <text x="840" y="240" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle">M2</text>

      <text x="660" y="266" font-family="sans-serif" font-size="11" fill="#065F46">M1: shot-aligned ERSP pipeline frozen</text>
      <text x="660" y="282" font-family="sans-serif" font-size="11" fill="#065F46">M2: group statistics + manuscript draft</text>
    </g>
  </g>

  <text x="480" y="324" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">Each block earns its space by linking back to a specific aim, hypothesis, or contingency.</text>
</svg>
