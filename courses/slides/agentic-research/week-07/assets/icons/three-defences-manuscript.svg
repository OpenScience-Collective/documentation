<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" width="960" height="360">
  <text x="480" y="26" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Three defences for manuscripts -- one per stage pair, stack-redundant</text>

  <!-- Shield 1: Cite-the-card / figure (Stages 1-3) -->
  <g>
    <path d="M150 84 L150 244 C 150 284, 210 314, 240 324 C 270 314, 330 284, 330 244 L 330 84 Z" fill="#FEF3C7" stroke="#B45309" stroke-width="2"/>
    <text x="240" y="120" font-family="sans-serif" font-size="14" fill="#7C2D12" font-weight="bold" text-anchor="middle">Cite-the-card</text>
    <text x="240" y="138" font-family="sans-serif" font-size="14" fill="#7C2D12" font-weight="bold" text-anchor="middle">Cite-the-figure</text>
    <text x="240" y="156" font-family="monospace" font-size="11" fill="#7C2D12" text-anchor="middle">Stages 1-3</text>
    <line x1="180" y1="170" x2="300" y2="170" stroke="#B45309" stroke-width="1"/>
    <text x="240" y="196" font-family="sans-serif" font-size="11.5" fill="#7C2D12" text-anchor="middle">Every claim links to a</text>
    <text x="240" y="214" font-family="sans-serif" font-size="11.5" fill="#7C2D12" text-anchor="middle">paper-card; every figure</text>
    <text x="240" y="232" font-family="sans-serif" font-size="11.5" fill="#7C2D12" text-anchor="middle">links to its source.</text>
    <text x="240" y="266" font-family="sans-serif" font-size="11.5" fill="#7C2D12" font-style="italic" text-anchor="middle">guards: hallucinated cites,</text>
    <text x="240" y="282" font-family="sans-serif" font-size="11.5" fill="#7C2D12" font-style="italic" text-anchor="middle">orphaned figures</text>
    <rect x="190" y="294" width="100" height="20" rx="3" fill="#FFFFFF" stroke="#B45309" stroke-width="0.8"/>
    <text x="240" y="308" font-family="sans-serif" font-size="9.5" fill="#B45309" text-anchor="middle">carried from Week 5</text>
  </g>

  <!-- Shield 2: Review boomerang (Stage 4) -->
  <g>
    <path d="M390 84 L390 244 C 390 284, 450 314, 480 324 C 510 314, 570 284, 570 244 L 570 84 Z" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
    <text x="480" y="120" font-family="sans-serif" font-size="14" fill="#991B1B" font-weight="bold" text-anchor="middle">Review boomerang</text>
    <text x="480" y="156" font-family="monospace" font-size="11" fill="#991B1B" text-anchor="middle">Stage 4 (paper-review)</text>
    <line x1="420" y1="170" x2="540" y2="170" stroke="#DC2626" stroke-width="1"/>
    <text x="480" y="196" font-family="sans-serif" font-size="11.5" fill="#991B1B" text-anchor="middle">Critical findings cycle</text>
    <text x="480" y="214" font-family="sans-serif" font-size="11.5" fill="#991B1B" text-anchor="middle">back to Stage 1, 2, or 3,</text>
    <text x="480" y="232" font-family="sans-serif" font-size="11.5" fill="#991B1B" text-anchor="middle">not just prose edits.</text>
    <text x="480" y="266" font-family="sans-serif" font-size="11.5" fill="#991B1B" font-style="italic" text-anchor="middle">guards: one-shot</text>
    <text x="480" y="282" font-family="sans-serif" font-size="11.5" fill="#991B1B" font-style="italic" text-anchor="middle">convergence</text>
    <rect x="430" y="294" width="100" height="20" rx="3" fill="#FFFFFF" stroke="#DC2626" stroke-width="0.8"/>
    <text x="480" y="308" font-family="sans-serif" font-size="9.5" fill="#DC2626" text-anchor="middle">carried from Week 6</text>
  </g>

  <!-- Shield 3: Comment-merge pass (Overleaf round-trip) - NEW THIS WEEK -->
  <g>
    <path d="M630 84 L630 244 C 630 284, 690 314, 720 324 C 750 314, 810 284, 810 244 L 810 84 Z" fill="#CCFBF1" stroke="#0D9488" stroke-width="2"/>
    <text x="720" y="120" font-family="sans-serif" font-size="14" fill="#134E4A" font-weight="bold" text-anchor="middle">Comment-merge</text>
    <text x="720" y="138" font-family="sans-serif" font-size="14" fill="#134E4A" font-weight="bold" text-anchor="middle">pass</text>
    <text x="720" y="156" font-family="monospace" font-size="11" fill="#134E4A" text-anchor="middle">Overleaf round-trip</text>
    <line x1="660" y1="170" x2="780" y2="170" stroke="#0D9488" stroke-width="1"/>
    <text x="720" y="196" font-family="sans-serif" font-size="11.5" fill="#134E4A" text-anchor="middle">Transcribe every Overleaf</text>
    <text x="720" y="214" font-family="sans-serif" font-size="11.5" fill="#134E4A" text-anchor="middle">comment into a GitHub</text>
    <text x="720" y="232" font-family="sans-serif" font-size="11.5" fill="#134E4A" text-anchor="middle">issue or PR comment.</text>
    <text x="720" y="266" font-family="sans-serif" font-size="11.5" fill="#134E4A" font-style="italic" text-anchor="middle">guards: lost</text>
    <text x="720" y="282" font-family="sans-serif" font-size="11.5" fill="#134E4A" font-style="italic" text-anchor="middle">co-author feedback</text>
    <!-- NEW badge -->
    <rect x="668" y="294" width="104" height="22" rx="11" fill="#0D9488" stroke="#134E4A" stroke-width="0.8"/>
    <text x="720" y="309" font-family="sans-serif" font-size="10" fill="#FFFFFF" font-weight="bold" text-anchor="middle">NEW THIS WEEK</text>
  </g>

  <text x="480" y="346" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">None alone is sufficient. The Overleaf round closes only after the comments land in the repo.</text>
</svg>
