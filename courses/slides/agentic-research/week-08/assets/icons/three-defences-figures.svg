<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360">
  <text x="500" y="26" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Three defences for figures -- one per phase, stack-redundant</text>
  <text x="500" y="44" font-family="sans-serif" font-size="11.5" fill="#64748B" font-style="italic" text-anchor="middle">Palette consistency (Build) -- font validation (Validate) -- VLM aesthetic pass (QA)</text>

  <!-- Shield 1: Palette + theme consistency (Build, green) -->
  <g>
    <rect x="60" y="78" width="280" height="232" rx="10" fill="#D1FAE5" stroke="#059669" stroke-width="2.4"/>
    <rect x="60" y="78" width="280" height="28" rx="10" fill="#A7F3D0" stroke="#059669" stroke-width="2.4"/>
    <text x="200" y="98" font-family="sans-serif" font-size="12" fill="#064E3B" font-weight="bold" text-anchor="middle">SHIELD 1</text>

    <text x="200" y="132" font-family="sans-serif" font-size="14" fill="#065F46" font-weight="bold" text-anchor="middle">Palette + theme bible</text>
    <text x="200" y="150" font-family="sans-serif" font-size="10" fill="#065F46" font-style="italic" text-anchor="middle">Build phase</text>

    <!-- mini palette swatches -->
    <rect x="116" y="166" width="20" height="20" fill="#0072B2"/>
    <rect x="138" y="166" width="20" height="20" fill="#D55E00"/>
    <rect x="160" y="166" width="20" height="20" fill="#009E73"/>
    <rect x="182" y="166" width="20" height="20" fill="#CC79A7"/>
    <rect x="204" y="166" width="20" height="20" fill="#F0E442"/>
    <rect x="226" y="166" width="20" height="20" fill="#56B4E9"/>
    <rect x="248" y="166" width="20" height="20" fill="#E69F00"/>

    <text x="200" y="208" font-family="monospace" font-size="11" fill="#065F46" font-weight="bold" text-anchor="middle">theme.json</text>
    <text x="200" y="226" font-family="sans-serif" font-size="10.5" fill="#065F46" text-anchor="middle">one palette, one stroke,</text>
    <text x="200" y="242" font-family="sans-serif" font-size="10.5" fill="#065F46" text-anchor="middle">one style across all panels</text>

    <line x1="90" y1="262" x2="310" y2="262" stroke="#059669" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="200" y="280" font-family="sans-serif" font-size="10" fill="#065F46" text-anchor="middle">Wong | Okabe-Ito | Tol</text>
    <text x="200" y="296" font-family="sans-serif" font-size="9.5" fill="#64748B" font-style="italic" text-anchor="middle">(carried from prior weeks)</text>
  </g>

  <!-- Shield 2: Font validation (Validate, amber) - NEW -->
  <g>
    <rect x="360" y="78" width="280" height="232" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="3"/>
    <rect x="360" y="78" width="280" height="28" rx="10" fill="#FDE68A" stroke="#D97706" stroke-width="3"/>
    <text x="500" y="98" font-family="sans-serif" font-size="12" fill="#78350F" font-weight="bold" text-anchor="middle">SHIELD 2</text>
    <!-- NEW badge -->
    <rect x="600" y="64" width="52" height="22" rx="3" fill="#DC2626"/>
    <text x="626" y="79" font-family="sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold" text-anchor="middle">NEW</text>

    <text x="500" y="132" font-family="sans-serif" font-size="14" fill="#92400E" font-weight="bold" text-anchor="middle">Font validation</text>
    <text x="500" y="150" font-family="sans-serif" font-size="10" fill="#92400E" font-style="italic" text-anchor="middle">Validate phase</text>

    <!-- mini validator output -->
    <rect x="395" y="166" width="210" height="60" rx="3" fill="#FFFFFF" stroke="#D97706" stroke-width="1"/>
    <text x="500" y="184" font-family="monospace" font-size="9" fill="#1E293B" text-anchor="middle">effective_pt:  4.5</text>
    <text x="500" y="200" font-family="monospace" font-size="9" fill="#1E293B" text-anchor="middle">minimum_pt:   5.0</text>
    <text x="500" y="218" font-family="monospace" font-size="10" fill="#DC2626" font-weight="bold" text-anchor="middle">FAIL -- rescale panel</text>

    <text x="500" y="252" font-family="monospace" font-size="10.5" fill="#92400E" font-weight="bold" text-anchor="middle">validate_fonts.py</text>
    <text x="500" y="270" font-family="sans-serif" font-size="10" fill="#92400E" text-anchor="middle">walks the transform stack;</text>
    <text x="500" y="286" font-family="sans-serif" font-size="10" fill="#92400E" text-anchor="middle">per-element effective pt</text>
    <text x="500" y="302" font-family="sans-serif" font-size="9.5" fill="#DC2626" font-weight="bold" text-anchor="middle">NEW this week</text>
  </g>

  <!-- Shield 3: VLM aesthetic pass (QA, rose) -->
  <g>
    <rect x="660" y="78" width="280" height="232" rx="10" fill="#FCE7F3" stroke="#BE185D" stroke-width="2.4"/>
    <rect x="660" y="78" width="280" height="28" rx="10" fill="#FBCFE8" stroke="#BE185D" stroke-width="2.4"/>
    <text x="800" y="98" font-family="sans-serif" font-size="12" fill="#831843" font-weight="bold" text-anchor="middle">SHIELD 3</text>

    <text x="800" y="132" font-family="sans-serif" font-size="14" fill="#9D174D" font-weight="bold" text-anchor="middle">VLM aesthetic pass</text>
    <text x="800" y="150" font-family="sans-serif" font-size="10" fill="#9D174D" font-style="italic" text-anchor="middle">QA phase</text>

    <!-- judgment indicator -->
    <circle cx="800" cy="196" r="22" fill="#FFFFFF" stroke="#BE185D" stroke-width="1.6"/>
    <text x="800" y="204" font-family="sans-serif" font-size="22" fill="#BE185D" font-weight="bold" text-anchor="middle">?</text>

    <text x="800" y="248" font-family="monospace" font-size="10.5" fill="#9D174D" font-weight="bold" text-anchor="middle">/figures:figure-qa</text>
    <text x="800" y="266" font-family="sans-serif" font-size="10" fill="#9D174D" text-anchor="middle">hierarchy, layering,</text>
    <text x="800" y="282" font-family="sans-serif" font-size="10" fill="#9D174D" text-anchor="middle">visual balance</text>
    <text x="800" y="298" font-family="sans-serif" font-size="9.5" fill="#64748B" font-style="italic" text-anchor="middle">(evolved from grant-figure-qa)</text>
  </g>

  <!-- Bottom moral strip -->
  <rect x="60" y="324" width="880" height="30" rx="4" fill="#F1F5F9" stroke="#94A3B8" stroke-width="0.8"/>
  <text x="500" y="340" font-family="sans-serif" font-size="11.5" fill="#1E293B" font-weight="bold" text-anchor="middle">Stack-redundant by design. None alone is sufficient.</text>
  <text x="500" y="352" font-family="sans-serif" font-size="9.5" fill="#475569" font-style="italic" text-anchor="middle">Deterministic checks own ground truth (hex, pt, pixel). VLM owns judgment (hierarchy, layering).</text>
</svg>
