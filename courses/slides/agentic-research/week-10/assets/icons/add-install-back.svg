<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" width="1000" height="340">
  <text x="500" y="26" font-family="sans-serif" font-size="16" fill="#1E293B" font-weight="bold" text-anchor="middle">Add your skill, install it back</text>
  <text x="500" y="46" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">four steps from a folder on disk to a tool your whole lab can install</text>

  <defs>
    <marker id="arrow-ai" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- step 1 -->
  <rect x="30" y="80" width="210" height="110" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.6"/>
  <text x="135" y="104" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#1E40AF" text-anchor="middle">1 · Add the folder</text>
  <rect x="46" y="120" width="178" height="52" rx="5" fill="#0F172A"/>
  <text x="135" y="142" font-family="monospace" font-size="9.5" fill="#7DD3FC" text-anchor="middle">skills/</text>
  <text x="135" y="158" font-family="monospace" font-size="9.5" fill="#7DD3FC" text-anchor="middle">shot-change-erp/</text>

  <!-- step 2 -->
  <rect x="265" y="80" width="210" height="110" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.6"/>
  <text x="370" y="104" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#1E40AF" text-anchor="middle">2 · Bump the version</text>
  <rect x="281" y="120" width="178" height="52" rx="5" fill="#0F172A"/>
  <text x="370" y="142" font-family="monospace" font-size="9.5" fill="#A7F3D0" text-anchor="middle">plugin.json</text>
  <text x="370" y="158" font-family="monospace" font-size="9.5" fill="#A7F3D0" text-anchor="middle">0.2.3 → 0.3.0</text>

  <!-- step 3 -->
  <rect x="500" y="80" width="210" height="110" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.6"/>
  <text x="605" y="104" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#1E40AF" text-anchor="middle">3 · Add the marketplace</text>
  <rect x="516" y="120" width="178" height="52" rx="5" fill="#0F172A"/>
  <text x="605" y="141" font-family="monospace" font-size="8.5" fill="#7DD3FC" text-anchor="middle">claude plugin marketplace</text>
  <text x="605" y="156" font-family="monospace" font-size="8.5" fill="#7DD3FC" text-anchor="middle">add ./research-skills</text>

  <!-- step 4 -->
  <rect x="735" y="80" width="230" height="110" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="850" y="104" font-family="sans-serif" font-size="12.5" font-weight="bold" fill="#1E40AF" text-anchor="middle">4 · Install it</text>
  <rect x="751" y="120" width="198" height="52" rx="5" fill="#0F172A"/>
  <text x="850" y="141" font-family="monospace" font-size="8.5" fill="#7DD3FC" text-anchor="middle">claude plugin install</text>
  <text x="850" y="156" font-family="monospace" font-size="8" fill="#7DD3FC" text-anchor="middle">neuroinformatics@research-skills</text>

  <!-- arrows -->
  <line x1="240" y1="135" x2="263" y2="135" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrow-ai)"/>
  <line x1="475" y1="135" x2="498" y2="135" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrow-ai)"/>
  <line x1="710" y1="135" x2="733" y2="135" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrow-ai)"/>

  <!-- cross-agent badge -->
  <rect x="300" y="218" width="400" height="40" rx="20" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.8"/>
  <text x="500" y="243" font-family="sans-serif" font-size="11.5" font-weight="bold" fill="#166534" text-anchor="middle">AGENTS.md  =  the same skill works in Codex + Copilot CLI too</text>

  <!-- bottom strip -->
  <rect x="60" y="298" width="880" height="24" rx="5" fill="#F1F5F9" stroke="#94A3B8" stroke-width="0.6"/>
  <text x="500" y="314" font-family="sans-serif" font-size="11" fill="#1E293B" text-anchor="middle" font-weight="bold">Write it once; every agent you use can run it.</text>
</svg>
