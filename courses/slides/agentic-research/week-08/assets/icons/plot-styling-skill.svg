<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360">
  <text x="500" y="24" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">/figures:plot-styling -- SciencePlots + SVG-with-text discipline</text>
  <text x="500" y="42" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">Save as SVG, transparent, tight bbox, embedded text -- the validator inspects every &lt;text&gt; element</text>

  <!-- LEFT: code -->
  <g>
    <rect x="50" y="64" width="460" height="280" rx="6" fill="#1E293B"/>
    <rect x="50" y="64" width="460" height="26" rx="6" fill="#334155"/>
    <circle cx="68" cy="77" r="4" fill="#EF4444"/>
    <circle cx="82" cy="77" r="4" fill="#F59E0B"/>
    <circle cx="96" cy="77" r="4" fill="#10B981"/>
    <text x="280" y="82" font-family="monospace" font-size="10" fill="#94A3B8" text-anchor="middle">panel_a.py</text>

    <text x="68" y="112" font-family="monospace" font-size="11" fill="#94A3B8">import matplotlib.pyplot as plt</text>
    <text x="68" y="128" font-family="monospace" font-size="11" fill="#94A3B8">import scienceplots</text>
    <text x="68" y="144" font-family="monospace" font-size="11" fill="#64748B" font-style="italic"># registers SciencePlots styles</text>

    <text x="68" y="168" font-family="monospace" font-size="11" fill="#FCD34D">plt.style.use(</text>
    <text x="68" y="184" font-family="monospace" font-size="11" fill="#86EFAC">    ["science", "nature", "no-latex"]</text>
    <text x="68" y="200" font-family="monospace" font-size="11" fill="#FCD34D">)</text>

    <text x="68" y="222" font-family="monospace" font-size="11" fill="#94A3B8">fig, ax = plt.subplots(figsize=(3.5, 2.5))</text>
    <text x="68" y="238" font-family="monospace" font-size="11" fill="#94A3B8">ax.plot(t, y, label="signal")</text>
    <text x="68" y="254" font-family="monospace" font-size="11" fill="#94A3B8">ax.set_xlabel("time (s)")</text>
    <text x="68" y="270" font-family="monospace" font-size="11" fill="#94A3B8">ax.set_ylabel("amplitude")</text>

    <text x="68" y="294" font-family="monospace" font-size="11" fill="#FCD34D">fig.savefig(</text>
    <text x="68" y="310" font-family="monospace" font-size="11" fill="#86EFAC">    "panel_a.svg",</text>
    <text x="68" y="326" font-family="monospace" font-size="11" fill="#86EFAC">    transparent=True, bbox_inches="tight"</text>
    <text x="68" y="342" font-family="monospace" font-size="11" fill="#FCD34D">)</text>
  </g>

  <!-- Annotations: highlight the load-bearing lines -->
  <defs>
    <marker id="arrow-note-1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
  </defs>
  <line x1="540" y1="184" x2="510" y2="184" stroke="#059669" stroke-width="1.2" marker-end="url(#arrow-note-1)"/>
  <text x="544" y="180" font-family="sans-serif" font-size="9.5" fill="#065F46" font-weight="bold">SciencePlots style</text>
  <text x="544" y="192" font-family="sans-serif" font-size="9" fill="#065F46" font-style="italic">7 pt body, no chart junk</text>

  <line x1="540" y1="316" x2="510" y2="316" stroke="#059669" stroke-width="1.2" marker-end="url(#arrow-note-1)"/>
  <text x="544" y="312" font-family="sans-serif" font-size="9.5" fill="#065F46" font-weight="bold">SVG + transparent + tight</text>
  <text x="544" y="324" font-family="sans-serif" font-size="9" fill="#065F46" font-style="italic">required for validate_fonts</text>

  <!-- RIGHT: rendered panel -->
  <g>
    <rect x="540" y="64" width="410" height="280" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.6"/>
    <text x="745" y="86" font-family="sans-serif" font-size="11" fill="#065F46" font-weight="bold" text-anchor="middle">Rendered panel -- Nature 1-column</text>
    <!-- axes -->
    <line x1="600" y1="290" x2="900" y2="290" stroke="#1E293B" stroke-width="1.2"/>
    <line x1="600" y1="120" x2="600" y2="290" stroke="#1E293B" stroke-width="1.2"/>
    <!-- data: 3 colorblind-safe lines -->
    <path d="M 600 250 Q 660 200 720 170 T 840 130 L 900 124" fill="none" stroke="#0072B2" stroke-width="1.6"/>
    <path d="M 600 270 Q 660 240 720 220 T 840 200 L 900 196" fill="none" stroke="#D55E00" stroke-width="1.6"/>
    <path d="M 600 230 Q 660 170 720 145 T 840 200 L 900 220" fill="none" stroke="#009E73" stroke-width="1.6"/>
    <!-- legend -->
    <rect x="800" y="128" width="14" height="3" fill="#0072B2"/>
    <text x="820" y="132" font-family="sans-serif" font-size="10" fill="#1E293B">control</text>
    <rect x="800" y="144" width="14" height="3" fill="#D55E00"/>
    <text x="820" y="148" font-family="sans-serif" font-size="10" fill="#1E293B">drug A</text>
    <rect x="800" y="160" width="14" height="3" fill="#009E73"/>
    <text x="820" y="164" font-family="sans-serif" font-size="10" fill="#1E293B">drug B</text>
    <!-- axis labels -->
    <text x="580" y="208" font-family="sans-serif" font-size="11" fill="#1E293B" text-anchor="middle" transform="rotate(-90 580 208)">amplitude</text>
    <text x="750" y="316" font-family="sans-serif" font-size="11" fill="#1E293B" text-anchor="middle">time (s)</text>
    <!-- tick labels -->
    <text x="660" y="304" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle">0.25</text>
    <text x="720" y="304" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle">0.50</text>
    <text x="780" y="304" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle">0.75</text>
    <text x="840" y="304" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle">1.00</text>
    <!-- annotation badge -->
    <rect x="600" y="326" width="270" height="14" rx="2" fill="#D1FAE5" stroke="#059669" stroke-width="0.6"/>
    <text x="735" y="336" font-family="sans-serif" font-size="9.5" fill="#065F46" font-weight="bold" text-anchor="middle">axis labels at 7 pt -- Nature minimum 5 pt PASS</text>
  </g>
</svg>
