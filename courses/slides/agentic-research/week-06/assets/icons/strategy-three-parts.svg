<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" width="960" height="380">
  <text x="480" y="26" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Research Strategy: three sections in fixed order</text>

  <!-- Significance -->
  <g>
    <rect x="50" y="60" width="280" height="280" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.8"/>
    <text x="190" y="92" font-family="sans-serif" font-size="16" fill="#1E40AF" font-weight="bold" text-anchor="middle">Significance</text>
    <text x="190" y="112" font-family="monospace" font-size="11" fill="#1E40AF" text-anchor="middle">"why this matters"</text>

    <line x1="80" y1="124" x2="300" y2="124" stroke="#2563EB" stroke-width="1"/>

    <g font-family="sans-serif" font-size="12" fill="#1E40AF">
      <text x="68" y="148" font-weight="bold">Problem</text>
      <text x="68" y="164" fill="#475569">scope + numbers (quantify it)</text>
      <text x="68" y="192" font-weight="bold">Gap</text>
      <text x="68" y="208" fill="#475569">what remains unknown</text>
      <text x="68" y="236" font-weight="bold">Why it matters</text>
      <text x="68" y="252" fill="#475569">field / clinical / societal</text>
      <text x="68" y="280" font-weight="bold">What success enables</text>
      <text x="68" y="296" fill="#475569">downstream impact</text>
    </g>

    <text x="190" y="324" font-family="monospace" font-size="10" fill="#1E40AF" text-anchor="middle">R01: ~2 pages</text>
  </g>

  <!-- Innovation -->
  <g>
    <rect x="340" y="60" width="280" height="280" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.8"/>
    <text x="480" y="92" font-family="sans-serif" font-size="16" fill="#5B21B6" font-weight="bold" text-anchor="middle">Innovation</text>
    <text x="480" y="112" font-family="monospace" font-size="11" fill="#5B21B6" text-anchor="middle">"what is new"</text>

    <line x1="370" y1="124" x2="590" y2="124" stroke="#7C3AED" stroke-width="1"/>

    <g font-family="sans-serif" font-size="12" fill="#5B21B6">
      <text x="358" y="148" font-weight="bold">Conceptual</text>
      <text x="358" y="164" fill="#475569">new hypothesis or framing</text>
      <text x="358" y="192" font-weight="bold">Technical</text>
      <text x="358" y="208" fill="#475569">new methods / instrumentation</text>
      <text x="358" y="236" font-weight="bold">Methodological</text>
      <text x="358" y="252" fill="#475569">analyses + study design</text>
      <text x="358" y="280" font-weight="bold">Field advancement</text>
      <text x="358" y="296" fill="#475569">why current approaches fail</text>
    </g>

    <text x="480" y="324" font-family="monospace" font-size="10" fill="#5B21B6" text-anchor="middle">R01: ~1.5 pages</text>
  </g>

  <!-- Approach -->
  <g>
    <rect x="630" y="60" width="280" height="280" rx="10" fill="#D1FAE5" stroke="#059669" stroke-width="1.8"/>
    <text x="770" y="92" font-family="sans-serif" font-size="16" fill="#065F46" font-weight="bold" text-anchor="middle">Approach</text>
    <text x="770" y="112" font-family="monospace" font-size="11" fill="#065F46" text-anchor="middle">"how it will work"</text>

    <line x1="660" y1="124" x2="880" y2="124" stroke="#059669" stroke-width="1"/>

    <g font-family="sans-serif" font-size="12" fill="#065F46">
      <text x="648" y="148" font-weight="bold">Preliminary data</text>
      <text x="648" y="164" fill="#475569">we can already do this</text>
      <text x="648" y="192" font-weight="bold">Aim-by-aim plan</text>
      <text x="648" y="208" fill="#475569">methods, hypothesis, analyses</text>
      <text x="648" y="236" font-weight="bold">Rigor + reproducibility</text>
      <text x="648" y="252" fill="#475569">authentication, blinding, BIDS</text>
      <text x="648" y="280" font-weight="bold">Timeline + alternatives</text>
      <text x="648" y="296" fill="#475569">milestones, what-if branches</text>
    </g>

    <text x="770" y="324" font-family="monospace" font-size="10" fill="#065F46" text-anchor="middle">R01: ~8.5 pages</text>
  </g>

  <!-- Arrow flow underneath -->
  <g>
    <line x1="50" y1="356" x2="910" y2="356" stroke="#94A3B8" stroke-width="1.4"/>
    <polygon points="910,356 900,351 900,361" fill="#94A3B8"/>
    <text x="190" y="372" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">earns the right to ask</text>
    <text x="480" y="372" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">justifies the bet</text>
    <text x="770" y="372" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">delivers the work</text>
  </g>
</svg>
