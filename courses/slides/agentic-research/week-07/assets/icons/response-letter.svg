<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" width="960" height="340">
  <text x="480" y="26" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Response to reviewers -- point by point</text>
  <text x="480" y="44" font-family="sans-serif" font-size="11.5" fill="#64748B" font-style="italic" text-anchor="middle">For each comment: Response, then Change, then a relative path. Vertical change bars in the LaTeX source.</text>

  <!-- LEFT: reviewer comments column (Red header) -->
  <g>
    <rect x="60" y="68" width="380" height="240" rx="6" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.4"/>
    <rect x="60" y="68" width="380" height="24" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.4"/>
    <text x="250" y="84" font-family="sans-serif" font-size="11" fill="#991B1B" font-weight="bold" text-anchor="middle">Reviewer comments (extracted)</text>

    <!-- Reviewer 1 -->
    <rect x="76" y="106" width="348" height="84" rx="3" fill="#FEF2F2" stroke="#DC2626" stroke-width="0.8"/>
    <text x="86" y="122" font-family="sans-serif" font-size="10.5" fill="#991B1B" font-weight="bold">Reviewer 1  --  comment 3</text>
    <text x="86" y="142" font-family="sans-serif" font-size="10" fill="#1E293B">"The Introduction conflates intersubject correlation</text>
    <text x="86" y="156" font-family="sans-serif" font-size="10" fill="#1E293B">with stimulus-locked tracking. The two are distinct</text>
    <text x="86" y="170" font-family="sans-serif" font-size="10" fill="#1E293B">phenomena in this literature."</text>
    <text x="86" y="184" font-family="monospace" font-size="9.5" fill="#991B1B" font-style="italic">page 3, line 12-15</text>

    <!-- Reviewer 2 -->
    <rect x="76" y="200" width="348" height="78" rx="3" fill="#FEF2F2" stroke="#DC2626" stroke-width="0.8"/>
    <text x="86" y="216" font-family="sans-serif" font-size="10.5" fill="#991B1B" font-weight="bold">Reviewer 2  --  comment 1</text>
    <text x="86" y="236" font-family="sans-serif" font-size="10" fill="#1E293B">"Add age-effect coverage. The cited cohort is</text>
    <text x="86" y="250" font-family="sans-serif" font-size="10" fill="#1E293B">developmental, but the lit review stays adult."</text>
    <text x="86" y="266" font-family="monospace" font-size="9.5" fill="#991B1B" font-style="italic">page 5, paragraph 2</text>
  </g>

  <!-- Arrow center -->
  <path d="M450 188 L498 188" fill="none" stroke="#475569" stroke-width="2"/>
  <polygon points="498,188 490,184 490,192" fill="#475569"/>

  <!-- RIGHT: point-by-point responses (Green) -->
  <g>
    <rect x="510" y="68" width="390" height="240" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.4"/>
    <rect x="510" y="68" width="390" height="24" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.4"/>
    <text x="705" y="84" font-family="sans-serif" font-size="11" fill="#065F46" font-weight="bold" text-anchor="middle">Point-by-point response</text>

    <!-- Response 1 -->
    <rect x="526" y="106" width="358" height="84" rx="3" fill="#F0FDF4" stroke="#059669" stroke-width="0.8"/>
    <!-- vertical change bar -->
    <rect x="526" y="106" width="3" height="84" fill="#DC2626"/>
    <text x="538" y="122" font-family="sans-serif" font-size="10.5" fill="#065F46" font-weight="bold">R1.3 -- Response</text>
    <text x="538" y="138" font-family="sans-serif" font-size="9.5" fill="#1E293B">We thank the reviewer. The conflation was</text>
    <text x="538" y="152" font-family="sans-serif" font-size="9.5" fill="#1E293B">unintentional; the two phenomena are now</text>
    <text x="538" y="166" font-family="sans-serif" font-size="9.5" fill="#1E293B">treated in separate paragraphs.</text>
    <text x="538" y="184" font-family="monospace" font-size="9.5" fill="#7C3AED">Change: intro.tex:12-22 (2 paragraphs)</text>

    <!-- Response 2 -->
    <rect x="526" y="200" width="358" height="78" rx="3" fill="#F0FDF4" stroke="#059669" stroke-width="0.8"/>
    <rect x="526" y="200" width="3" height="78" fill="#DC2626"/>
    <text x="538" y="216" font-family="sans-serif" font-size="10.5" fill="#065F46" font-weight="bold">R2.1 -- Response</text>
    <text x="538" y="232" font-family="sans-serif" font-size="9.5" fill="#1E293B">Agreed. We have added an age-effect</text>
    <text x="538" y="246" font-family="sans-serif" font-size="9.5" fill="#1E293B">paragraph and 3 cards (Cantlon 2019, etc.)</text>
    <text x="538" y="266" font-family="monospace" font-size="9.5" fill="#7C3AED">Change: intro.tex:78-95  + 3 new cards</text>
  </g>

  <!-- bottom rule -->
  <rect x="60" y="316" width="840" height="22" rx="4" fill="#FEF3C7" stroke="#B45309" stroke-width="1"/>
  <text x="480" y="331" font-family="sans-serif" font-size="11" fill="#78350F" font-weight="bold" text-anchor="middle">Tone rule: respond, do not rebut. Rebut only the genuinely wrong critiques.</text>
</svg>
