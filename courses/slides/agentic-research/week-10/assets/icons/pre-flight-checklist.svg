<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" width="1000" height="380">
  <text x="500" y="26" font-family="sans-serif" font-size="16" fill="#1E293B" font-weight="bold" text-anchor="middle">Before you build -- a quick pre-flight</text>
  <text x="500" y="46" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">the best skill is one you will actually reuse</text>

  <!-- checklist panel -->
  <rect x="60" y="70" width="880" height="200" rx="10" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.4"/>

  <!-- left column -->
  <rect x="86" y="98" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.8"/>
  <text x="93" y="111" font-family="sans-serif" font-size="12" font-weight="bold" fill="#16A34A" text-anchor="middle">✓</text>
  <text x="114" y="111" font-family="sans-serif" font-size="12.5" fill="#1E293B">Is there already a skill for this?</text>

  <rect x="86" y="150" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.8"/>
  <text x="93" y="163" font-family="sans-serif" font-size="12" font-weight="bold" fill="#16A34A" text-anchor="middle">✓</text>
  <text x="114" y="163" font-family="sans-serif" font-size="12.5" fill="#1E293B">Knowledge (skill), a connection (MCP),</text>
  <text x="114" y="181" font-family="sans-serif" font-size="12.5" fill="#1E293B">or an event (hook)?</text>

  <rect x="86" y="214" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.8"/>
  <text x="93" y="227" font-family="sans-serif" font-size="12" font-weight="bold" fill="#16A34A" text-anchor="middle">✓</text>
  <text x="114" y="227" font-family="sans-serif" font-size="12.5" fill="#1E293B">Will I actually reuse it?</text>

  <!-- right column -->
  <rect x="516" y="98" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.8"/>
  <text x="523" y="111" font-family="sans-serif" font-size="12" font-weight="bold" fill="#16A34A" text-anchor="middle">✓</text>
  <text x="544" y="111" font-family="sans-serif" font-size="12.5" fill="#1E293B">Is SKILL.md lean (detail in references/)?</text>

  <rect x="516" y="150" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.8"/>
  <text x="523" y="163" font-family="sans-serif" font-size="12" font-weight="bold" fill="#16A34A" text-anchor="middle">✓</text>
  <text x="544" y="163" font-family="sans-serif" font-size="12.5" fill="#1E293B">Did I test that it triggers?</text>

  <rect x="516" y="214" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.8"/>
  <text x="523" y="227" font-family="sans-serif" font-size="12" font-weight="bold" fill="#DC2626" text-anchor="middle">✕</text>
  <text x="544" y="227" font-family="sans-serif" font-size="12.5" fill="#1E293B">Any secrets or data? Never put them in.</text>

  <!-- do-not-build band -->
  <rect x="60" y="286" width="880" height="34" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.4"/>
  <text x="500" y="308" font-family="sans-serif" font-size="11.5" fill="#991B1B" text-anchor="middle" font-weight="bold">Skip it if:  it's a one-off  ·  it already exists  ·  it needs a secret</text>

  <!-- bottom strip -->
  <rect x="60" y="332" width="880" height="26" rx="5" fill="#0F172A"/>
  <text x="500" y="349" font-family="sans-serif" font-size="11.5" fill="#E2E8F0" text-anchor="middle" font-weight="bold">The bar is reuse: if you will do it again, make it a skill.</text>
</svg>
