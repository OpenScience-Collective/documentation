<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 320" width="1100" height="320">
  <!-- Title -->
  <text x="550" y="22" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">research-skills runs across three coding agents</text>
  <text x="550" y="40" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">one plugin set, three runtimes -- same prompts, same outputs</text>

  <!-- Three agent badges (left column) -->
  <g>
    <rect x="40" y="80" width="200" height="52" rx="10" fill="#FAF5FF" stroke="#7C3AED" stroke-width="1.8"/>
    <circle cx="72" cy="106" r="14" fill="#7C3AED"/>
    <text x="72" y="111" font-family="sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold" text-anchor="middle">C</text>
    <text x="98" y="103" font-family="sans-serif" font-size="13" fill="#1E293B" font-weight="bold">Claude Code</text>
    <text x="98" y="120" font-family="monospace" font-size="10" fill="#475569">CLI + IDE</text>
  </g>

  <g>
    <rect x="40" y="148" width="200" height="52" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
    <circle cx="72" cy="174" r="14" fill="#059669"/>
    <text x="72" y="179" font-family="sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold" text-anchor="middle">X</text>
    <text x="98" y="171" font-family="sans-serif" font-size="13" fill="#1E293B" font-weight="bold">Codex CLI</text>
    <text x="98" y="188" font-family="monospace" font-size="10" fill="#475569">openai-curated</text>
  </g>

  <g>
    <rect x="40" y="216" width="200" height="52" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.8"/>
    <circle cx="72" cy="242" r="14" fill="#2563EB"/>
    <text x="72" y="247" font-family="sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold" text-anchor="middle">P</text>
    <text x="98" y="239" font-family="sans-serif" font-size="13" fill="#1E293B" font-weight="bold">Copilot (VS Code)</text>
    <text x="98" y="256" font-family="monospace" font-size="10" fill="#475569">free tier available</text>
  </g>

  <!-- Arrows converging to centre -->
  <path d="M250 106 C 360 106, 400 174, 460 174" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <polygon points="460,174 450,169 450,179" fill="#94A3B8"/>
  <path d="M250 174 L460 174" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <polygon points="460,174 450,169 450,179" fill="#94A3B8"/>
  <path d="M250 242 C 360 242, 400 174, 460 174" fill="none" stroke="#94A3B8" stroke-width="2"/>

  <!-- Central hub: research-skills -->
  <g>
    <circle cx="560" cy="174" r="72" fill="#FEF3C7" stroke="#B45309" stroke-width="2.2"/>
    <text x="560" y="160" font-family="sans-serif" font-size="14" fill="#7C2D12" font-weight="bold" text-anchor="middle">research-skills</text>
    <text x="560" y="180" font-family="monospace" font-size="11" fill="#7C2D12" text-anchor="middle">7 plugins</text>
    <text x="560" y="200" font-family="sans-serif" font-size="10" fill="#92400E" text-anchor="middle" font-style="italic">opencite, manuscript, grant,</text>
    <text x="560" y="214" font-family="sans-serif" font-size="10" fill="#92400E" text-anchor="middle" font-style="italic">figures, neuroinformatics, ...</text>
  </g>

  <!-- Arrow out -->
  <path d="M632 174 L684 174" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <polygon points="684,174 674,169 674,179" fill="#94A3B8"/>

  <!-- Right side: plugins stacked compactly -->
  <g font-family="monospace" font-size="11" fill="#1E293B">
    <rect x="700" y="76" width="360" height="28" rx="5" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2"/>
    <text x="712" y="94">/grant:grant-writing</text>
    <rect x="700" y="112" width="360" height="28" rx="5" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2"/>
    <text x="712" y="130">/grant:grant-review</text>
    <rect x="700" y="148" width="360" height="28" rx="5" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2"/>
    <text x="712" y="166">/opencite:opencite</text>
    <rect x="700" y="184" width="360" height="28" rx="5" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2"/>
    <text x="712" y="202">/manuscript:paper-review</text>
    <rect x="700" y="220" width="360" height="28" rx="5" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2"/>
    <text x="712" y="238">/scientific-figures:scientific-figures</text>
    <rect x="700" y="256" width="360" height="28" rx="5" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.2"/>
    <text x="712" y="274">/neuroinformatics:bids-validator</text>
  </g>

  <!-- Footer caption -->
  <text x="550" y="304" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">Install once; drive from whichever agent your institution licences (or your wallet allows).</text>
</svg>
