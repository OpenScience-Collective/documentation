<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" width="1000" height="380">
  <text x="500" y="26" font-family="sans-serif" font-size="16" fill="#1E293B" font-weight="bold" text-anchor="middle">Progressive disclosure -- why skills stay cheap</text>
  <text x="500" y="46" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">three levels load in order; you only pay for the context you actually use</text>

  <defs>
    <marker id="arrow-down-pd" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 5 10 L 10 0 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Tier 1 -->
  <rect x="320" y="74" width="360" height="58" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="500" y="98" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1E40AF" text-anchor="middle">1 · Metadata  (name + description)</text>
  <text x="500" y="118" font-family="sans-serif" font-size="10.5" fill="#1E40AF" text-anchor="middle">always in context  ·  ~100 words</text>

  <line x1="500" y1="134" x2="500" y2="156" stroke="#94A3B8" stroke-width="1.6" marker-end="url(#arrow-down-pd)"/>
  <text x="610" y="150" font-family="sans-serif" font-size="9.5" font-style="italic" fill="#64748B">when it triggers</text>

  <!-- Tier 2 -->
  <rect x="250" y="162" width="500" height="58" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.8"/>
  <text x="500" y="186" font-family="monospace" font-size="13" font-weight="bold" fill="#1E40AF" text-anchor="middle">2 · SKILL.md body</text>
  <text x="500" y="206" font-family="sans-serif" font-size="10.5" fill="#1E40AF" text-anchor="middle">loaded only when the skill triggers  ·  target 1,500-2,000 words</text>

  <line x1="500" y1="222" x2="500" y2="244" stroke="#94A3B8" stroke-width="1.6" marker-end="url(#arrow-down-pd)"/>
  <text x="610" y="238" font-family="sans-serif" font-size="9.5" font-style="italic" fill="#64748B">as needed</text>

  <!-- Tier 3 -->
  <rect x="170" y="250" width="660" height="64" rx="8" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.6"/>
  <text x="500" y="274" font-family="monospace" font-size="13" font-weight="bold" fill="#334155" text-anchor="middle">3 · references/  ·  scripts/  ·  assets/</text>
  <text x="500" y="294" font-family="sans-serif" font-size="10.5" fill="#475569" text-anchor="middle">pulled only when Claude needs them  ·  effectively unlimited*</text>
  <text x="500" y="308" font-family="sans-serif" font-size="9" font-style="italic" fill="#94A3B8" text-anchor="middle">* scripts run without ever being read into the context window</text>

  <!-- bottom strip -->
  <rect x="60" y="338" width="880" height="26" rx="5" fill="#F1F5F9" stroke="#94A3B8" stroke-width="0.6"/>
  <text x="500" y="355" font-family="sans-serif" font-size="11.5" fill="#1E293B" text-anchor="middle" font-weight="bold">Keep SKILL.md lean; let references/ carry the weight.</text>
</svg>
