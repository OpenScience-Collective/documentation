<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360">
  <text x="500" y="26" font-family="sans-serif" font-size="16" fill="#1E293B" font-weight="bold" text-anchor="middle">Review, then iterate</text>
  <text x="500" y="46" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">an agent checks the build; then real use shows you what to fix</text>

  <defs>
    <marker id="arrow-cycle" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- skill-reviewer agent card -->
  <rect x="60" y="78" width="380" height="206" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.8"/>
  <rect x="60" y="78" width="380" height="28" rx="10" fill="#DDD6FE" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="80" y="98" font-family="monospace" font-size="12" font-weight="bold" fill="#5B21B6">skill-reviewer  (agent)</text>
  <text x="80" y="132" font-family="sans-serif" font-size="11" fill="#5B21B6">✓  description uses specific trigger phrases</text>
  <text x="80" y="158" font-family="sans-serif" font-size="11" fill="#5B21B6">✓  body is lean  (under ~2,000 words)</text>
  <text x="80" y="184" font-family="sans-serif" font-size="11" fill="#5B21B6">✓  detail moved to references/</text>
  <text x="80" y="210" font-family="sans-serif" font-size="11" fill="#5B21B6">✓  writing is imperative, not second person</text>
  <text x="80" y="236" font-family="sans-serif" font-size="11" fill="#5B21B6">✓  examples are complete</text>
  <text x="80" y="266" font-family="sans-serif" font-size="10" font-style="italic" fill="#7C3AED">"Review my skill and check it follows best practices."</text>

  <!-- iterate cycle (right) -->
  <text x="725" y="98" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1E40AF" text-anchor="middle">then the real loop</text>
  <!-- Use -->
  <rect x="640" y="112" width="170" height="48" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.6"/>
  <text x="725" y="141" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1E40AF" text-anchor="middle">Use it for real</text>
  <!-- Notice -->
  <rect x="800" y="186" width="150" height="48" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.6"/>
  <text x="875" y="208" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1E40AF" text-anchor="middle">Notice the</text>
  <text x="875" y="224" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1E40AF" text-anchor="middle">struggle</text>
  <!-- Revise -->
  <rect x="610" y="186" width="170" height="48" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.6"/>
  <text x="695" y="208" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1E40AF" text-anchor="middle">Revise: sharpen,</text>
  <text x="695" y="224" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1E40AF" text-anchor="middle">move, add a script</text>

  <!-- cycle arrows (counter-clockwise: Use -> Notice -> Revise -> Use) -->
  <path d="M 800 158 Q 895 168 877 184" fill="none" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrow-cycle)"/>
  <path d="M 798 210 L 784 210" fill="none" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrow-cycle)"/>
  <path d="M 668 184 Q 622 172 650 161" fill="none" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrow-cycle)"/>

  <!-- bottom strip -->
  <rect x="60" y="300" width="880" height="42" rx="6" fill="#0F172A"/>
  <text x="500" y="320" font-family="sans-serif" font-size="11.5" fill="#E2E8F0" text-anchor="middle" font-weight="bold">This is Week 10's mechanical defence:</text>
  <text x="500" y="336" font-family="sans-serif" font-size="10.5" fill="#CBD5E1" text-anchor="middle">a deterministic gate that turns "looks fine" into "passes review" -- like cite-the-card (Wk5) and validate_fonts.py (Wk8).</text>
</svg>
