<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="1000" height="400">
  <text x="500" y="26" font-family="sans-serif" font-size="16" fill="#1E293B" font-weight="bold" text-anchor="middle">You have used all six already</text>
  <text x="500" y="46" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">every week ran one of the building blocks; here are their real names</text>

  <!-- timeline rail -->
  <line x1="70" y1="130" x2="930" y2="130" stroke="#94A3B8" stroke-width="2"/>

  <!-- Week 1: foundation -->
  <text x="100" y="92" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">git / CLI</text>
  <text x="100" y="110" font-family="sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">Wk1</text>
  <circle cx="100" cy="130" r="7" fill="#64748B" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="100" y="152" font-family="sans-serif" font-size="9.5" font-weight="bold" fill="#64748B" text-anchor="middle">foundation</text>

  <!-- Week 2: context -->
  <text x="200" y="92" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">CLAUDE.md</text>
  <text x="200" y="110" font-family="sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">Wk2</text>
  <circle cx="200" cy="130" r="7" fill="#64748B" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="200" y="152" font-family="sans-serif" font-size="9.5" font-weight="bold" fill="#64748B" text-anchor="middle">context</text>

  <!-- Week 3: command -->
  <text x="300" y="92" font-family="monospace" font-size="9" fill="#155E75" text-anchor="middle">/epic-dev</text>
  <text x="300" y="110" font-family="sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">Wk3</text>
  <circle cx="300" cy="130" r="7" fill="#0891B2" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="300" y="152" font-family="sans-serif" font-size="9.5" font-weight="bold" fill="#0891B2" text-anchor="middle">Command</text>

  <!-- Week 4: hook -->
  <text x="400" y="92" font-family="monospace" font-size="9" fill="#92400E" text-anchor="middle">pre-commit</text>
  <text x="400" y="110" font-family="sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="middle">Wk4</text>
  <circle cx="400" cy="130" r="7" fill="#D97706" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="400" y="152" font-family="sans-serif" font-size="9.5" font-weight="bold" fill="#D97706" text-anchor="middle">Hook</text>

