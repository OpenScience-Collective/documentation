<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" width="960" height="320">
  <!-- Title -->
  <text x="480" y="26" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Accessibility: agent-agnostic tooling lowers the cost gate</text>

  <!-- Left panel: before -->
  <g>
    <rect x="50" y="60" width="380" height="210" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.6"/>
    <text x="240" y="86" font-family="sans-serif" font-size="13" fill="#7F1D1D" font-weight="bold" text-anchor="middle">Before (Claude-only)</text>

    <!-- locked padlock icon -->
    <g transform="translate(78,108)">
      <rect x="0" y="6" width="22" height="18" rx="3" fill="#FCA5A5"/>
      <path d="M5 6 V2 C 5 -4, 17 -4, 17 2 V6" fill="none" stroke="#7F1D1D" stroke-width="2"/>
      <circle cx="11" cy="15" r="2" fill="#7F1D1D"/>
    </g>

    <text x="120" y="120" font-family="monospace" font-size="11" fill="#7F1D1D">Claude Pro $20/mo</text>
    <text x="120" y="140" font-family="monospace" font-size="11" fill="#7F1D1D">API credits required</text>
    <text x="120" y="160" font-family="monospace" font-size="11" fill="#7F1D1D">single-vendor risk</text>

    <text x="78" y="200" font-family="sans-serif" font-size="11" fill="#7F1D1D" font-style="italic">Trainees on student stipends</text>
    <text x="78" y="216" font-family="sans-serif" font-size="11" fill="#7F1D1D" font-style="italic">and labs in LMIC paused at the</text>
    <text x="78" y="232" font-family="sans-serif" font-size="11" fill="#7F1D1D" font-style="italic">paywall before any teaching began.</text>
  </g>

  <!-- Arrow -->
  <path d="M442 165 L508 165" fill="none" stroke="#475569" stroke-width="2.4"/>
  <polygon points="508,165 498,160 498,170" fill="#475569"/>

  <!-- Right panel: after -->
  <g>
    <rect x="520" y="60" width="390" height="210" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
    <text x="715" y="86" font-family="sans-serif" font-size="13" fill="#065F46" font-weight="bold" text-anchor="middle">Now (agent-agnostic)</text>

    <!-- open padlock icon -->
    <g transform="translate(548,108)">
      <rect x="0" y="6" width="22" height="18" rx="3" fill="#86EFAC"/>
      <path d="M5 6 V2 C 5 -4, 17 -4, 17 2 V0" fill="none" stroke="#065F46" stroke-width="2"/>
      <circle cx="11" cy="15" r="2" fill="#065F46"/>
    </g>

    <text x="588" y="120" font-family="monospace" font-size="11" fill="#065F46">GitHub Copilot: free for students</text>
    <text x="588" y="140" font-family="monospace" font-size="11" fill="#065F46">Codex CLI: free tier + pay-per-use</text>
    <text x="588" y="160" font-family="monospace" font-size="11" fill="#065F46">Claude Code: same plugins</text>

    <text x="548" y="200" font-family="sans-serif" font-size="11" fill="#065F46" font-style="italic">A first-year PhD with a free GitHub</text>
    <text x="548" y="216" font-family="sans-serif" font-size="11" fill="#065F46" font-style="italic">student Pack runs the same /grant:</text>
    <text x="548" y="232" font-family="sans-serif" font-size="11" fill="#065F46" font-style="italic">grant-writing skill as a funded lab.</text>
  </g>

  <!-- Caption -->
  <text x="480" y="300" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">Same skill files, same workflow. The runtime is now a deployment choice, not a knowledge prerequisite.</text>
</svg>
