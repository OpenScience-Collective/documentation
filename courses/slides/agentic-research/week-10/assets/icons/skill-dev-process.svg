<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="1000" height="320">
  <text x="500" y="26" font-family="sans-serif" font-size="16" fill="#1E293B" font-weight="bold" text-anchor="middle">/skill-development -- the skill that builds skills</text>
  <text x="500" y="46" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">a six-step process; steps 4-6 loop until the skill triggers cleanly</text>

  <defs>
    <marker id="arrow-step" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-loop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- step boxes -->
  <!-- 1 -->
  <rect x="30" y="110" width="140" height="84" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.6"/>
  <text x="100" y="134" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1E40AF" text-anchor="middle">1 · Understand</text>
  <text x="100" y="156" font-family="sans-serif" font-size="9.5" fill="#1E40AF" text-anchor="middle">concrete example</text>
  <text x="100" y="170" font-family="sans-serif" font-size="9.5" fill="#1E40AF" text-anchor="middle">prompts</text>
  <!-- 2 -->
  <rect x="190" y="110" width="140" height="84" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.6"/>
  <text x="260" y="134" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1E40AF" text-anchor="middle">2 · Plan</text>
  <text x="260" y="156" font-family="sans-serif" font-size="9.5" fill="#1E40AF" text-anchor="middle">scripts, references,</text>
  <text x="260" y="170" font-family="sans-serif" font-size="9.5" fill="#1E40AF" text-anchor="middle">assets needed</text>
  <!-- 3 -->
  <rect x="350" y="110" width="140" height="84" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.6"/>
  <text x="420" y="134" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1E40AF" text-anchor="middle">3 · Scaffold</text>
  <text x="420" y="156" font-family="monospace" font-size="9" fill="#1E40AF" text-anchor="middle">mkdir skills/</text>
  <text x="420" y="170" font-family="monospace" font-size="9" fill="#1E40AF" text-anchor="middle">shot-change-erp</text>
  <!-- 4 -->
  <rect x="510" y="110" width="140" height="84" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="580" y="134" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1E40AF" text-anchor="middle">4 · Write</text>
  <text x="580" y="156" font-family="sans-serif" font-size="9.5" fill="#1E40AF" text-anchor="middle">description + lean</text>
  <text x="580" y="170" font-family="sans-serif" font-size="9.5" fill="#1E40AF" text-anchor="middle">SKILL.md body</text>
  <!-- 5 -->
  <rect x="670" y="110" width="140" height="84" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="740" y="134" font-family="sans-serif" font-size="13" font-weight="bold" fill="#5B21B6" text-anchor="middle">5 · Validate</text>
  <text x="740" y="156" font-family="monospace" font-size="9" fill="#5B21B6" text-anchor="middle">skill-reviewer</text>
  <text x="740" y="170" font-family="sans-serif" font-size="9.5" fill="#5B21B6" text-anchor="middle">agent</text>
  <!-- 6 -->
  <rect x="830" y="110" width="140" height="84" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="900" y="134" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1E40AF" text-anchor="middle">6 · Iterate</text>
  <text x="900" y="156" font-family="sans-serif" font-size="9.5" fill="#1E40AF" text-anchor="middle">use, notice,</text>
  <text x="900" y="170" font-family="sans-serif" font-size="9.5" fill="#1E40AF" text-anchor="middle">refine</text>

  <!-- forward arrows -->
  <line x1="170" y1="152" x2="188" y2="152" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrow-step)"/>
  <line x1="330" y1="152" x2="348" y2="152" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrow-step)"/>
  <line x1="490" y1="152" x2="508" y2="152" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrow-step)"/>
  <line x1="650" y1="152" x2="668" y2="152" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrow-step)"/>
  <line x1="810" y1="152" x2="828" y2="152" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrow-step)"/>

  <!-- loop arrow from 6 back to 4 -->
  <path d="M 900 194 L 900 234 L 580 234 L 580 196" fill="none" stroke="#7C3AED" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arrow-loop)"/>
  <text x="740" y="252" font-family="sans-serif" font-size="9.5" font-style="italic" fill="#7C3AED" text-anchor="middle">loop: refine the description and body until it triggers cleanly</text>

  <!-- bottom strip -->
  <rect x="60" y="282" width="880" height="24" rx="5" fill="#F1F5F9" stroke="#94A3B8" stroke-width="0.6"/>
  <text x="500" y="298" font-family="sans-serif" font-size="11" fill="#1E293B" text-anchor="middle" font-weight="bold">/skill-development ships in the official plugin-dev plugin.</text>
</svg>
