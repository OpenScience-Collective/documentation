<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="380" height="180">
  <!-- Title -->
  <text x="190" y="20" font-family="sans-serif" font-size="12" fill="#1E293B" font-weight="bold" text-anchor="middle">Pre-commit hook -- catch issues in 200 ms locally</text>

  <!-- Step 1: git add -->
  <rect x="10" y="60" width="80" height="50" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="50" y="80" font-family="monospace" font-size="11" fill="#1E40AF" font-weight="bold" text-anchor="middle">git add</text>
  <text x="50" y="98" font-family="sans-serif" font-size="9" fill="#475569" text-anchor="middle">staged files</text>

  <!-- Arrow -->
  <path d="M92 85 L118 85" fill="none" stroke="#64748B" stroke-width="1.8"/>
  <polygon points="118,85 112,81 112,89" fill="#64748B"/>

  <!-- Step 2: hook -->
  <rect x="120" y="60" width="100" height="50" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="170" y="78" font-family="monospace" font-size="10" fill="#92400E" font-weight="bold" text-anchor="middle">.pre-commit</text>
  <text x="170" y="92" font-family="sans-serif" font-size="9" fill="#78350F" text-anchor="middle">ruff + biome + typos</text>
  <text x="170" y="104" font-family="sans-serif" font-size="9" fill="#78350F" font-style="italic" text-anchor="middle">staged only</text>

  <!-- Arrow -->
  <path d="M222 85 L248 85" fill="none" stroke="#64748B" stroke-width="1.8"/>
  <polygon points="248,85 242,81 242,89" fill="#64748B"/>

  <!-- Step 3a: pass -->
  <rect x="250" y="40" width="120" height="40" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <circle cx="266" cy="60" r="8" fill="#059669"/>
  <path d="M261 60 L264 63 L271 56" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="318" y="58" font-family="monospace" font-size="10" fill="#064E3B" font-weight="bold" text-anchor="middle">pass</text>
  <text x="318" y="72" font-family="sans-serif" font-size="9" fill="#065F46" text-anchor="middle">commit lands</text>

  <!-- Step 3b: fail -->
  <rect x="250" y="92" width="120" height="40" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <circle cx="266" cy="112" r="8" fill="#DC2626"/>
  <line x1="262" y1="108" x2="270" y2="116" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="270" y1="108" x2="262" y2="116" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <text x="318" y="110" font-family="monospace" font-size="10" fill="#7F1D1D" font-weight="bold" text-anchor="middle">fail</text>
  <text x="318" y="124" font-family="sans-serif" font-size="9" fill="#991B1B" text-anchor="middle">fix + re-stage</text>

  <!-- Bottom note -->
  <text x="190" y="160" font-family="sans-serif" font-size="10" fill="#475569" text-anchor="middle">Same tools that run in CI. Same answers. 600x faster.</text>
</svg>
