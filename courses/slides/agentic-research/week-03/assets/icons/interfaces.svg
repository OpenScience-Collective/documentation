<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Central circle: Claude Code -->
  <circle cx="100" cy="100" r="28" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>
  <text x="100" y="96" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Claude</text>
  <text x="100" y="108" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Code</text>
  <!-- Terminal (top) -->
  <rect x="78" y="18" width="44" height="28" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="83" y="34" font-family="monospace" font-size="7" fill="#22C55E">$_</text>
  <text x="100" y="56" font-family="sans-serif" font-size="7" fill="#64748B" text-anchor="middle">Terminal</text>
  <line x1="100" y1="60" x2="100" y2="72" stroke="#94A3B8" stroke-width="1"/>
  <!-- VS Code (right) -->
  <rect x="152" y="82" width="28" height="28" rx="4" fill="#007ACC" stroke="#0065A9" stroke-width="1.5"/>
  <text x="166" y="100" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">VS</text>
  <text x="148" y="122" font-family="sans-serif" font-size="7" fill="#64748B" text-anchor="middle">VS Code</text>
  <line x1="140" y1="96" x2="128" y2="96" stroke="#94A3B8" stroke-width="1"/>
  <!-- Desktop (bottom) -->
  <rect x="78" y="150" width="44" height="28" rx="4" fill="#7C3AED" stroke="#6D28D9" stroke-width="1.5"/>
  <text x="100" y="168" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">App</text>
  <text x="100" y="146" font-family="sans-serif" font-size="7" fill="#64748B" text-anchor="middle">Desktop</text>
  <line x1="100" y1="128" x2="100" y2="140" stroke="#94A3B8" stroke-width="1"/>
  <!-- Web (left) -->
  <circle cx="30" cy="96" r="16" fill="#F59E0B" stroke="#D97706" stroke-width="1.5"/>
  <text x="30" y="100" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle">Web</text>
  <line x1="60" y1="96" x2="72" y2="96" stroke="#94A3B8" stroke-width="1"/>
  <!-- JetBrains (bottom-right) -->
  <rect x="142" y="140" width="28" height="22" rx="3" fill="#334155"/>
  <text x="156" y="155" font-family="sans-serif" font-size="7" fill="white" text-anchor="middle">JB</text>
  <text x="156" y="170" font-family="sans-serif" font-size="6" fill="#64748B" text-anchor="middle">JetBrains</text>
  <line x1="124" y1="120" x2="142" y2="140" stroke="#94A3B8" stroke-width="1"/>
</svg>
