<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" width="820" height="320">
  <!-- Title -->
  <text x="410" y="22" font-family="sans-serif" font-size="14" fill="#1E293B" font-weight="bold" text-anchor="middle">Review findings cycle the corpus, not the prose</text>

  <!-- Five-stage pipeline (smaller) -->
  <!-- Stage 1: Direction -->
  <g>
    <circle cx="80" cy="200" r="36" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.6"/>
    <circle cx="80" cy="190" r="4" fill="#2563EB"/>
    <line x1="80" y1="194" x2="68" y2="208" stroke="#2563EB" stroke-width="1.4"/>
    <line x1="80" y1="194" x2="80" y2="210" stroke="#2563EB" stroke-width="1.4"/>
    <line x1="80" y1="194" x2="92" y2="208" stroke="#2563EB" stroke-width="1.4"/>
    <text x="80" y="256" font-family="sans-serif" font-size="11" fill="#1E293B" font-weight="bold" text-anchor="middle">1. Direction</text>
  </g>
  <path d="M118 200 L160 200" fill="none" stroke="#475569" stroke-width="1.6"/>
  <polygon points="160,200 152,196 152,204" fill="#475569"/>

  <!-- Stage 2: Collect -->
  <g>
    <circle cx="200" cy="200" r="36" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.6"/>
    <circle cx="194" cy="194" r="7" fill="none" stroke="#B45309" stroke-width="1.8"/>
    <line x1="200" y1="200" x2="208" y2="208" stroke="#B45309" stroke-width="2"/>
    <text x="200" y="256" font-family="sans-serif" font-size="11" fill="#1E293B" font-weight="bold" text-anchor="middle">2. Collect</text>
  </g>
  <path d="M238 200 L280 200" fill="none" stroke="#475569" stroke-width="1.6"/>
  <polygon points="280,200 272,196 272,204" fill="#475569"/>

  <!-- Stage 3: Synthesize -->
  <g>
    <circle cx="320" cy="200" r="36" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.6"/>
    <rect x="312" y="184" width="16" height="8" rx="2" fill="none" stroke="#7C3AED" stroke-width="1.4"/>
    <line x1="320" y1="192" x2="320" y2="200" stroke="#7C3AED" stroke-width="1.4"/>
    <line x1="306" y1="200" x2="334" y2="200" stroke="#7C3AED" stroke-width="1.4"/>
    <line x1="306" y1="200" x2="306" y2="208" stroke="#7C3AED" stroke-width="1.4"/>
    <line x1="320" y1="200" x2="320" y2="208" stroke="#7C3AED" stroke-width="1.4"/>
    <line x1="334" y1="200" x2="334" y2="208" stroke="#7C3AED" stroke-width="1.4"/>
    <text x="320" y="256" font-family="sans-serif" font-size="11" fill="#1E293B" font-weight="bold" text-anchor="middle">3. Synthesize</text>
  </g>
  <path d="M358 200 L400 200" fill="none" stroke="#475569" stroke-width="1.6"/>
  <polygon points="400,200 392,196 392,204" fill="#475569"/>

  <!-- Stage 4: Draft -->
  <g>
    <circle cx="440" cy="200" r="36" fill="#D1FAE5" stroke="#059669" stroke-width="1.6"/>
    <rect x="430" y="184" width="16" height="22" rx="2" fill="#FFFFFF" stroke="#059669" stroke-width="1.4"/>
    <line x1="433" y1="190" x2="443" y2="190" stroke="#059669" stroke-width="1"/>
    <line x1="433" y1="194" x2="443" y2="194" stroke="#059669" stroke-width="1"/>
    <line x1="433" y1="198" x2="441" y2="198" stroke="#059669" stroke-width="1"/>
    <path d="M448 186 L456 198 L452 200 Z" fill="#059669"/>
    <text x="440" y="256" font-family="sans-serif" font-size="11" fill="#1E293B" font-weight="bold" text-anchor="middle">4. Draft</text>
  </g>
  <path d="M478 200 L520 200" fill="none" stroke="#475569" stroke-width="1.6"/>
  <polygon points="520,200 512,196 512,204" fill="#475569"/>

  <!-- Stage 5: Review -->
  <g>
    <circle cx="560" cy="200" r="36" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.6"/>
    <circle cx="556" cy="194" r="9" fill="none" stroke="#DC2626" stroke-width="2"/>
    <line x1="563" y1="201" x2="572" y2="210" stroke="#DC2626" stroke-width="2.4" stroke-linecap="round"/>
    <text x="560" y="256" font-family="sans-serif" font-size="11" fill="#1E293B" font-weight="bold" text-anchor="middle">5. Review</text>
  </g>

  <!-- Thicker boomerang from Stage 5 back to Stage 2 -->
  <path d="M560 164 C 560 60, 280 50, 200 130 L 200 164" fill="none" stroke="#B45309" stroke-width="3"/>
  <polygon points="200,164 194,154 206,154" fill="#B45309"/>

  <!-- Thinner secondary arc to Stage 1 -->
  <path d="M560 168 C 380 100, 180 100, 80 130 L 80 164" fill="none" stroke="#B45309" stroke-width="1.6" stroke-dasharray="4,3"/>
  <polygon points="80,164 74,154 86,154" fill="#B45309"/>

  <!-- Severity-tagged finding chips along the boomerang -->
  <g>
    <rect x="200" y="48" width="170" height="22" rx="11" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.4"/>
    <text x="285" y="64" font-family="sans-serif" font-size="11" fill="#7F1D1D" text-anchor="middle"><tspan font-weight="bold">[critical]</tspan> missing evidence</text>
  </g>
  <g>
    <rect x="380" y="38" width="190" height="22" rx="11" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.4"/>
    <text x="475" y="54" font-family="sans-serif" font-size="11" fill="#78350F" text-anchor="middle"><tspan font-weight="bold">[major]</tspan> mis-scoped direction</text>
  </g>
  <g>
    <rect x="580" y="78" width="140" height="22" rx="11" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
    <text x="650" y="94" font-family="sans-serif" font-size="11" fill="#1E40AF" text-anchor="middle"><tspan font-weight="bold">[minor]</tspan> tone</text>
  </g>

  <!-- Right-side legend -->
  <rect x="660" y="170" width="150" height="80" rx="6" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="670" y="186" font-family="sans-serif" font-size="11" fill="#1E293B" font-weight="bold">Findings route by severity</text>
  <circle cx="678" cy="204" r="4" fill="#DC2626"/>
  <text x="688" y="208" font-family="sans-serif" font-size="10" fill="#475569">critical -> Stage 2</text>
  <circle cx="678" cy="222" r="4" fill="#F59E0B"/>
  <text x="688" y="226" font-family="sans-serif" font-size="10" fill="#475569">major -> Stage 1</text>
  <circle cx="678" cy="240" r="4" fill="#2563EB"/>
  <text x="688" y="244" font-family="sans-serif" font-size="10" fill="#475569">minor -> Stage 4</text>

  <text x="410" y="296" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">Big findings revisit collection or direction; small findings stay in the draft.</text>
</svg>
