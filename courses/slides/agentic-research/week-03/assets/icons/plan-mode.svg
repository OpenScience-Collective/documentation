<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Clipboard background -->
  <rect x="40" y="35" width="120" height="145" rx="6" fill="#F8FAFC" stroke="#334155" stroke-width="2"/>
  <!-- Clipboard clip -->
  <rect x="70" y="25" width="60" height="20" rx="4" fill="#334155"/>
  <circle cx="100" cy="35" r="5" fill="#F8FAFC"/>
  <!-- Phase labels -->
  <text x="55" y="65" font-family="sans-serif" font-size="10" fill="#2563EB" font-weight="bold">1</text>
  <circle cx="57" cy="61" r="8" fill="none" stroke="#2563EB" stroke-width="1.5"/>
  <text x="70" y="65" font-family="sans-serif" font-size="11" fill="#334155" font-weight="bold">Explore</text>
  <!-- Arrow -->
  <path d="M100 72 L100 82" stroke="#CBD5E1" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <text x="55" y="97" font-family="sans-serif" font-size="10" fill="#F59E0B" font-weight="bold">2</text>
  <circle cx="57" cy="93" r="8" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="70" y="97" font-family="sans-serif" font-size="11" fill="#334155" font-weight="bold">Plan</text>
  <!-- Arrow -->
  <path d="M100 104 L100 114" stroke="#CBD5E1" stroke-width="1.5" fill="none"/>
  <text x="55" y="129" font-family="sans-serif" font-size="10" fill="#22C55E" font-weight="bold">3</text>
  <circle cx="57" cy="125" r="8" fill="none" stroke="#22C55E" stroke-width="1.5"/>
  <text x="70" y="129" font-family="sans-serif" font-size="11" fill="#334155" font-weight="bold">Implement</text>
  <!-- Arrow -->
  <path d="M100 136 L100 146" stroke="#CBD5E1" stroke-width="1.5" fill="none"/>
  <text x="55" y="161" font-family="sans-serif" font-size="10" fill="#A78BFA" font-weight="bold">4</text>
  <circle cx="57" cy="157" r="8" fill="none" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="70" y="161" font-family="sans-serif" font-size="11" fill="#334155" font-weight="bold">Commit</text>
  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0 0 L6 2 L0 4" fill="#CBD5E1"/>
    </marker>
  </defs>
</svg>
