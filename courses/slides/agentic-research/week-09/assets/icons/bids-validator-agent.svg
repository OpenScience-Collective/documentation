<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360">
  <text x="500" y="24" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">The bids-validator agent -- this week's mechanical defence</text>
  <text x="500" y="42" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">A looping agent locates, validates, fixes with confirmation, and re-validates -- then hands you a clean report</text>

  <defs>
    <marker id="arrowfwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowloop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#BE185D"/>
    </marker>
    <marker id="arrowhand" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- LEFT: magenta agent card with vertical loop of steps -->
  <g>
    <rect x="60" y="62" width="300" height="262" rx="6" fill="#FCE7F3" stroke="#BE185D" stroke-width="1.8"/>
    <rect x="60" y="62" width="300" height="26" rx="6" fill="#FBCFE8" stroke="#BE185D" stroke-width="1.8"/>
    <text x="210" y="80" font-family="monospace" font-size="11.5" fill="#831843" font-weight="bold" text-anchor="middle">bids-validator agent</text>

    <!-- step 1 -->
    <rect x="84" y="98" width="252" height="28" rx="4" fill="#FFFFFF" stroke="#BE185D" stroke-width="1.2"/>
    <text x="210" y="116" font-family="sans-serif" font-size="10.5" fill="#9D174D" text-anchor="middle">1. locate dataset</text>
    <line x1="210" y1="126" x2="210" y2="134" stroke="#BE185D" stroke-width="1.4" marker-end="url(#arrowloop)"/>

    <!-- step 2 -->
    <rect x="84" y="136" width="252" height="28" rx="4" fill="#FFFFFF" stroke="#BE185D" stroke-width="1.2"/>
    <text x="210" y="154" font-family="sans-serif" font-size="10.5" fill="#9D174D" text-anchor="middle">2. run BIDS validator</text>
    <line x1="210" y1="164" x2="210" y2="172" stroke="#BE185D" stroke-width="1.4" marker-end="url(#arrowloop)"/>

    <!-- step 3 -->
    <rect x="84" y="174" width="252" height="28" rx="4" fill="#FFFFFF" stroke="#BE185D" stroke-width="1.2"/>
    <text x="210" y="192" font-family="sans-serif" font-size="10" fill="#9D174D" text-anchor="middle">3. categorize: errors / warnings / info</text>
    <line x1="210" y1="202" x2="210" y2="210" stroke="#BE185D" stroke-width="1.4" marker-end="url(#arrowloop)"/>

    <!-- step 4 -->
    <rect x="84" y="212" width="252" height="28" rx="4" fill="#FFFFFF" stroke="#BE185D" stroke-width="1.2"/>
    <text x="210" y="230" font-family="sans-serif" font-size="10" fill="#9D174D" text-anchor="middle">4. apply fixes (with confirmation)</text>
    <line x1="210" y1="240" x2="210" y2="248" stroke="#BE185D" stroke-width="1.4" marker-end="url(#arrowloop)"/>

    <!-- step 5 -->
    <rect x="84" y="250" width="252" height="28" rx="4" fill="#FFFFFF" stroke="#BE185D" stroke-width="1.2"/>
    <text x="210" y="268" font-family="sans-serif" font-size="10.5" fill="#9D174D" text-anchor="middle">5. re-validate</text>

    <!-- feedback loop: re-validate back to run validator -->
    <path d="M 84 264 H 74 V 150 H 82" fill="none" stroke="#BE185D" stroke-width="1.4" stroke-dasharray="6,3" marker-end="url(#arrowloop)"/>
    <text x="70" y="208" font-family="sans-serif" font-size="9" fill="#BE185D" font-style="italic" text-anchor="middle" transform="rotate(-90 70 208)">loop until clean</text>
  </g>

  <!-- Hand-off arrow agent -> report -->
  <line x1="362" y1="180" x2="418" y2="180" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#arrowhand)"/>

  <!-- RIGHT: monospace report card (light) -->
  <g>
    <rect x="420" y="62" width="520" height="234" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.4"/>
    <rect x="420" y="62" width="520" height="26" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.4"/>
    <text x="440" y="80" font-family="monospace" font-size="11.5" fill="#1E293B" font-weight="bold" text-anchor="start">BIDS Validation Report</text>

    <text x="440" y="108" font-family="monospace" font-size="10.5" fill="#1E293B" text-anchor="start">Subjects: 12   Modalities: eeg</text>
    <text x="440" y="128" font-family="monospace" font-size="10.5" fill="#065F46" text-anchor="start">Errors fixed: 2</text>
    <text x="456" y="148" font-family="monospace" font-size="10.5" fill="#065F46" text-anchor="start">[FIXED] missing dataset_description.json</text>
    <text x="456" y="166" font-family="monospace" font-size="10.5" fill="#065F46" text-anchor="start">[FIXED] _eeg.json missing</text>
    <text x="472" y="182" font-family="monospace" font-size="10.5" fill="#065F46" text-anchor="start">PowerLineFrequency -&gt; 60</text>
    <text x="440" y="204" font-family="monospace" font-size="10.5" fill="#92400E" text-anchor="start">Remaining warnings: 2</text>

    <!-- ready line, green and emphasized -->
    <rect x="440" y="216" width="300" height="26" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="1.2"/>
    <text x="452" y="234" font-family="monospace" font-size="11.5" fill="#065F46" font-weight="bold" text-anchor="start">Ready for submission: YES</text>

    <!-- note box inside report area -->
    <rect x="440" y="252" width="480" height="34" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1.2"/>
    <text x="680" y="268" font-family="sans-serif" font-size="10" fill="#92400E" font-weight="bold" text-anchor="middle">fixes your data LOCALLY;</text>
    <text x="680" y="281" font-family="sans-serif" font-size="10" fill="#92400E" text-anchor="middle">nemar-cli validates again AT THE GATE.</text>
  </g>

  <!-- Bottom moral strip -->
  <rect x="60" y="334" width="880" height="20" rx="4" fill="#F1F5F9" stroke="#94A3B8" stroke-width="0.6"/>
  <text x="500" y="348" font-family="sans-serif" font-size="10" fill="#1E293B" text-anchor="middle">The agent automates the boring checks so the submission gate is a formality, not a surprise.</text>
</svg>
