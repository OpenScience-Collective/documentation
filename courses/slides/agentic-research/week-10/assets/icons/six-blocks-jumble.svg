<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360">
  <text x="500" y="26" font-family="sans-serif" font-size="16" fill="#1E293B" font-weight="bold" text-anchor="middle">Six words researchers mix up</text>
  <text x="500" y="46" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">skill, agent, command, hook, MCP, plugin -- two questions tell them apart</text>

  <defs>
    <marker id="arrow-blue-jumble" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- scattered question marks behind the pills -->
  <text x="230" y="150" font-family="sans-serif" font-size="44" fill="#E2E8F0" text-anchor="middle">?</text>
  <text x="120" y="210" font-family="sans-serif" font-size="36" fill="#E2E8F0" text-anchor="middle">?</text>
  <text x="370" y="135" font-family="sans-serif" font-size="30" fill="#E2E8F0" text-anchor="middle">?</text>
  <text x="200" y="280" font-family="sans-serif" font-size="34" fill="#E2E8F0" text-anchor="middle">?</text>

  <!-- jumbled tool pills (left) -->
  <g transform="rotate(-6 150 110)">
    <rect x="90" y="93" width="120" height="34" rx="17" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.8"/>
    <text x="150" y="115" font-family="sans-serif" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle">Skill</text>
  </g>
  <g transform="rotate(5 320 100)">
    <rect x="260" y="83" width="120" height="34" rx="17" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.8"/>
    <text x="320" y="105" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1E40AF" text-anchor="middle">Plugin</text>
  </g>
  <g transform="rotate(9 215 172)">
    <rect x="155" y="155" width="120" height="34" rx="17" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.8"/>
    <text x="215" y="177" font-family="sans-serif" font-size="14" font-weight="bold" fill="#5B21B6" text-anchor="middle">Agent</text>
  </g>
  <g transform="rotate(-7 375 182)">
    <rect x="315" y="165" width="120" height="34" rx="17" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.8"/>
    <text x="375" y="187" font-family="sans-serif" font-size="14" font-weight="bold" fill="#991B1B" text-anchor="middle">MCP</text>
  </g>
  <g transform="rotate(4 160 245)">
    <rect x="92" y="228" width="136" height="34" rx="17" fill="#CFFAFE" stroke="#0891B2" stroke-width="1.8"/>
    <text x="160" y="250" font-family="sans-serif" font-size="14" font-weight="bold" fill="#155E75" text-anchor="middle">Command</text>
  </g>
  <g transform="rotate(-9 345 258)">
    <rect x="285" y="241" width="120" height="34" rx="17" fill="#FEF3C7" stroke="#D97706" stroke-width="1.8"/>
    <text x="345" y="263" font-family="sans-serif" font-size="14" font-weight="bold" fill="#92400E" text-anchor="middle">Hook</text>
  </g>

  <!-- big arrow to the answer -->
  <line x1="455" y1="178" x2="638" y2="178" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow-blue-jumble)"/>

  <!-- the "two questions" answer card (right) -->
  <rect x="650" y="92" width="296" height="172" rx="10" fill="#F8FAFC" stroke="#2563EB" stroke-width="2"/>
  <rect x="650" y="92" width="296" height="30" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="798" y="112" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1E40AF" text-anchor="middle">TWO QUESTIONS</text>
  <text x="672" y="152" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1E293B">1.  Who triggers it?</text>
  <text x="690" y="172" font-family="sans-serif" font-size="10.5" fill="#64748B">Claude / you / an event / a connection</text>
  <text x="672" y="208" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1E293B">2.  Where does it run?</text>
  <text x="690" y="228" font-family="sans-serif" font-size="10.5" fill="#64748B">main chat / its own context / outside</text>

  <!-- bottom strip -->
  <rect x="60" y="326" width="886" height="22" rx="4" fill="#F1F5F9" stroke="#94A3B8" stroke-width="0.6"/>
  <text x="503" y="341" font-family="sans-serif" font-size="10.5" fill="#1E293B" text-anchor="middle">You do not need to memorize six definitions. You need two questions.</text>
</svg>
